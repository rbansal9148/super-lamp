# Sealed Secrets controller — cluster prerequisite for every SealedSecret in the
# stack (ADR guardrail 3: secrets never in plaintext git). Applied alongside the
# root app: kubectl apply -f gitops/bootstrap/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"   # before anything that consumes a Secret
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.18.6               # app v0.37.0 (latest stable as of 2026-05-30)
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
