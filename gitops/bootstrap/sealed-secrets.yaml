# Sealed Secrets controller — cluster prerequisite for every SealedSecret in the
# stack (ADR guardrail 3: secrets never in plaintext git). Applied alongside the
# root app: kubectl apply -f gitops/bootstrap/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"   # before anything that consumes a Secret
spec:
  project: default
  source:
    repoURL: https://bitnami.github.io/sealed-secrets   # was bitnami-labs.github.io (org page retired → 404)
    chart: sealed-secrets
    targetRevision: 2.18.6               # app v0.37.0 (latest stable as of 2026-05-31)
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets-controller
        # Escape BestEffort QoS: a request makes this Burstable so the kubelet won't
        # evict the secret-decryption controller first under node memory pressure
        # (it's a cluster prerequisite — no SealedSecret resolves if it's down).
        # 7d peak working_set is ~31Mi; 64Mi request + 128Mi limit is ample.
        resources:
          requests: { cpu: 25m, memory: 64Mi }
          limits: { memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
