# it-tools — first Docker→k8s migration (stateless reference app). Proves the
# platform path: Deployment → Service → cert-manager Certificate → Traefik
# IngressRoute on :8443. Runs ALONGSIDE the Docker instance (which stays on :443
# behind Authelia) on a distinct hostname, so neither touches the other.
#
# NOTE: no Authelia here — it-tools is client-side with no secrets. Auth-gated apps
# need an Authelia forward-auth Middleware CR in this cluster first (see migration
# notes); this app intentionally does not depend on it.
apiVersion: v1
kind: Namespace
metadata:
  name: apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-tools
  namespace: apps
  labels: { app: it-tools }
spec:
  replicas: 1
  selector:
    matchLabels: { app: it-tools }
  template:
    metadata:
      labels: { app: it-tools }
    spec:
      containers:
        - name: it-tools
          image: ghcr.io/corentinth/it-tools:latest
          ports:
            - containerPort: 80
          resources:
            requests: { memory: 32Mi, cpu: 10m }
            limits: { memory: 128Mi, cpu: 250m }   # good citizen on the shared host
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: it-tools
  namespace: apps
spec:
  selector: { app: it-tools }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: it-tools-tls
  namespace: apps
spec:
  secretName: it-tools-tls
  # Self-signed (internal). Swap to an ACME DNS-01 ClusterIssuer for a trusted cert.
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - it-tools.k8s.my-blue-car.work
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: it-tools
  namespace: apps
spec:
  entryPoints: [websecure]            # k3s Traefik websecure = :8443 (Docker Traefik owns :443)
  routes:
    - match: Host(`it-tools.k8s.my-blue-car.work`)
      kind: Rule
      services:
        - name: it-tools
          port: 80
  tls:
    secretName: it-tools-tls
