# it-tools — first Docker→k8s migration (stateless reference app). Proves the
# platform path: Deployment → Service → cert-manager Certificate → Traefik
# IngressRoute on :8443. Runs ALONGSIDE the Docker instance (which stays on :443
# behind Authelia) on a distinct hostname, so neither touches the other.
#
# NOTE: no Authelia here — it-tools is client-side with no secrets. Auth-gated apps
# need an Authelia forward-auth Middleware CR in this cluster first (see migration
# notes); this app intentionally does not depend on it.
apiVersion: v1
kind: Namespace
metadata:
  name: apps
  # Phase 2: mesh every pod in the apps namespace by default (transparent mTLS).
  # gluetun + bitmagnet opt out at the pod level (in-pod VPN; a sidecar's iptables
  # would collide with the tunnel). New apps here auto-mesh on create.
  annotations: { linkerd.io/inject: enabled }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-tools
  namespace: apps
  labels: { app: it-tools }
spec:
  replicas: 1
  selector:
    matchLabels: { app: it-tools }
  template:
    metadata:
      labels: { app: it-tools }
      annotations: { linkerd.io/inject: enabled }   # Phase 2 canary: mesh this one stateless app first
    spec:
      containers:
        - name: it-tools
          image: ghcr.io/corentinth/it-tools:latest@sha256:8b8128748339583ca951af03dfe02a9a4d7363f61a216226fc28030731a5a61f
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [NET_BIND_SERVICE, CHOWN, SETGID, SETUID, DAC_OVERRIDE] }, seccompProfile: { type: RuntimeDefault } }
          ports:
            - containerPort: 80
          resources:
            requests: { memory: 32Mi, cpu: 10m }
            limits: { memory: 128Mi, cpu: 250m }   # good citizen on the shared host
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: it-tools
  namespace: apps
spec:
  selector: { app: it-tools }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: it-tools
  namespace: apps
  annotations:
    external-dns.alpha.kubernetes.io/target: "161.118.165.53"
spec:
  entryPoints: [websecure]            # k3s Traefik websecure = :8443 (Docker Traefik owns :443)
  routes:
    - match: Host(`it-tools.my-blue-car.work`)
      kind: Rule
      middlewares:
        - name: authelia                # gate behind Authelia (no longer public/unauthenticated)
      services:
        - name: it-tools
          port: 80
  tls: {}
