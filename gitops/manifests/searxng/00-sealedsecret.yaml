---
# Only SearXNG's server.secret_key (session/CSRF signing) is a secret; the rest of
# settings.yml is plain config and lives in 00-configmap.yaml. Injected via the
# SEARXNG_SECRET env override (upstream: server.secret_key <- ${SEARXNG_SECRET}).
# Reseal: printf '%s' "$KEY" | kubeseal --raw --scope strict -n apps --name searxng-secret ...
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: searxng-secret
  namespace: apps
spec:
  encryptedData:
    SEARXNG_SECRET: 
  template:
    metadata:
      name: searxng-secret
      namespace: apps
