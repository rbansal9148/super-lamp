# searxng — metasearch. redis cache (ephemeral) + settings.yml (sealed, has secret_key)
# mounted via subPath. NOT VPN-coupled (network_mode was commented in compose).
apiVersion: apps/v1
kind: Deployment
metadata: { name: searxng-redis, namespace: apps, labels: { app: searxng-redis } }
spec:
  replicas: 1
  selector: { matchLabels: { app: searxng-redis } }
  template:
    metadata: { labels: { app: searxng-redis } }
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:8.8.0@sha256:234c902a2db49461a129e2d4aeff85b28cf20187ed274a67f6e50995fa713c7b
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          args: ["redis-server","--save","","--maxmemory","64mb","--maxmemory-policy","allkeys-lru"]
          ports: [{ containerPort: 6379 }]
          resources: { requests: { memory: 16Mi, cpu: 10m }, limits: { memory: 96Mi, cpu: 200m } }
          readinessProbe: { exec: { command: ["redis-cli","ping"] }, initialDelaySeconds: 5, periodSeconds: 10 }
        - name: redis-exporter
          image: quay.io/oliver006/redis_exporter:v1.87.0@sha256:9ca6f929a8abc518d78158757922444f1cf807661a2238f44b28c3cd08a1b652
          securityContext: { runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, readOnlyRootFilesystem: true, seccompProfile: { type: RuntimeDefault } }
          env:
            - {name: REDIS_ADDR, value: "redis://localhost:6379"}
          ports: [{containerPort: 9121, name: metrics}]
          resources: {requests: {memory: 16Mi, cpu: 5m}, limits: {memory: 48Mi, cpu: 100m}}
---
apiVersion: v1
kind: Service
metadata: { name: searxng-redis, namespace: apps, labels: { exporter: redis } }
spec: { selector: { app: searxng-redis }, ports: [{ name: redis, port: 6379, targetPort: 6379 }, { name: metrics, port: 9121, targetPort: 9121 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: searxng, namespace: apps, labels: { app: searxng } }
spec:
  replicas: 1
  selector: { matchLabels: { app: searxng } }
  template:
    metadata: { labels: { app: searxng } }
    spec:
      enableServiceLinks: false
      containers:
        - name: searxng
          image: searxng/searxng:latest@sha256:b8ca38ba06eea544d7555e88321e212ddc0d5c3c7de055419cfb2e5c6bf30812
          # image ships user searxng 977:977 (app+data COPY --chown=977); entrypoint gates chown/ca-update on id==0 else warns+continues. proven: already runs root w/ drop:[ALL] healthy, doesn't write cache
          securityContext: { runAsNonRoot: true, runAsUser: 977, runAsGroup: 977, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          env:
            - { name: SEARXNG_BASE_URL, value: "https://searxng.my-blue-car.work/" }
            - { name: UWSGI_WORKERS, value: "2" }
            - { name: UWSGI_THREADS, value: "2" }
            - { name: SEARXNG_LIMITER, value: "false" }
          ports: [{ containerPort: 8080, name: http }]
          resources: { requests: { memory: 96Mi, cpu: 25m }, limits: { memory: 512Mi, cpu: "1" } }
          volumeMounts:
            - { name: settings, mountPath: /etc/searxng/settings.yml, subPath: settings.yml, readOnly: true }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 15, periodSeconds: 20, timeoutSeconds: 8 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 8, failureThreshold: 3 }
      volumes:
        - name: settings
          secret: { secretName: searxng-settings }
---
apiVersion: v1
kind: Service
metadata: { name: searxng, namespace: apps }
spec: { selector: { app: searxng }, ports: [{ name: http, port: 8080, targetPort: 8080 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: searxng, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`searxng.my-blue-car.work`)
      kind: Rule
      middlewares: [{ name: ratelimit-auth }, { name: authelia }]
      services: [{ name: searxng, port: 8080 }]
  tls: {}
