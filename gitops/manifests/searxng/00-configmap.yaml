---
# SearXNG config (non-secret). secret_key is injected separately via SEARXNG_SECRET
# env from the searxng-secret SealedSecret. Edit here; ArgoCD syncs; pod restart needed
# (subPath configmap mounts do not hot-reload).
apiVersion: v1
data:
  settings.yml: |
    brand: {}

    general:
      # Debug mode, only for development. Is overwritten by ${SEARXNG_DEBUG}
      debug: false
      # displayed name
      instance_name: "My Blue Car"
      # For example: https://example.com/privacy
      privacypolicy_url: false
      # use true to use your own donation page written in searx/info/en/donate.md
      # use false to disable the donation link
      donation_url: false
      # mailto:contact@example.com
      contact_url: false
      # record per-engine response-time + error-rate stats, visible at /stats (Authelia-gated).
      # open_metrics below stays empty so nothing is exposed unauthenticated.
      enable_metrics: true
      # expose stats in open metrics format at /metrics
      # leave empty to disable (no password set)
      # open_metrics: <password>
      open_metrics: ''

    search:
      safe_search: 0
      autocomplete: "google"
      autocomplete_min: 2
      favicon_resolver: "duckduckgo"
      default_lang: "auto"
      ban_time_on_fail: 5
      max_ban_time_on_fail: 120
      suspended_times:
        SearxEngineAccessDenied: 3600
        SearxEngineCaptcha: 7200
        SearxEngineTooManyRequests: 1800
        cf_SearxEngineCaptcha: 86400
        cf_SearxEngineAccessDenied: 7200
        recaptcha_SearxEngineCaptcha: 86400
      formats:
        - html
        - json

    server:
      # Is overwritten by ${SEARXNG_PORT} and ${SEARXNG_BIND_ADDRESS}
      port: 8080
      bind_address: "0.0.0.0"
      # public URL of the instance, to ensure correct inbound links. Is overwritten
      # by ${SEARXNG_BASE_URL}.
      base_url: false  # "http://example.com/location"
      # rate limit the number of request on the instance, block some bots.
      # Is overwritten by ${SEARXNG_LIMITER}
      limiter: false
      # enable features designed only for public instances.
      # Is overwritten by ${SEARXNG_PUBLIC_INSTANCE}
      public_instance: false

      # If your instance owns a /etc/searxng/settings.yml file, then set the following
      # values there.

      secret_key: "overridden-by-SEARXNG_SECRET-env"
      # Proxy image results through SearXNG. Is overwritten by ${SEARXNG_IMAGE_PROXY}
      image_proxy: true
      # 1.0 and 1.1 are supported
      http_protocol_version: "1.1"
      # POST queries are "more secure!" but are also the source of hard-to-locate
      # annoyances, which is why GET may be better for end users and their browsers.
      # see https://github.com/searxng/searxng/pull/3619
      # Is overwritten by ${SEARXNG_METHOD}
      method: "POST"
      default_http_headers:
        X-Content-Type-Options: nosniff
        X-Download-Options: noopen
        X-Robots-Tag: noindex, nofollow
        Referrer-Policy: no-referrer

    valkey:
      # URL to connect valkey database. Is overwritten by ${SEARXNG_VALKEY_URL}.
      # https://docs.searxng.org/admin/settings/settings_valkey.html#settings-valkey
      # url: valkey://localhost:6379/0
      url: valkey://searxng-redis:6379/0

    ui:
      # Custom static path - leave it blank if you didn't change
      static_path: ""
      # Custom templates path - leave it blank if you didn't change
      templates_path: ""
      # query_in_title: When true, the result page's titles contains the query
      # it decreases the privacy, since the browser can records the page titles.
      query_in_title: false
      # ui theme
      default_theme: "simple"
      # center the results ?
      center_alignment: true
      # URL prefix of the internet archive, don't forget trailing slash (if needed).
      # cache_url: "https://webcache.googleusercontent.com/search?q=cache:"
      # Default interface locale - leave blank to detect from browser information or
      # use codes from the 'locales' config section
      default_locale: "en"
      # Open result links in a new tab by default
      # results_on_new_tab: false
      theme_args:
        # style of simple theme: auto, light, dark, black
        simple_style: dark
      # Perform search immediately if a category selected.
      # Disable to select multiple categories at once and start the search manually.
      search_on_category_select: true
      # Hotkeys: default or vim
      hotkeys: default
      # URL formatting: pretty, full or host
      url_formatting: pretty
      results_on_new_tab: true

    # Lock arbitrary settings on the preferences page.
    #
    # preferences:
    #   lock:
    #     - categories
    #     - language
    #     - autocomplete
    #     - favicon
    #     - safesearch
    #     - method
    #     - doi_resolver
    #     - locale
    #     - theme
    #     - results_on_new_tab
    #     - search_on_category_select
    #     - method
    #     - image_proxy
    #     - query_in_title

    # communication with search engines
    #
    outgoing:
      # bumped from 2.0/3.0: residential proxy adds a hop, and the 3.0 ceiling was
      # clamping per-engine timeouts >3.0 (openlibrary=5.0 → "engine timeout" in logs).
      request_timeout: 3.0
      max_request_timeout: 6.0
      # proxy latency budget (added on top of the timeouts above); schema requires int
      extra_proxy_timeout: 5
      useragent_suffix: ""
      pool_connections: 50
      pool_maxsize: 20
      enable_http2: true
      # NOTE: proxy is set PER-ENGINE (see &gluetun_proxy anchor on the google engine),
      # not globally — only the scrape engines that the Oracle datacenter IP gets
      # CAPTCHA'd on (google*/ddg/startpage*/brave*/mojeek) route through gluetun's
      # Mullvad exit. API/torrent/media engines stay direct: they work on the datacenter
      # IP and have per-IP rate limits we don't want to share on Mullvad's exit.
      # uncomment below section if you want to use a custom server certificate
      # see https://www.python-httpx.org/advanced/#changing-the-verification-defaults
      # and https://www.python-httpx.org/compatibility/#ssl-configuration
      #  verify: ~/.mitmproxy/mitmproxy-ca-cert.cer
      #
      # uncomment below section if you want to use a proxyq see: SOCKS proxies
      #   https://2.python-requests.org/en/latest/user/advanced/#proxies
      # are also supported: see
      #   https://2.python-requests.org/en/latest/user/advanced/#socks
      #
      #  proxies:
      #    all://:
      #      - http://proxy1:8080
      #      - http://proxy2:8080
      #
      #  using_tor_proxy: true
      #
      # Extra seconds to add in order to account for the time taken by the proxy
      #
      #  extra_proxy_timeout: 10
      #
      # uncomment below section only if you have more than one network interface
      # which can be the source of outgoing search requests
      #
      #  source_ips:
      #    - 1.1.1.1
      #    - 1.1.1.2
      #    - fe80::/126

      # proxies:
      #   all://:
      #     - http://gluetun:8080


    # Plugin configuration, for more details see
    #   https://docs.searxng.org/admin/settings/settings_plugins.html
    #
    plugins:

      searx.plugins.calculator.SXNGPlugin:
        active: true

      searx.plugins.infinite_scroll.SXNGPlugin:
        active: false

      searx.plugins.hash_plugin.SXNGPlugin:
        active: true

      searx.plugins.self_info.SXNGPlugin:
        active: true

      searx.plugins.unit_converter.SXNGPlugin:
        active: true

      searx.plugins.hostnames.SXNGPlugin:
        active: true

      searx.plugins.time_zone.SXNGPlugin:
        active: true

      searx.plugins.oa_doi_rewrite.SXNGPlugin:
        active: false

      searx.plugins.tor_check.SXNGPlugin:
        active: false

      searx.plugins.tracker_url_remover.SXNGPlugin:
        active: true


    # Configuration of the "Hostnames plugin":
    # Boost authoritative sources, deprioritize SEO-heavy content farms
    hostnames:
      high_priority:
        - '(.*\.)?wikipedia\.org$'
        - '(.*\.)?stackoverflow\.com$'
        - '(.*\.)?stackexchange\.com$'
        - '(.*\.)?github\.com$'
        - '(.*\.)?arxiv\.org$'
        - '(.*\.)?developer\.mozilla\.org$'
        - '(.*\.)?docs\.python\.org$'
        - '(.*\.)?news\.ycombinator\.com$'
        - '(.*\.)?reddit\.com$'
      low_priority:
        - '(.*\.)?pinterest\.(com|co\.uk|de|fr|ca|com\.au)$'
        - '(.*\.)?quora\.com$'
        - '(.*\.)?w3schools\.com$'
        - '(.*\.)?wikihow\.com$'
        - '(.*\.)?fandom\.com$'
      remove:
        - '(.*\.)?speedtest\.(net|com)$'
    #

    checker:
      # disable checker when in debug mode
      off_when_debug: true

      # use "scheduling: {}" to disable scheduling
      # scheduling: interval or int

      # to activate the scheduler:
      # * uncomment "scheduling" section
      # * add "cache2 = name=searxngcache,items=2000,blocks=2000,blocksize=4096,bitmap=1"
      #   to your uwsgi.ini

      # scheduling:
      #   start_after: [300, 1800]  # delay to start the first run of the checker
      #   every: [86400, 90000]     # how often the checker runs

      # additional tests: only for the YAML anchors (see the engines section)
      #
      additional_tests:
        rosebud: &test_rosebud
          matrix:
            query: rosebud
            lang: en
          result_container:
            - not_empty
            - ['one_title_contains', 'citizen kane']
          test:
            - unique_results

        android: &test_android
          matrix:
            query: ['android']
            lang: ['en', 'de', 'fr', 'zh-CN']
          result_container:
            - not_empty
            - ['one_title_contains', 'google']
          test:
            - unique_results

      # tests: only for the YAML anchors (see the engines section)
      tests:
        infobox: &tests_infobox
          infobox:
            matrix:
              query: ["linux", "new york", "bbc"]
            result_container:
              - has_infobox

    categories_as_tabs:
