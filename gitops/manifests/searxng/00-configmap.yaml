      - name: wikicommons.videos
        engine: wikicommons
        shortcut: wcv
        categories: videos
        wc_search_type: video

      - name: wikicommons.audio
        engine: wikicommons
        shortcut: wca
        categories: music
        wc_search_type: audio

      - name: wikicommons.files
        engine: wikicommons
        shortcut: wcf
        categories: files
        wc_search_type: file

      - name: dictzone
        engine: dictzone
        shortcut: dc

      - name: mymemory translated
        engine: translated
        shortcut: tl
        timeout: 2.0
        # You can use without an API key, but you are limited to 1000 words/day
        # See: https://mymemory.translated.net/doc/usagelimits.php
        # api_key: ''

      # - name: tootfinder
      #   engine: tootfinder
      #   shortcut: toot

        # wikimini: online encyclopedia for children
        # The fulltext and title parameter is necessary for Wikimini because
        # sometimes it will not show the results and redirect instead
      - name: wttr.in
        engine: wttr
        shortcut: wttr
        timeout: 2.0

      - name: brave
        engine: brave
        shortcut: br
        time_range_support: true
        paging: true
        categories: [general, web]
        brave_category: search
        weight: 1.5
        # brave_spellcheck: true
        proxies: *gluetun_proxy   # brave.images/videos/news inherit via network: brave

      - name: brave.images
        engine: brave
        network: brave
        shortcut: brimg
        categories: [images, web]
        brave_category: images

      - name: brave.videos
        engine: brave
        network: brave
        shortcut: brvid
        categories: [videos, web]
        brave_category: videos

      - name: brave.news
        engine: brave
        network: brave
        shortcut: brnews
        categories: news
        brave_category: news

      # - name: brave.goggles
      #   engine: brave
      #   network: brave
      #   shortcut: brgog
      #   time_range_support: true
      #   paging: true
      #   categories: [general, web]
      #   brave_category: goggles
      #   Goggles: # required! This should be a URL ending in .goggle

      # qwant — removed: surfaces SEO-spam .pf-style redirect domains in results
      # (see https://gaviij.pf/owgi report). Other engines (google, ddg, brave,
      # mojeek, etc.) still cover the same categories.

      - name: mojeek
        engine: mojeek
        shortcut: mj
        categories: [general, web]
        weight: 1.0
        proxies: *gluetun_proxy
        timeout: 2.0

      - name: annas archive
        engine: annas_archive
        shortcut: aa
        base_url: https://annas-archive.org
        categories: [files, books]
        timeout: 3.0

      - name: annas articles
        engine: annas_archive
        shortcut: aaa
        base_url: https://annas-archive.org
        categories: [science, articles]
        aa_content: "magazine"
        aa_ext: "pdf"
        aa_sort: "newest"
        timeout: 3.0

      - name: z-library
        engine: zlibrary
        shortcut: zlib
        categories: [files, books]
        timeout: 3.0

      - name: open library
        engine: openlibrary
        shortcut: ol
        categories: [general, books]
        timeout: 5.0

      # goodreads — disabled: returns empty body to this VPS IP, every search
      # produces "Document is empty" / lxml ParserError. Re-enable if IP changes
      # or upstream behavior changes.
      - name: goodreads
        engine: goodreads
        shortcut: gr
        categories: [general, books]
        timeout: 3.0
        disabled: true

      - name: bt4g
        engine: bt4g
        shortcut: bt4g

    doi_resolvers:
      oadoi.org: 'https://oadoi.org/'
      doi.org: 'https://doi.org/'
      sci-hub.se: 'https://sci-hub.se/'
      sci-hub.st: 'https://sci-hub.st/'
      sci-hub.ru: 'https://sci-hub.ru/'

    default_doi_resolver: 'oadoi.org'
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: apps
