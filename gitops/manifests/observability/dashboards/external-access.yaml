# External-access / ingress-audit dashboard. Provisioned by the Grafana sidecar
# (watches ConfigMaps labelled grafana_dashboard in this namespace, see grafana.yaml).
# GitOps-managed like the others — do NOT click-build in the UI.
#
# Two data sources:
#   • Traefik prometheus golden signals (victoriametrics) — request rate / status per
#     route, incl. a panel scoped to the OPEN (no-Authelia) routes.
#   • Traefik JSON access logs in VictoriaLogs (victorialogs) — path-level detail:
#     which RequestPaths are being hit on the open routes, and recent raw requests.
# Open routes (no Authelia middleware): aiometadata, aiostreams, comet, immich,
# mediafusion, stremthru. (zilean is now gated; immich self-auths.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-external-access
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  external-access.json: |
    {
      "uid": "external-access",
      "title": "External Access (Ingress Audit)",
      "tags": ["platform", "gitops", "traefik", "security"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": { "list": [] },
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "Request rate by route (req/s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "sum by (route)(label_replace(rate(traefik_router_requests_total[5m]), \"route\", \"$1\", \"router\", \"[^-]+-(.*?)-[a-f0-9]+@kubernetescrd\"))", "legendFormat": "{{route}}" } ]
        },
        {
          "id": 2, "type": "timeseries", "title": "Req/s to OPEN routes (NO Authelia)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "sum by (route)(label_replace(rate(traefik_router_requests_total{router=~\"apps-(aiometadata|aiostreams|comet|immich|mediafusion|stremthru)-[a-f0-9]+@kubernetescrd\"}[5m]), \"route\", \"$1\", \"router\", \"[^-]+-(.*?)-[a-f0-9]+@kubernetescrd\"))", "legendFormat": "{{route}}" } ]
        },
        {
          "id": 3, "type": "timeseries", "title": "4xx / 5xx by route (req/s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "sum by (route, code)(label_replace(rate(traefik_router_requests_total{code=~\"4..|5..\"}[5m]), \"route\", \"$1\", \"router\", \"[^-]+-(.*?)-[a-f0-9]+@kubernetescrd\"))", "legendFormat": "{{route}} {{code}}" } ]
        },
        {
          "id": 4, "type": "timeseries", "title": "Req/s by entrypoint",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "sum by (entrypoint)(rate(traefik_entrypoint_requests_total[5m]))", "legendFormat": "{{entrypoint}}" } ]
        },
        {
          "id": 5, "type": "table", "title": "Top paths on OPEN routes (24h)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "options": { "showHeader": true },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "stats", "expr": "{k8s.container.name=\"traefik\"} | unpack_json | RequestHost:~\"(aiometadata|aiostreams|comet|immich|mediafusion|stremthru)\" | stats by (RequestHost, RequestPath, DownstreamStatus) count() hits | sort by (hits desc) | limit 50" } ]
        },
        {
          "id": 6, "type": "logs", "title": "Recent requests to OPEN routes (host / path / status / client)",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "options": { "showTime": true, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "instant", "expr": "{k8s.container.name=\"traefik\"} | unpack_json | RequestHost:~\"(aiometadata|aiostreams|comet|immich|mediafusion|stremthru)\" | fields _time, ClientHost, RequestHost, RequestMethod, RequestPath, DownstreamStatus" } ]
        }
      ]
    }
