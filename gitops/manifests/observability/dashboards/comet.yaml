# Comet (Stremio debrid addon) dashboard. Provisioned by the Grafana sidecar.
# Comet exposes NO Prometheus /metrics endpoint, so this is built from the two
# signals that DO exist for it:
#   - Linkerd proxy golden signals in VM (it's meshed): inbound request rate +
#     success rate, keyed by linkerd_io_proxy_deployment="comet". No latency panel —
#     the linkerd latency histogram (response_latency_ms_bucket) is not scraped into VM.
#   - VictoriaLogs (datasource uid victorialogs): comet logs are plain-text pipe-
#     delimited lines, so panels word-match _msg.
# SPLIT (2026-06-17): comet is now two Deployments — comet (live, home-IP egress) and
# comet-bg (background scraper, VPN egress). Both log under k8s.container.name="comet";
# they differ only by k8s.pod.name (bg = "comet-bg"; live = NOT "comet-bg").
#   - SERVING section (top): Linkerd inbound = the live serving path by definition
#     (comet-bg has no Service/inbound), so it is NOT filtered by the pod variable.
#   - SCRAPE-HEALTH section: one set of log panels filtered by the $pod template
#     variable. The variable VALUE is the literal LogsQL filter fragment, interpolated
#     raw (${pod:raw}): Live=-k8s.pod.name:"comet-bg", Background=k8s.pod.name:"comet-bg",
#     All="" (no filter). Literal-fragment (not a pod-name regex) so it can't break when a
#     ReplicaSet hash starts with 'b'. Linkerd has NO outbound series for comet scrape
#     egress (external/proxied, unmeshed) — verified 0 in VM — so scrape health is logs-only.
# All queries verified non-empty (VM 8429 / VLogs vlsingle-obs:9428) before commit.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-comet
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  comet.json: |
    {
      "uid": "comet",
      "title": "Comet — Stremio Addon",
      "tags": ["comet", "stremio", "gitops"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "annotations": { "list": [] },
      "templating": {
        "list": [
          {
            "type": "custom",
            "name": "pod",
            "label": "Pod",
            "description": "Filter the scrape-health panels: Live (home IP) / Background (VPN) / All",
            "query": "Live : -k8s.pod.name:\"comet-bg\",Background : k8s.pod.name:\"comet-bg\",All : ",
            "includeAll": false,
            "multi": false,
            "refresh": 0,
            "hide": 0,
            "current": { "selected": true, "text": "All", "value": "" },
            "options": [
              { "selected": false, "text": "Live", "value": "-k8s.pod.name:\"comet-bg\"" },
              { "selected": false, "text": "Background", "value": "k8s.pod.name:\"comet-bg\"" },
              { "selected": true, "text": "All", "value": "" }
            ]
          }
        ]
      },
      "panels": [
        {
          "id": 100, "type": "row", "title": "Serving — live (inbound, not affected by $pod)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }, "collapsed": false
        },
        {
          "id": 1, "type": "stat", "title": "Inbound success rate",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "100 * sum(rate(response_total{linkerd_io_proxy_deployment=\"comet\",direction=\"inbound\",classification=\"success\"}[5m])) / sum(rate(response_total{linkerd_io_proxy_deployment=\"comet\",direction=\"inbound\"}[5m]))", "legendFormat": "success" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 90 }, { "color": "green", "value": 99 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 2, "type": "stat", "title": "Inbound request rate",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "sum(rate(request_total{linkerd_io_proxy_deployment=\"comet\",direction=\"inbound\"}[5m]))", "legendFormat": "req/s" } ],
          "fieldConfig": { "defaults": { "unit": "reqps", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 6, "type": "timeseries", "title": "Inbound success rate %",
          "gridPos": { "h": 5, "w": 12, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "100 * sum(rate(response_total{linkerd_io_proxy_deployment=\"comet\",direction=\"inbound\",classification=\"success\"}[5m])) / sum(rate(response_total{linkerd_io_proxy_deployment=\"comet\",direction=\"inbound\"}[5m]))", "legendFormat": "success %" } ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never", "thresholdsStyle": { "mode": "line" } }, "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 99 } ] } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } }
        },
        {
          "id": 5, "type": "timeseries", "title": "Inbound request rate by classification (/s)",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "victoriametrics" }, "expr": "sum by (classification) (rate(response_total{linkerd_io_proxy_deployment=\"comet\",direction=\"inbound\"}[5m]))", "legendFormat": "{{classification}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 15, "stacking": { "mode": "normal" }, "showPoints": "never" } }, "overrides": [ { "matcher": { "id": "byName", "options": "failure" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } } ] } ] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        },
        {
          "id": 101, "type": "row", "title": "Scrape health — $pod",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 12 }, "collapsed": false
        },
        {
          "id": 3, "type": "stat", "title": "429 events (range)",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 13 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "stats", "expr": "{k8s.container.name=\"comet\"} ${pod:raw} \"429\" | stats count() c" } ],
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 1 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^c$/" } }
        },
        {
          "id": 4, "type": "stat", "title": "Real errors (excl 429) (range)",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 13 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "stats", "expr": "{k8s.container.name=\"comet\"} ${pod:raw} ERROR -\"429\" -\"Max retries\" | stats count() c" } ],
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^c$/" } }
        },
        {
          "id": 11, "type": "stat", "title": "Scrape result lines (range)",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 13 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "stats", "expr": "{k8s.container.name=\"comet\"} ${pod:raw} \"Scraper\" \"found\" | stats count() c" } ],
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^c$/" } }
        },
        {
          "id": 12, "type": "stat", "title": "BG scraper cycles (range)",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 13 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "stats", "expr": "{k8s.container.name=\"comet\"} ${pod:raw} \"_run_scraping_cycle\" | stats count() c" } ],
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^c$/" } }
        },
        {
          "id": 7, "type": "table", "title": "Rate-limited upstream sources (429, range)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 18 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "stats", "expr": "{k8s.container.name=\"comet\"} ${pod:raw} \"429\" | extract \"[<src>]\" | stats by (src) count() hits | sort by (hits desc) | limit 15" } ],
          "fieldConfig": { "defaults": { "custom": { "align": "auto" } }, "overrides": [] },
          "options": { "sortBy": [ { "displayName": "hits", "desc": true } ] }
        },
        {
          "id": 8, "type": "table", "title": "Scraper activity — result lines by scraper (range)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 18 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "stats", "expr": "{k8s.container.name=\"comet\"} ${pod:raw} \"Scraper\" \"found\" | extract \"Scraper <scraper> found\" | stats by (scraper) count() lines | sort by (lines desc) | limit 15" } ],
          "fieldConfig": { "defaults": { "custom": { "align": "auto" } }, "overrides": [] },
          "options": { "sortBy": [ { "displayName": "lines", "desc": true } ] }
        },
        {
          "id": 9, "type": "logs", "title": "Recent BACKGROUND_SCRAPER / ERROR / 429 / WARNING lines",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" },
          "targets": [ { "refId": "A", "datasource": { "type": "victoriametrics-logs-datasource", "uid": "victorialogs" }, "queryType": "instant", "expr": "{k8s.container.name=\"comet\"} ${pod:raw} (BACKGROUND_SCRAPER OR ERROR OR \"429\" OR WARNING) | fields _time, _msg" } ],
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending", "dedupStrategy": "none" }
        }
      ]
    }
