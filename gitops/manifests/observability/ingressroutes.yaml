# Wave 2 — external access via Traefik IngressRoute (k3s ships Traefik as the
# default ingress controller). Domain-based + TLS. TLS certs are issued by cert-manager via the
# "selfsigned" ClusterIssuer (cluster-issuer.yaml) — browsers show an untrusted
# warning (fine internal); swap to an ACME DNS-01 ClusterIssuer for a trusted cert.
#
# Grafana, vmui, and VictoriaLogs are all placed behind the in-cluster Authelia
# forward-auth (the local 'authelia' Middleware below → authelia.apps.svc:9091).
# Grafana additionally keeps its OWN login (defense-in-depth): Authelia 2FA gates the
# public edge, then Grafana authenticates the user. The `*.my-blue-car.work → two_factor`
# Authelia rule already covers grafana, so no access_control change is needed. external-dns
# publishes each host (Cloudflare-proxied) at the origin IP via its --default-targets arg.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.my-blue-car.work`)
      kind: Rule
      services:
        - name: grafana
          port: 80
      middlewares:
        - name: authelia          # 2FA at the public edge (Grafana keeps its own login behind)
  # Serve the trusted wildcard *.my-blue-car.work default cert (TLSStore default), not the
  # former self-signed grafana-tls — its Certificate was removed (nothing else used it).
  tls: {}
---
# Local forward-auth Middleware (Traefik v3 blocks cross-namespace middleware refs by
# default, so we define one here rather than referencing apps/authelia). The forwardAuth
# address is a plain URL → reaches the Authelia Service across namespaces at the HTTP layer.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  forwardAuth:
    address: 'http://authelia.apps.svc.cluster.local:9091/api/authz/forward-auth'
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Email
      - Remote-Name
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vmui
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`vm.my-blue-car.work`)
      kind: Rule
      services:
        - name: vmsingle-obs
          port: 8428
      middlewares:
        - name: authelia
  # Trusted wildcard *.my-blue-car.work (TLSStore default), same as grafana. Previously a
  # self-signed vmui-tls cert, only because the old 2-label host vm.k8s.<domain> can't be
  # covered by the single-label wildcard. Single-label host → trusted cert, no warning.
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vlogs-ui
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`logs.my-blue-car.work`)
      kind: Rule
      services:
        - name: vlsingle-obs
          port: 9428
      middlewares:
        - name: authelia
  tls: {}
