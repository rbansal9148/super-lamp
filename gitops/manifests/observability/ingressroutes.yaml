# Wave 2 — external access via Traefik IngressRoute (k3s ships Traefik as the
# default ingress controller). Domain-based + TLS. TLS certs are issued by cert-manager via the
# "selfsigned" ClusterIssuer (cluster-issuer.yaml) — browsers show an untrusted
# warning (fine internal); swap to an ACME DNS-01 ClusterIssuer for a trusted cert.
#
# Grafana owns its own auth. The VM (vmui) and VictoriaLogs UIs have NO built-in
# auth, so they are placed behind the in-cluster Authelia forward-auth (the local
# 'authelia' Middleware below → authelia.apps.svc:9091). Hosts are under the
# k8s.my-blue-car.work cookie domain so the Authelia session cookie applies.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: grafana-tls
  # Self-signed issuer (see cluster-issuer.yaml). Real Let's Encrypt is NOT
  # possible here: HTTP-01 needs :80, which the live Docker Traefik owns; switch
  # to an ACME DNS-01 ClusterIssuer (needs your DNS-provider API creds) for a
  # publicly-trusted cert.
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - grafana.my-blue-car.work
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.my-blue-car.work`)
      kind: Rule
      services:
        - name: grafana
          port: 80
  tls:
    secretName: grafana-tls
---
# Local forward-auth Middleware (Traefik v3 blocks cross-namespace middleware refs by
# default, so we define one here rather than referencing apps/authelia). The forwardAuth
# address is a plain URL → reaches the Authelia Service across namespaces at the HTTP layer.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  forwardAuth:
    address: 'http://authelia.apps.svc.cluster.local:9091/api/authz/forward-auth'
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Email
      - Remote-Name
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vmui-tls
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: vmui-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - vm.k8s.my-blue-car.work
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vmui
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`vm.k8s.my-blue-car.work`)
      kind: Rule
      services:
        - name: vmsingle-obs
          port: 8428
      middlewares:
        - name: authelia
  tls:
    secretName: vmui-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vlogs-ui-tls
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: vlogs-ui-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - logs.k8s.my-blue-car.work
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vlogs-ui
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`logs.k8s.my-blue-car.work`)
      kind: Rule
      services:
        - name: vlsingle-obs
          port: 9428
      middlewares:
        - name: authelia
  tls:
    secretName: vlogs-ui-tls
