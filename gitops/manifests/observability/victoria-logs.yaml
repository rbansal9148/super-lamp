# Wave 1 — single-node logs backend (ADR D2). Receives OTLP log pushes from the
# DaemonSet collector at :9428/insert/opentelemetry/v1/logs. Creates Service
# "vlsingle-obs:9428".
# NOTE: kind VLogs is deprecated in vm-operator v0.70.1 (it transits to read-only
# state — "Please migrate to the VLSingle"). VLSingle is the current single-node
# logs CR (apiVersion operator.victoriametrics.com/v1).
apiVersion: operator.victoriametrics.com/v1
kind: VLSingle
metadata:
  name: obs
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # CRD (VLSingle) installed by vm-operator earlier in the sync — skip pre-sync dry-run.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  retentionPeriod: "1"                   # 1 month — required field; cap from day one (primer §5)
  # NOTE: VLSingle (v0.70.1) has NO removePvcAfterDelete field (unlike VMSingle) — setting
  # it is a silently-ignored no-op AND fails `kubeconform -strict`. The data PVC is
  # owner-referenced to this CR, and local-path's StorageClass reclaimPolicy is Delete, so
  # data durability (ADR guardrail 4) is NOT enforced here — it must come from a PV-level
  # reclaimPolicy: Retain. See vm-single.yaml: the same caveat applies to VMSingle's PVC.
  storage:
    accessModes:
      - ReadWriteOnce
    storageClassName: local-path
    resources:
      requests:
        storage: 20Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 25m
    limits:
      memory: 384Mi   # rightsized: 7d peak ~95Mi (was 1Gi)
      cpu: "1"
