# Wave 2 — close the ADR's stated gap: Traefik currently exposes NO Prometheus
# metrics endpoint (0001:28-29). On k3s, Traefik is installed via a HelmChart, so
# its values are patched through a HelmChartConfig in kube-system. Then a
# ServiceMonitor points the OTel Target Allocator at it for golden-signal metrics
# (request rate, latency percentiles, 4xx/5xx per router — ADR D-context, D5).
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  valuesContent: |-
    # Preserve the real client source IP. k3s ServiceLB (klipper) SNATs traffic to the
    # node under the default Cluster policy, so Traefik saw 10.42.0.1 and the Cloudflare
    # trustedIPs never matched (ClientHost was always the node). Local keeps the source
    # (the CF edge IP), which IS in trustedIPs, so X-Forwarded-For resolves to the real
    # visitor. Single-node cluster, so Local's uneven-distribution caveat doesn't apply.
    service:
      spec:
        externalTrafficPolicy: Local
    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addServicesLabels: true
        addRoutersLabels: true
    logs:
      # Access logs → stdout as JSON; the OTel node-collector tails them into
      # VictoriaLogs (vlsingle-obs) automatically — query in Grafana with
      #   {k8s.namespace.name="kube-system", k8s.container.name="traefik"}
      # Each line carries ClientHost (real visitor IP, see trustedIPs below),
      # RequestHost, RequestPath, RouterName, DownstreamStatus, Duration, etc.
      # SECURITY: headers default to "drop", so session cookies / Authorization
      # are NEVER written. NOTE: RequestPath IS logged — for the Stremio addons
      # (comet/aiostreams/…) the path embeds the user config blob, which can carry
      # debrid keys. The log store is internal + Authelia-gated to you, but if you'd
      # rather not retain those, add  fields.general.names: { RequestPath: redact }.
      access:
        enabled: true
        format: json
        fields:
          general:
            defaultmode: keep
          headers:
            defaultmode: drop                  # cookies / Authorization NEVER written
            names:
              # Capture request-correlation IDs only (not secrets) so a single request
              # can be followed across components in VictoriaLogs without a trace backend.
              # Cf-Ray = Cloudflare's per-request id (origin is behind CF) → the join key.
              # traceparent / X-Request-Id are kept ahead of the later OTLP step so app
              # spans (when instrumented) correlate to the same id. LogsQL recipe:
              #   {k8s.container.name="traefik"} | unpack_json | filter request_Cf-Ray:"<id>"
              Cf-Ray: keep
              X-Request-Id: keep
              traceparent: keep
    ports:
      # :443 cutover COMPLETE — k3s Traefik now owns host :80/:443 (Docker Traefik
      # decommissioned). Mirrors the bootstrap override at
      # /var/lib/rancher/k3s/server/manifests/traefik-ports.yaml.
      web:
        exposedPort: 80
        # Trust Cloudflare's edge ranges so X-Forwarded-For resolves to the real
        # visitor IP (CF proxies all public traffic). A direct origin-bypass hit to
        # 161.118.165.53 is NOT in these ranges, so it logs its true source IP —
        # which makes origin-bypass access visible. Source: cloudflare.com/ips.
        forwardedHeaders:
          trustedIPs:
            - 173.245.48.0/20
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 141.101.64.0/18
            - 108.162.192.0/18
            - 190.93.240.0/20
            - 188.114.96.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 162.158.0.0/15
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 172.64.0.0/13
            - 131.0.72.0/22
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2a06:98c0::/29
            - 2c0f:f248::/32
      websecure:
        exposedPort: 443
        # Same Cloudflare trusted ranges as :80 (kept explicit, not a YAML anchor, so
        # the helm-controller can't mis-handle an alias on cluster-wide ingress config).
        forwardedHeaders:
          trustedIPs:
            - 173.245.48.0/20
            - 103.21.244.0/22
            - 103.22.200.0/22
            - 103.31.4.0/22
            - 141.101.64.0/18
            - 108.162.192.0/18
            - 190.93.240.0/20
            - 188.114.96.0/20
            - 197.234.240.0/22
            - 198.41.128.0/17
            - 162.158.0.0/15
            - 104.16.0.0/13
            - 104.24.0.0/14
            - 172.64.0.0/13
            - 131.0.72.0/22
            - 2400:cb00::/32
            - 2606:4700::/32
            - 2803:f800::/32
            - 2405:b500::/32
            - 2405:8100::/32
            - 2a06:98c0::/29
            - 2c0f:f248::/32
        # Global default middleware: every websecure route inherits the security
        # headers (HSTS/frameDeny/nosniff) — see manifests/observability/security-headers.yaml.
        # Provider-namespaced ref: <namespace>-<name>@kubernetescrd.
        middlewares:
          - kube-system-security-headers@kubernetescrd
      metrics:
        port: 9100
        # expose.default: false → the metrics entrypoint stays defined and the pod keeps
        # LISTENING on :9100, but the port is NOT added to the public LoadBalancer service
        # (k3s ServiceLB would otherwise host-bind it on the node's public IP). Internal
        # scraping uses the dedicated ClusterIP `traefik-metrics` service below instead.
        expose:
          default: false
        exposedPort: 9100
        protocol: TCP
---
# Dedicated ClusterIP service for Traefik metrics. Selects the Traefik pods and exposes
# :9100 cluster-internally ONLY (no LoadBalancer), so the OTel TA can scrape it while the
# metrics port is no longer published on the node's public IP. Lives in kube-system with
# the Traefik pods; its own label (traefik-metrics) is what the ServiceMonitor targets.
apiVersion: v1
kind: Service
metadata:
  name: traefik-metrics
  namespace: kube-system
  labels:
    app.kubernetes.io/name: traefik-metrics
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: traefik
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # CRD (ServiceMonitor) installed by prometheus-operator-crds earlier — skip pre-sync dry-run.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik-metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
