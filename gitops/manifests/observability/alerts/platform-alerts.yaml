# Wave 2 — active Grafana-provisioned alert rules (Path A from alerts.yaml).
# Loaded by the Grafana alerting sidecar (label grafana_alert, enabled in
# grafana.yaml). Routing contact point + policy → ntfy are provisioned in
# grafana.yaml; these are the RULES that actually fire into that pipe.
#
# Scope: the failure classes the single operator cannot self-detect by using the
# apps — silent disk-fill (the ADR's #1 documented failure mode, on Delete-reclaim
# local-path PVCs where a full disk corrupts the TSDB) and scrape-target-down.
#
# IMPORTANT — metric naming: VictoriaMetrics stores OTLP metrics under their LITERAL
# DOTTED names (and dotted label names), queried via the {__name__="k8s.node..."}
# selector — NOT as underscore_names. An earlier version of these rules assumed the
# Prometheus API rewrote dots to underscores; it does not, so those queries matched
# zero series and the rules fired DatasourceNoData every cycle. Metrics VERIFIED
# flowing in VMSingle and used below:
#   {__name__="k8s.node.filesystem.usage"} / {__name__="k8s.node.filesystem.capacity"}
#       (kubeletstats, node root fs — group by k8s.node.name)
#   up   (scrape health — this one is a classic underscore name; not OTLP)
#
# NOTE: pod-crashloop AND per-PVC disk alerting are both intentionally omitted — they
# need kube-state-metrics (kube_pod_container_status_restarts_total;
# kubelet_volume_stats_available_bytes with persistentvolumeclaim labels), which is
# not deployed. kubeletstats emits node/pod resource usage with no restart counters
# and no per-PVC claim labels. Adding KSM + those rules is a separate follow-up.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-platform-alerts
  namespace: observability
  labels:
    grafana_alert: "1"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  platform-alerts.yaml: |
    apiVersion: 1
    # One-time tombstone for the orphaned 'pvc-low-space' rule. It was
    # provisioned into Grafana's DB before being removed from the groups below;
    # once in the DB at provenance=file it is IMMUTABLE via the provisioning API
    # (DELETE /api/v1/provisioning/alert-rules/:uid → 409 provenanceMismatch,
    # 'needs file'). The deleteRules directive below IS file provisioning, so it
    # deletes the orphan at its own provenance. Idempotent: a no-op once gone.
    # Safe to leave as a permanent tombstone (re-asserts the rule stays deleted).
    deleteRules:
      - orgId: 1
        uid: pvc-low-space
    groups:
      - orgId: 1
        name: platform-capacity
        folder: platform
        interval: 1m
        rules:
          # NOTE: the former 'pvc-low-space' rule was REMOVED. It queried
          # k8s_volume_available_bytes/_capacity_bytes which do not exist, and the
          # kubeletstats volume metrics that DO exist (k8s.volume.available/capacity)
          # carry no PVC claim label — every pod volume (incl. ephemeral) just mirrors
          # the node-root filesystem's free space on this single node. So a per-PVC
          # alert is not expressible here; it was pure duplication of node-disk-full
          # below (both read the same host disk). A real per-PVC alert needs
          # kube-state-metrics (kubelet_volume_stats_*_bytes with persistentvolumeclaim
          # labels), which is not deployed — see the KSM follow-up note up top.

          # ── Node filesystem nearly full: >85% used ──
          # VictoriaMetrics stores OTLP metrics under their LITERAL DOTTED names and
          # dotted label names; they are queried via the {__name__="..."} selector, NOT
          # as underscore_names (the earlier system_filesystem_usage_bytes form matched
          # nothing → the alert fired DatasourceNoData every cycle instead of evaluating).
          - uid: node-disk-full
            title: Node filesystem >85% used
            condition: C
            for: 10m
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    max by (k8s.node.name) (
                      {__name__="k8s.node.filesystem.usage"}
                      /
                      {__name__="k8s.node.filesystem.capacity"}
                    )
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0.85] }
            labels: { severity: warning }
            annotations:
              summary: 'Node filesystem on {{ index $labels "k8s.node.name" }} over 85% used'

          # ── Node memory pressure: MemAvailable < ~10% (>90% used) ──
          # Swapless single node, so MemAvailable hitting low == imminent OOM (the
          # kernel can't fall back to swap). We alert on the OTLP MemAvailable gauge
          # (k8s.node.memory.available) directly, NOT usage/total: kubeletstats'
          # k8s.node.memory.usage counts reclaimable page cache, so usage+available
          # exceeds node total and a usage ratio would false-fire. Absolute threshold
          # 2.5e9 bytes ≈ 10% of this node's 23.4 GiB (24550352Ki) — the condition the
          # control-plane mem-limit overcommit would create before BestEffort pods die.
          - uid: node-memory-pressure
            title: Node memory >90% used
            condition: C
            for: 5m
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    min by (k8s.node.name) ({__name__="k8s.node.memory.available"})
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: lt, params: [2500000000] }
            labels: { severity: warning }
            annotations:
              summary: 'Node {{ index $labels "k8s.node.name" }} memory available below 2.5Gi (>90% used)'

      - orgId: 1
        name: platform-scrape
        folder: platform
        interval: 1m
        rules:
          # ── Scrape target down: any monitored endpoint not responding ──
          # (caught the traefik/authelia targets; also the exact silent-failure
          # class hit twice this week — TA RBAC, empty scrape_configs.)
          - uid: scrape-target-down
            title: Scrape target down
            condition: C
            for: 5m
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: min by (job) (up)
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            labels: { severity: critical }
            annotations:
              summary: "Scrape target {{ $labels.job }} is down (up=0)"

      - orgId: 1
        name: platform-workload
        folder: platform
        interval: 1m
        rules:
          # ── Container crash-looping: >3 in-place restarts in 15m ──
          # Source: kube-state-metrics (manifests/observability/kube-state-metrics.yaml).
          # LABEL TRAP: the OTel scrape attaches the KSM pod's OWN identity as
          # pod/namespace/container, so KSM's real SUBJECT is in exported_{namespace,
          # pod,container} (verified via /api/v1/query — `pod` == the KSM pod). Group by
          # the exported_* labels or every alert mislabels as "kube-state-metrics".
          # restarts_total only increments on IN-PLACE restarts (a normal rollout makes a
          # fresh pod starting at 0), so >3 in 15m is a clean crash-loop signal — no
          # rollout false positives. noDataState=OK: a healthy cluster emits no series >3.
          - uid: pod-crashlooping
            title: Container crash-looping
            condition: C
            for: 5m
            noDataState: OK
            execErrState: OK
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    max by (exported_namespace, exported_pod, exported_container) (
                      increase(kube_pod_container_status_restarts_total[15m])
                    )
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [3] }
            labels: { severity: warning }
            annotations:
              summary: '{{ index $labels "exported_namespace" }}/{{ index $labels "exported_pod" }} container {{ index $labels "exported_container" }} restarted >3× in 15m — crash-looping'

          # ── Container OOMKilled (recent) ──
          # Fires only when the last termination reason was OOMKilled AND the container
          # restarted within 15m → a FRESH OOM, not a stale historical one. Auto-clears
          # 15m after the last OOM restart, so it isn't sticky. Actionable: raise that
          # container's memory limit. Same exported_* label trap as above.
          - uid: pod-oomkilled
            title: Container OOMKilled
            condition: C
            for: 1m
            noDataState: OK
            execErrState: OK
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    max by (exported_namespace, exported_pod, exported_container) (
                      kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}
                      and on (exported_namespace, exported_pod, exported_container)
                      increase(kube_pod_container_status_restarts_total[15m]) > 0
                    )
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            labels: { severity: warning }
            annotations:
              summary: '{{ index $labels "exported_namespace" }}/{{ index $labels "exported_pod" }} container {{ index $labels "exported_container" }} was OOMKilled — raise its memory limit'

          # ── Pod not Ready for 15m: Pending/unschedulable, ImagePullBackOff, or a
          #    failing readiness probe ──
          # Source: kube-state-metrics. Closes the gap crashloop+OOM miss — those need
          # restarts; a pod stuck Pending (the ollama-bench unschedulable incident) or
          # failing readiness (the paperless ALLOWED_HOSTS incident) has ZERO restarts and
          # fired NEITHER existing alert. kube_pod_status_ready{condition="true"}==0 keeps
          # only not-ready pods; `count` turns that into a fireable 1; the `unless` drops
          # completed pods (phase=Succeeded) so finished Jobs don't alert. Same exported_*
          # label trap as the rules above. for:15m so rollouts/restarts don't trip it.
          - uid: pod-not-ready
            title: Pod not Ready (15m)
            condition: C
            for: 15m
            noDataState: OK
            execErrState: OK
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    count by (exported_namespace, exported_pod) (
                      kube_pod_status_ready{condition="true"} == 0
                    )
                    unless on (exported_namespace, exported_pod)
                    (kube_pod_status_phase{phase="Succeeded"} == 1)
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            labels: { severity: warning }
            annotations:
              summary: '{{ index $labels "exported_namespace" }}/{{ index $labels "exported_pod" }} not Ready for 15m — check kubectl describe pod (Pending / ImagePullBackOff / readiness probe)'

      - orgId: 1
        name: platform-certs
        folder: platform
        interval: 5m
        rules:
          # ── TLS cert expiring within 14d ──
          # Source: cert-manager controller metrics (servicemonitors/cert-manager.yaml).
          # cert-manager auto-renews at ~2/3 of cert lifetime, so for a 90d Let's Encrypt
          # cert renewal happens ~30d out. If under 14d remain, renewal is FAILING (ACME
          # challenge broken, rate-limited, DNS) and needs a push — the operator never sees
          # a cert page until the browser throws. `name` is the Certificate resource name.
          - uid: cert-expiring-soon
            title: TLS certificate expiring <14d
            condition: C
            for: 1h
            noDataState: OK
            execErrState: OK
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    (
                      min by (name) (certmanager_certificate_expiration_timestamp_seconds)
                      - time()
                    ) / 86400
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: lt, params: [14] }
            labels: { severity: warning }
            annotations:
              summary: 'Certificate {{ $labels.name }} expires in <14d — cert-manager renewal is failing'

      - orgId: 1
        name: platform-gitops
        folder: platform
        interval: 5m
        rules:
          # ── ArgoCD app OutOfSync for 15m ──
          # Source: argocd-application-controller metrics (servicemonitors/argocd.yaml).
          # Every app here is auto-sync, so a transient OutOfSync self-heals in seconds.
          # 15m of sustained OutOfSync means sync is FAILING (bad manifest, hook stuck,
          # repo unreachable) and the cluster is silently drifting from git. argocd_app_info
          # is 1 per app; the sync_status filter keeps only the drifted ones. `name` (the
          # Application name) is intrinsic and survives the OTel pod-identity relabel.
          - uid: argocd-out-of-sync
            title: ArgoCD app OutOfSync (15m)
            condition: C
            for: 15m
            noDataState: OK
            execErrState: OK
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    max by (name) (
                      argocd_app_info{sync_status=~"OutOfSync|Unknown"}
                    )
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            labels: { severity: warning }
            annotations:
              summary: 'ArgoCD app {{ $labels.name }} OutOfSync for 15m — sync is failing, cluster drifting from git'

          # ── ArgoCD app Degraded/Missing for 15m ──
          # Degraded = the app's resources are unhealthy; Missing = expected resources gone.
          # Progressing/Unknown are intentionally excluded (Progressing is normal mid-sync;
          # Unknown is usually a brief controller hiccup). for:15m filters rollout noise.
          - uid: argocd-degraded
            title: ArgoCD app Degraded (15m)
            condition: C
            for: 15m
            noDataState: OK
            execErrState: OK
            data:
              - refId: A
                relativeTimeRange: { from: 900, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    max by (name) (
                      argocd_app_info{health_status=~"Degraded|Missing"}
                    )
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            labels: { severity: warning }
            annotations:
              summary: 'ArgoCD app {{ $labels.name }} health is Degraded/Missing for 15m — check the app resources'

      - orgId: 1
        name: platform-auth
        folder: platform
        interval: 1m
        rules:
          # ── Authelia failed-login spike: >20 failed first-factor auths in 10m ──
          # Source: authelia metrics (servicemonitors live in authelia/authelia.yaml).
          # authelia_authn_duration_count{success="false"} counts failed first-factor logins.
          # Authelia's own regulation bans after 3 failures/2m PER USER, so a legitimate
          # fat-finger never reaches 20 globally — this catches the distributed / multi-user
          # credential-stuffing case that per-user regulation can't see. noDataState=OK: a
          # healthy realm emits no success="false" series at all (increase → no data).
          - uid: authelia-failed-logins
            title: Authelia failed-login spike
            condition: C
            for: 2m
            noDataState: OK
            execErrState: OK
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    sum(increase(authelia_authn_duration_count{success="false"}[10m]))
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [20] }
            labels: { severity: warning }
            annotations:
              summary: '>20 failed Authelia logins in 10m — possible credential-stuffing / brute-force'
