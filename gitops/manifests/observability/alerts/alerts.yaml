# Wave 2 — Traefik HTTP-symptom alert (primer §6: alert on symptoms, not causes).
# Active path = Grafana-managed rule via a ConfigMap the alerting sidecar loads
# (label grafana_alert). Routing (contact point + policy → ntfy) is in grafana.yaml.
#
# History: this file previously shipped a VMRule (TraefikHigh5xxRate). This topology
# has NO vmalert deployment (alerting is consolidated on Grafana), so the VMRule was
# never evaluated — a silent dead alert. Converted to a Grafana-provisioned rule so
# 5xx is actually monitored. Metric VERIFIED present in VMSingle (Prometheus-native,
# NOT OTLP-dotted): traefik_router_requests_total{code=~"5.."} (57 series live).
#
# Why this matters: crashloop / OOM / pod-not-ready / scrape-down (platform-alerts)
# all PASS for a pod that is Ready but serving 500s (app-level fault, DB down,
# upstream 5xx). This rule is the only one that catches that user-visible class.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-traefik-alerts
  namespace: observability
  labels:
    grafana_alert: "1"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  traefik-alerts.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: traefik-http
        folder: platform
        interval: 1m
        rules:
          # ── Traefik 5xx rate >5% per router, sustained 10m ──
          # The full ratio lives in the PromQL query (refId A); C thresholds it. for:10m
          # (vs the old VMRule's 5m) dampens single-500 blips on low-traffic routers — a
          # homelab router may see few requests, so a sustained 10m breach is the real
          # signal. Routers with zero traffic produce no series (0/0) and never fire.
          - uid: traefik-5xx-rate
            title: Traefik 5xx rate elevated
            condition: C
            for: 10m
            # The ratio query returns NO series when there are zero 5xx (numerator empty)
            # — which Grafana's default noDataState treats as a firing DatasourceNoData
            # alert. For a 5xx-rate rule, "no 5xx data" == healthy, so map NoData -> OK.
            # A genuinely broken query surfaces via execErrState (Error) + scrape-down.
            noDataState: OK
            execErrState: Error
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: victoriametrics
                model:
                  refId: A
                  instant: true
                  expr: |-
                    sum by (router) (rate(traefik_router_requests_total{code=~"5.."}[5m]))
                      /
                    sum by (router) (rate(traefik_router_requests_total[5m]))
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator: { type: gt, params: [0.05] }
            labels: { severity: warning }
            annotations:
              summary: "Traefik router {{ $labels.router }} 5xx rate >5% for 10m — a Ready pod is serving errors (check the backend app/DB/upstream)"
