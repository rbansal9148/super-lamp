# Wave 1 — the two-tier OTel Collector topology (ADR D3, primer §3).
#   - "scrape" (StatefulSet + Target Allocator): discovers ServiceMonitors, scrapes
#     /metrics, pushes OTLP metrics to VictoriaMetrics.
#   - "node" (DaemonSet): node-local logs (filelog) + host/kubelet metrics, pushes
#     OTLP logs to VictoriaLogs and metrics to VictoriaMetrics.
#
# RBAC: the operator creates the ServiceAccounts (<name>-collector, scrape-targetallocator)
# but cluster-scoped read permissions must be granted explicitly.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observability-otel
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  # `pods` + `namespaces` below ALSO back the node collector's k8sattributes processor
  # (workload-name enrichment) — don't strip them.
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, nodes/stats, nodes/proxy, services, endpoints, pods, namespaces, configmaps, secrets]
    verbs: [get, list, watch]
  # k8sattributes derives k8s.deployment.name from the pod owner-ref (works without this),
  # but processor v0.152.1 ALSO starts a ReplicaSet informer regardless and, without this
  # grant, retries `replicasets.apps is forbidden` forever — error spam into VictoriaLogs +
  # api-server churn. Granting read on replicasets silences it (verified in node-collector
  # logs Jun 2026). Contradicts the upstream README's "not needed at default" note.
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors, podmonitors, probes, scrapeconfigs]
    verbs: [get, list, watch]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-otel
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: observability-otel
subjects:
  - kind: ServiceAccount
    name: scrape-collector
    namespace: observability
  - kind: ServiceAccount
    name: scrape-targetallocator
    namespace: observability
  - kind: ServiceAccount
    name: node-collector
    namespace: observability
---
# ── Tier 1: scrape collector (StatefulSet) + Target Allocator ──────────────────
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: scrape
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # CRD (OpenTelemetryCollector) installed by otel-operator earlier — skip pre-sync dry-run.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mode: statefulset
  # baseline hardening (collector container already runs as image USER 10001/non-root)
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities: { drop: [ALL] }
    seccompProfile: { type: RuntimeDefault }
  replicas: 1                            # ADR D7: scale via TA sharding when target count demands
  # Co-located host (24Gi shared with the live Docker stack). A cgroup memory limit
  # MUST be set: memory_limiter's limit_percentage (below) is computed against the
  # cgroup limit, and with no limit it falls back to the 24Gi node total — under a
  # metrics spike the collector could balloon and starve the Docker containers.
  resources:
    requests:
      memory: 256Mi   # req→256Mi: 30d peak 318Mi (was 128Mi, under-counted). limit/memory_limiter unchanged.
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m
  targetAllocator:
    enabled: true
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities: { drop: [ALL] }
      seccompProfile: { type: RuntimeDefault }
    allocationStrategy: consistent-hashing
    resources:
      requests:
        memory: 64Mi
        cpu: 25m
      limits:
        memory: 256Mi
        cpu: 250m
    prometheusCR:
      enabled: true
      serviceMonitorSelector: {}         # all ServiceMonitors
      podMonitorSelector: {}             # all PodMonitors
      scrapeInterval: 30s
  config:
    receivers:
      prometheus:
        config:
          # `scrape_configs` MUST be present (even empty) or the Target Allocator
          # reconcile fails: "no scrape_configs available as part of the
          # configuration" and the TA pod is never created. The TA injects the
          # ServiceMonitor/PodMonitor-derived jobs into this list at runtime.
          scrape_configs: []
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      deltatocumulative: {}              # MANDATORY — VM rejects delta temporality (ADR D3 / primer §1)
      batch:
        send_batch_size: 8192
        timeout: 5s
      # ADR D7 §8: for autoscaled Tier-A workloads, drop high-churn pod identity labels
      # here once HPA is in play, e.g. a transform/metricstransform processor stripping
      # the `pod`/`instance` labels where only the per-Service aggregate is queried.
    exporters:
      otlphttp/vm:
        # otlphttp posts to the exact VM OTLP path (ADR D3 verified endpoint)
        metrics_endpoint: http://vmsingle-obs.observability.svc:8428/opentelemetry/v1/metrics
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, deltatocumulative, batch]
          exporters: [otlphttp/vm]
---
# ── Tier 2: node collector (DaemonSet) — logs + host/kubelet metrics ───────────
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: node
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # CRD (OpenTelemetryCollector) installed by otel-operator earlier — skip pre-sync dry-run.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mode: daemonset
  # baseline hardening: reads /var/log/pods (filelog) + kubeletstats as USER 10001 today;
  # drop ALL is a no-op for a non-root container, no-esc + seccomp tighten it.
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities: { drop: [ALL] }
    seccompProfile: { type: RuntimeDefault }
  # Runs on every node alongside the Docker stack — bound it for the same reason as
  # the scrape collector: limit_percentage needs this cgroup limit to be host-safe.
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m
  daemonSetUpdateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
  config:
    receivers:
      otlp:                              # apps that emit OTLP directly (future-facing)
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        include_file_path: true
        operators:
          - type: container              # parses the CRI/containerd log envelope (contrib)
          # ── severity extraction (gaps 1+2) ──────────────────────────────────
          # The `container` op leaves the app log line as an opaque string body, so
          # every record exported with SeverityNumber=0 ("Unspecified" in VictoriaLogs
          # — 100% of 16k+ logs/hr, verified Jun 29). Branch by body shape, parse the
          # level field, and map it to OTLP severity so `severity_text:error` is
          # queryable. Cluster traffic is mixed: ArgoCD/Go apps emit logfmt
          # (`level=info msg=…`, ~77% of volume), others emit JSON.
          - type: router
            id: fmt-router
            routes:
              - expr: 'hasPrefix(body, "{")'          # JSON-bodied logs (zap/zerolog, aiostreams)
                output: parse-json
              - expr: 'indexOf(body, "level=") != -1' # logfmt (ArgoCD, klog, logrus)
                output: parse-logfmt
              - expr: 'resource["k8s.container.name"] == "postgres"'  # PG text format (data tier)
                output: parse-postgres
            default: sev-done                         # no recognizable severity → keep, Unspecified
          - type: json_parser
            id: parse-json
            parse_from: body
            parse_to: attributes
            on_error: send_quiet                      # malformed JSON → keep the log, don't drop
            output: parse-severity
          - type: regex_parser
            id: parse-logfmt
            parse_from: body
            regex: '(^|\s)level=(?P<level>\w+)'
            parse_to: attributes
            on_error: send_quiet
            output: parse-severity
          - type: severity_parser
            id: parse-severity
            parse_from: attributes.level
            preset: default                           # info/warn/error/fatal/debug/trace + values
            mapping:                                  # extend defaults with common aliases
              warn: [warning]
              error: [err, panic]
              fatal: [critical, crit]
            on_error: send_quiet                      # no/unknown level → leave Unspecified, keep log
            output: sev-done
          # Postgres text format: `… [<pid>] LOG|ERROR|FATAL|WARNING|…:`. The format is
          # fixed (can't be cleanly reshaped at source), so normalize it here. PG's LOG
          # and NOTICE are info-level, so an explicit mapping (preset: none) is required.
          - type: regex_parser
            id: parse-postgres
            parse_from: body
            regex: '\]\s+(?P<pglevel>[A-Z]+):'
            parse_to: attributes
            on_error: send_quiet
            output: parse-pg-severity
          - type: severity_parser
            id: parse-pg-severity
            parse_from: attributes.pglevel
            preset: none
            mapping:
              debug: [DEBUG, DEBUG1, DEBUG2, DEBUG3, DEBUG4, DEBUG5]
              info: [LOG, INFO, NOTICE]
              warn: [WARNING]
              error: [ERROR]
              fatal: [FATAL, PANIC]
            on_error: send_quiet
            output: sev-done
          - type: noop
            id: sev-done
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          memory: {}
          load: {}
          filesystem: {}
          network: {}
      kubeletstats:                      # per-pod/container metrics from the local kubelet
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: https://${env:K8S_NODE_NAME}:10250
        insecure_skip_verify: true
        metric_groups: [node, pod, container, volume]
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      # Stamp pod metrics with their owning WORKLOAD so peak usage can be aggregated
      # across pod rollovers (a deploy/restart mints a new pod name; kubeletstats keys
      # purely by pod name, so a pre-rollover spike is invisible to a per-pod peak query
      # — the zilean "looks 12× oversized" blind-spot). k8s.deployment.name is derived
      # from the pod's owner ReplicaSet name (default deployment_name_from_replicaset:true).
      # NB: the processor still starts a ReplicaSet informer, so the ClusterRole grants
      # replicasets read (see RBAC above) to avoid forbidden-watch error spam.
      # node_from_env_var scopes the informer to THIS node's pods (daemonset hygiene).
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: K8S_NODE_NAME
        pod_association:
          - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
          - sources:
              - { from: resource_attribute, name: k8s.pod.name }
              - { from: resource_attribute, name: k8s.namespace.name }
        extract:
          metadata: [k8s.deployment.name, k8s.statefulset.name, k8s.daemonset.name]
      resourcedetection:
        detectors: [env, system]
        system:
          hostname_sources: [os]
      batch:
        timeout: 5s
      deltatocumulative: {}
      # ADR guardrail 2: log VOLUME is controlled at the SOURCE, not by dropping in the
      # collector. A collector-side drop leaves the raw pod logs (kubectl logs / stern)
      # just as noisy and bakes per-app policy into shared infra. ArgoCD's info spam
      # (~77% of volume, verified Jun 29) is silenced at source via controller.log.level=warn
      # in gitops/apps/argocd.yaml. The collector's job is severity PARSING (filelog
      # operators above); the log LEVEL belongs to the app.
    exporters:
      otlphttp/vlogs:
        # VLSingle 'obs' -> Service "vlsingle-obs" (vm-operator naming)
        logs_endpoint: http://vlsingle-obs.observability.svc:9428/insert/opentelemetry/v1/logs
      otlphttp/vm:
        metrics_endpoint: http://vmsingle-obs.observability.svc:8428/opentelemetry/v1/metrics
    service:
      pipelines:
        logs:
          receivers: [filelog, otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [otlphttp/vlogs]
        metrics:
          receivers: [hostmetrics, kubeletstats, otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, deltatocumulative, batch]
          exporters: [otlphttp/vm]
