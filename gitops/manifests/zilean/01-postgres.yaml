# zilean Postgres (PG17) — k8s replacement for the Docker zilean_postgres service.
# Data is migrated by LOGICAL dump/restore from the live Docker DB (not a raw PGDATA
# hostPath reuse): version-independent and leaves the Docker data dir pristine for
# instant rollback. PVC is local-path-retain so deleting the claim never wipes data.
#
# Tuning flags mirror apps/zilean/compose.yaml:69-98 verbatim.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zilean-db-data
  namespace: apps
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain # reclaimPolicy: Retain
  resources:
    requests:
      storage: 4Gi # live DB is ~2.1Gi on disk; headroom for growth + WAL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zilean-postgres
  namespace: apps
  labels: {app: zilean-postgres}
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO PVC: stop old before starting new (no dual-attach)
  selector:
    matchLabels: {app: zilean-postgres}
  template:
    metadata:
      labels: {app: zilean-postgres}
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 70 # postgres uid/gid in the alpine image owns the volume
      containers:
        - name: postgres
          image: postgres:17.10-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
          args:
            - "postgres"
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
            - "-c"
            - "pg_stat_statements.track=top"
            - "-c"
            - "shared_buffers=512MB"
            - "-c"
            - "effective_cache_size=2GB"
            - "-c"
            - "maintenance_work_mem=128MB"
            - "-c"
            - "checkpoint_completion_target=0.9"
            - "-c"
            - "wal_buffers=8MB"
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "effective_io_concurrency=200"
            - "-c"
            - "work_mem=8MB"
            - "-c"
            - "max_connections=100"
            - "-c"
            - "log_min_duration_statement=1000"
            - "-c"
            - "log_parameter_max_length=0"
            - "-c"
            - "log_parameter_max_length_on_error=0"
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: zilean}
            - {name: POSTGRES_DB, value: zilean}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: zilean-db, key: POSTGRES_PASSWORD}
          ports:
            - {containerPort: 5432, name: postgres}
          resources:
            requests: {memory: 512Mi, cpu: 50m}
            limits: {memory: 640Mi, cpu: "1"}   # rightsized: 7d peak ~305Mi; limit 1Gi→640Mi
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm} # compose set shm_size: 2G; parallel-query shmem
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "zilean", "-d", "zilean"]}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3   # 1s default flaps the endpoint under load -> connection-refused blips
          livenessProbe:
            exec: {command: ["pg_isready", "-U", "zilean", "-d", "zilean"]}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5   # generous: a tight liveness timeout would RESTART postgres under load
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: zilean-db-data}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 512Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata:
  name: zilean-postgres
  namespace: apps
spec:
  selector: {app: zilean-postgres}
  ports:
    - {name: postgres, port: 5432, targetPort: 5432}
