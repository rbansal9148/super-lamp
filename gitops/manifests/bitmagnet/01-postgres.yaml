# bitmagnet Postgres (PG18.4) — hostPath dir. DB rebuilt FRESH 2026-06-16 (PG16 data nuked;
# fresh initdb on debian 18.4 — no migration, no musl->glibc collation concern).
# Separate pod (NOT in the VPN netns) so stremthru can also reach it (bitmagnet-postgres:5432).
apiVersion: apps/v1
kind: Deployment
metadata: {name: bitmagnet-postgres, namespace: apps, labels: {app: bitmagnet-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: bitmagnet-postgres}}
  template:
    metadata: {labels: {app: bitmagnet-postgres}}
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:18.4@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
          # baseline hardening: drop ALL caps, re-add only the postgres entrypoint's needs
          # (CHOWN/DAC_OVERRIDE/FOWNER for PGDATA setup; SETUID/SETGID for gosu drop).
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID] }, seccompProfile: { type: RuntimeDefault } }
          args: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "pg_stat_statements.track=top", "-c", "shared_buffers=2GB", "-c", "effective_cache_size=8GB", "-c", "maintenance_work_mem=512MB", "-c", "work_mem=16MB", "-c", "wal_buffers=16MB", "-c", "max_wal_size=4GB", "-c", "checkpoint_completion_target=0.9", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000", "-c", "log_parameter_max_length=0", "-c", "log_parameter_max_length_on_error=0", "-c", "autovacuum_vacuum_scale_factor=0.05", "-c", "autovacuum_analyze_scale_factor=0.05", "-c", "autovacuum_naptime=30s", "-c", "autovacuum_max_workers=4", "-c", "idle_session_timeout=900000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: bitmagnet}
            - {name: POSTGRES_DB, value: bitmagnet}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: bitmagnet-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 2560Mi, cpu: 50m}, limits: {memory: 4Gi, cpu: "2"}}   # rightsized: 7d peak ~3.4Gi (heavy DB); req raised from 1Gi
          volumeMounts:
            - {name: pgdata, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "bitmagnet", "-d", "bitmagnet"]}, initialDelaySeconds: 15, periodSeconds: 10, timeoutSeconds: 3}
      volumes:
        - name: pgdata
          hostPath: {path: /opt/docker/data/bitmagnet/db, type: Directory}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 1Gi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: bitmagnet-postgres, namespace: apps}
spec:
  clusterIP: 10.43.36.31 # pinned: referenced by bitmagnet's hostAliases (gluetun netns)
  selector: {app: bitmagnet-postgres}
  ports: [{name: postgres, port: 5432, targetPort: 5432}]
