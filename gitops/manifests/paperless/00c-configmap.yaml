---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-config
  namespace: apps
  labels:
    app: paperless
data:
  # --- core wiring ---
  PAPERLESS_URL: https://paperless.my-blue-car.work
  PAPERLESS_TIME_ZONE: Asia/Kolkata
  PAPERLESS_REDIS: redis://paperless-redis:6379
  PAPERLESS_DBHOST: paperless-postgres
  PAPERLESS_DBPORT: '5432'
  PAPERLESS_DBNAME: paperless
  PAPERLESS_DBUSER: paperless
  # initial superuser (password sealed in paperless-secrets)
  PAPERLESS_ADMIN_USER: admin
  # files written by uid 1001 (host dirs owned ubuntu:ubuntu = 1001), matching calibre
  USERMAP_UID: '1001'
  USERMAP_GID: '1001'

  # --- OCR: "skip" mode (user choice) — OCR only pages with no text layer ---
  # lowest CPU; born-digital PDFs pass through untouched. with_text skips the
  # archive PDF/A copy for already-OCR'd docs (kills the ~2x storage doubling).
  # Full-text search still works regardless — search indexes DB content, not the archive.
  PAPERLESS_OCR_MODE: skip
  PAPERLESS_OCR_SKIP_ARCHIVE_FILE: with_text
  PAPERLESS_OCR_LANGUAGE: eng
  PAPERLESS_OCR_CLEAN: none

  # --- resource governors (CPU-constrained node; OCR is bursty) ---
  PAPERLESS_TASK_WORKERS: '1'
  PAPERLESS_THREADS_PER_WORKER: '1'
  PAPERLESS_WEBSERVER_WORKERS: '1'

  # hostPath/bind mount: inotify from host writes is unreliable, poll the consume dir
  PAPERLESS_CONSUMER_POLLING: '60'
  PAPERLESS_CONSUMER_RECURSIVE: 'true'
