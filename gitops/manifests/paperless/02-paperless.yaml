# paperless-ngx — scanned-PDF document archive with OCR + full-text search. Sits ALONGSIDE
# calibre-web-automated (ebook library), not replacing it. data/media/consume on hostPath
# (reuses the node's /opt/docker/data, like calibre). Egress not tunneled — paperless makes
# no outbound calls. Behind authelia like the rest of the apps.
apiVersion: apps/v1
kind: Deployment
metadata: {name: paperless, namespace: apps, labels: {app: paperless}}
spec:
  replicas: 0  # PAUSED 2026-06-07 — paperless disabled, picking up later; set back to 1 to re-enable
  strategy: {type: Recreate}
  selector: {matchLabels: {app: paperless}}
  template:
    metadata: {labels: {app: paperless}}
    spec:
      enableServiceLinks: false
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
          envFrom: [{configMapRef: {name: paperless-config}}, {secretRef: {name: paperless-secrets}}]
          ports: [{containerPort: 8000, name: http}]
          # steady request tiny (idle most of the time); limit headroom for the OCR burst
          resources: {requests: {memory: 256Mi, cpu: 50m}, limits: {memory: 2Gi, cpu: "2"}}
          volumeMounts:
            - {name: data, mountPath: /usr/src/paperless/data}
            - {name: media, mountPath: /usr/src/paperless/media}
            - {name: consume, mountPath: /usr/src/paperless/consume}
          # Host header pinned: PAPERLESS_URL locks Django ALLOWED_HOSTS to the public name,
          # so a bare pod-IP probe would 400 (DisallowedHost) and never go Ready.
          readinessProbe: {httpGet: {path: /accounts/login/, port: 8000, httpHeaders: [{name: Host, value: paperless.my-blue-car.work}]}, initialDelaySeconds: 60, periodSeconds: 30, timeoutSeconds: 10}
      volumes:
        - {name: data, hostPath: {path: /opt/docker/data/paperless/data, type: Directory}}
        - {name: media, hostPath: {path: /opt/docker/data/paperless/media, type: Directory}}
        - {name: consume, hostPath: {path: /opt/docker/data/paperless/consume, type: Directory}}
---
apiVersion: v1
kind: Service
metadata: {name: paperless, namespace: apps}
spec: {selector: {app: paperless}, ports: [{name: http, port: 8000, targetPort: 8000}]}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: {name: paperless, namespace: apps, annotations: {external-dns.alpha.kubernetes.io/target: "161.118.165.53"}}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`paperless.my-blue-car.work`)
      kind: Rule
      middlewares: [{name: authelia}]
      services: [{name: paperless, port: 8000}]
  tls: {}
