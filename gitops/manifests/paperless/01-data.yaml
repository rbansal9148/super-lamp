# paperless data tier: PG18 (Celery result + document metadata + FTS index) + redis broker.
# Postgres on a retained PVC (matches aiostreams DB pattern); paperless app data/media/consume
# ride hostPath (see 02-paperless.yaml).
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: paperless-db-data, namespace: apps}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain
  resources: {requests: {storage: 2Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: paperless-postgres, namespace: apps, labels: {app: paperless-postgres}}
spec:
  replicas: 0  # PAUSED 2026-06-07 — paperless disabled, picking up later; set back to 1 to re-enable
  strategy: {type: Recreate}
  selector: {matchLabels: {app: paperless-postgres}}
  template:
    metadata: {labels: {app: paperless-postgres}}
    spec:
      enableServiceLinks: false
      securityContext: {fsGroup: 999}
      containers:
        - name: postgres
          image: postgres:18.4
          args: ["postgres", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=8MB", "-c", "random_page_cost=1.1", "-c", "work_mem=8MB", "-c", "max_connections=50", "-c", "log_min_duration_statement=1000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: paperless}
            - {name: POSTGRES_DB, value: paperless}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: paperless-db, key: POSTGRES_PASSWORD}}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 128Mi, cpu: 25m}, limits: {memory: 1Gi, cpu: 500m}}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "paperless", "-d", "paperless"]}, initialDelaySeconds: 10, periodSeconds: 10}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: paperless-db-data}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 256Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: paperless-postgres, namespace: apps}
spec: {selector: {app: paperless-postgres}, ports: [{name: postgres, port: 5432, targetPort: 5432}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: paperless-redis, namespace: apps, labels: {app: paperless-redis}}
spec:
  replicas: 0  # PAUSED 2026-06-07 — paperless disabled, picking up later; set back to 1 to re-enable
  selector: {matchLabels: {app: paperless-redis}}
  template:
    metadata: {labels: {app: paperless-redis}}
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:8.6.3
          args: ["redis-server", "--save", "", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{containerPort: 6379}]
          resources: {requests: {memory: 16Mi, cpu: 10m}, limits: {memory: 160Mi, cpu: 200m}}
          readinessProbe: {exec: {command: ["redis-cli", "ping"]}, initialDelaySeconds: 5, periodSeconds: 10}
---
apiVersion: v1
kind: Service
metadata: {name: paperless-redis, namespace: apps}
spec: {selector: {app: paperless-redis}, ports: [{name: redis, port: 6379, targetPort: 6379}]}
