# Optional services for paperless: Gotenberg (PDF rendering via headless Chromium) +
# Apache Tika (parses Office docs and .eml emails). Required to consume EMAIL BODIES
# (and Office files) — attachment-only consumption does NOT need these. Both run at
# default priority (0) so they're evicted before the data tier under memory pressure.
# Tika is a JVM: container memory limit caps the heap (UseContainerSupport, ~25% of limit).
apiVersion: apps/v1
kind: Deployment
metadata: {name: paperless-gotenberg, namespace: apps, labels: {app: paperless-gotenberg}}
spec:
  replicas: 0  # PAUSED 2026-06-07 — paperless disabled, picking up later; set back to 1 to re-enable
  selector: {matchLabels: {app: paperless-gotenberg}}
  template:
    metadata: {labels: {app: paperless-gotenberg}}
    spec:
      enableServiceLinks: false
      securityContext: {runAsUser: 1001, runAsGroup: 1001}
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:8.33.0@sha256:bddd8ea9d076e2d08b6ddaa6efae6403185202c6dab65a6488ed0a6923d6d8e8
          # paperless-recommended hardening: no JS, restrict file access to /tmp
          command: ["gotenberg", "--chromium-disable-javascript=true", "--chromium-allow-list=file:///tmp/.*"]
          ports: [{containerPort: 3000, name: http}]
          resources: {requests: {memory: 96Mi, cpu: 25m}, limits: {memory: 1Gi, cpu: "1"}}
          readinessProbe: {httpGet: {path: /health, port: 3000}, initialDelaySeconds: 10, periodSeconds: 20, timeoutSeconds: 5}
---
apiVersion: v1
kind: Service
metadata: {name: paperless-gotenberg, namespace: apps}
spec: {selector: {app: paperless-gotenberg}, ports: [{name: http, port: 3000, targetPort: 3000}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: paperless-tika, namespace: apps, labels: {app: paperless-tika}}
spec:
  replicas: 0  # PAUSED 2026-06-07 — paperless disabled, picking up later; set back to 1 to re-enable
  selector: {matchLabels: {app: paperless-tika}}
  template:
    metadata: {labels: {app: paperless-tika}}
    spec:
      enableServiceLinks: false
      containers:
        - name: tika
          image: apache/tika:3.3.1.0@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
          ports: [{containerPort: 9998, name: http}]
          # JVM heap auto-caps to ~25% of the memory limit via UseContainerSupport
          resources: {requests: {memory: 256Mi, cpu: 25m}, limits: {memory: 1Gi, cpu: "1"}}
          readinessProbe: {httpGet: {path: /tika, port: 9998}, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 5}
---
apiVersion: v1
kind: Service
metadata: {name: paperless-tika, namespace: apps}
spec: {selector: {app: paperless-tika}, ports: [{name: http, port: 9998, targetPort: 9998}]}
