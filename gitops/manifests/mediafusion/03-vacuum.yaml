# Daily VACUUM (ANALYZE) on the mediafusion DB — restores the Docker
# mediafusion_vacuum sidecar (it ran psql VACUUM (ANALYZE) every 86400s and was
# missed during the migration). Mirrors the zilean/syncio/comet vacuum CronJobs.
# Credentials come from the sealed POSTGRES_URI (no plaintext in git); the
# +asyncpg SQLAlchemy driver suffix is stripped at runtime so libpq/psql can parse it.
apiVersion: batch/v1
kind: CronJob
metadata: { name: mediafusion-vacuum, namespace: apps }
spec:
  schedule: "20 4 * * *"                 # staggered after the other nightly vacuums
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
              env:
                - name: POSTGRES_URI
                  valueFrom:
                    secretKeyRef: { name: mediafusion-secrets, key: POSTGRES_URI }
              # in-pod retry: ride out transient connection-refused blips instead of failing.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  sleep 15
                  URI="$(printf '%s' "$POSTGRES_URI" | sed 's/+asyncpg//')"
                  for i in $(seq 1 20); do
                    psql "$URI" -c "VACUUM (ANALYZE);" && exit 0
                    echo "attempt $i: db unreachable, retry in 6s"; sleep 6
                  done
                  echo "mediafusion vacuum failed after 20 attempts"; exit 1
              resources:
                requests: { memory: 64Mi, cpu: 50m }
                limits: { memory: 256Mi, cpu: 500m }
