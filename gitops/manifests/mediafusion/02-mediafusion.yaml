# mediafusion app — stremio addon / scraper. All config+secrets from sealed
# mediafusion-secrets (envFrom). Egress via gluetun proxy; mesh peers (prowlarr,
# zilean, flaresolverr) resolved by same-namespace DNS. mediafusion.k8s.* behind Authelia.
apiVersion: apps/v1
kind: Deployment
metadata: { name: mediafusion, namespace: apps, labels: { app: mediafusion } }
spec:
  replicas: 1
  selector: { matchLabels: { app: mediafusion } }
  template:
    metadata: { labels: { app: mediafusion } }
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # app never calls the k8s API; drop the token mount
      initContainers:
        # mediafusion logs "postgres not ready, retrying" repeatedly at boot when the DB
        # isn't up yet. Gate start on the DB being reachable to shorten startup churn.
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z mediafusion-postgres 5432; do echo "waiting for postgres"; sleep 2; done']
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, runAsNonRoot: true, runAsUser: 65534, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: mediafusion
          # tag kept for readability; digest pins the bits (beta tags are mutable upstream)
          image: mhdzumair/mediafusion:6.0.0-beta.21@sha256:c36409202c6edd4332fbb3d1ad2ca4d90127ead3021a29e39855cc999444e3c4
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom: [{ configMapRef: { name: mediafusion-config } }, { secretRef: { name: mediafusion-secrets } }]
          ports: [{ containerPort: 8000, name: http }]
          resources: { requests: { memory: 256Mi, cpu: 50m }, limits: { memory: 1Gi, cpu: "2" } }   # rightsized: 8d peak <0.5Gi (was 3Gi)
          readinessProbe: { httpGet: { path: /health, port: 8000 }, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8 }
---
apiVersion: v1
kind: Service
metadata: { name: mediafusion, namespace: apps }
spec: { selector: { app: mediafusion }, ports: [{ name: http, port: 8000, targetPort: 8000 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: mediafusion, namespace: apps, annotations: { external-dns.alpha.kubernetes.io/target: "161.118.165.53" } }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`mediafusion.my-blue-car.work`)
      kind: Rule
      services: [{ name: mediafusion, port: 8000 }]
  tls: {}
