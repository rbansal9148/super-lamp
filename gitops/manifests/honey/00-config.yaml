kind: ConfigMap
metadata:
  name: honey-config
  namespace: apps
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: honey, namespace: apps, labels: { app: honey } }
spec:
  replicas: 1
  selector: { matchLabels: { app: honey } }
  template:
    metadata: { labels: { app: honey } }
    spec:
      enableServiceLinks: false
      securityContext: { runAsUser: 1001, runAsGroup: 1001 }
      containers:
        - name: honey
          image: ghcr.io/dani3l0/honey:latest@sha256:0af531af34ec047d72ecbbbb4627b8b45039835755c10338f6e2428ee23e7dd5
          ports: [{ containerPort: 4173, name: http }]
          resources: { requests: { memory: 32Mi, cpu: 10m }, limits: { memory: 128Mi, cpu: 250m } }
          volumeMounts:
            - { name: config, mountPath: /app/dist/config/config.json, subPath: config.json, readOnly: true }
            - { name: img, mountPath: /app/dist/img/custom }
          readinessProbe: { httpGet: { path: /, port: 4173 }, initialDelaySeconds: 10, periodSeconds: 20 }
      volumes:
        - name: config
          configMap: { name: honey-config }
        - name: img
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: { name: honey, namespace: apps }
spec: { selector: { app: honey }, ports: [{ name: http, port: 4173, targetPort: 4173 }] }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: { name: honey-tls, namespace: apps }
spec:
  secretName: honey-tls
  issuerRef: { name: selfsigned, kind: ClusterIssuer }
  dnsNames: [my-blue-car.work]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: honey, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`my-blue-car.work`)
      kind: Rule
      middlewares: [{ name: authelia }]
      services: [{ name: honey, port: 4173 }]
  tls: {}
