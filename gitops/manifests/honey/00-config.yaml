apiVersion: v1
kind: ConfigMap
metadata:
  name: honey-config
  namespace: apps
data:
  # JSON as a YAML block scalar (literal) — readable + easy to extend vs the prior
  # single-line escaped string. honey reads /app/dist/config/config.json verbatim.
  config.json: |
    {
      "ui": {
        "name": "Dashboard",
        "desc": "Nice and sweet place for all your self-hosted services.",
        "icon": "img/icon.png",
        "wallpaper": "img/background.jpg",
        "wallpaper_dark": "img/background-dark.jpg",
        "dark_mode": "On",
        "open_new_tab": true,
        "ping_dots": true,
        "blur": true,
        "animations": true,
        "trusted_domains": ["my-blue-car.work"]
      },
      "services": [
        { "name": "Authelia", "desc": "Authentication and Authorization service.", "href": "https://auth.my-blue-car.work", "icon": "https://raw.githubusercontent.com/authelia/authelia/refs/heads/master/docs/static/svgs/branding/logo-cropped.svg" },
        { "name": "Grafana", "desc": "Metrics, logs, and alerting dashboards.", "href": "https://grafana.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/grafana.svg" },
        { "name": "VictoriaMetrics", "desc": "Time-series metrics database UI.", "href": "https://vm.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/victoriametrics.svg" },
        { "name": "VictoriaLogs", "desc": "Log search and exploration UI.", "href": "https://logs.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/victorialogs.svg" },
        { "name": "Immich", "desc": "Self-hosted photo and video backup.", "href": "https://immich.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/immich.svg" },
        { "name": "AIOStreams", "desc": "All-In-One streaming add-on for Stremio.", "href": "https://aiostreams.my-blue-car.work", "icon": "https://raw.githubusercontent.com/Viren070/AIOStreams/refs/heads/main/packages/frontend/public/assets/logo.png" },
        { "name": "Comet", "desc": "Torrent/Debrid indexer for Stremio.", "href": "https://comet.my-blue-car.work", "icon": "https://i.imgur.com/jmVoVMu.jpeg" },
        { "name": "StremThru", "desc": "Companion suite for Stremio.", "href": "https://stremthru.my-blue-car.work", "icon": "https://emojiapi.dev/api/v1/sparkles/256.png" },
        { "name": "Aiometadata", "desc": "Metadata catalog add-on for Stremio.", "href": "https://aiometadata.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/stremio.svg" },
        { "name": "Zilean", "desc": "DebridMediaManager-powered search for Stremio.", "href": "https://zilean.my-blue-car.work", "icon": "https://raw.githubusercontent.com/iPromKnight/zilean/main/src/Zilean.ApiService/wwwroot/images/zilean-logo.png" },
        { "name": "Prowlarr", "desc": "Indexer manager.", "href": "https://prowlarr.my-blue-car.work", "icon": "https://raw.githubusercontent.com/Prowlarr/Prowlarr/refs/heads/develop/Logo/512.png" },
        { "name": "Bitmagnet", "desc": "Self-hosted DHT crawler and torrent indexer.", "href": "https://bitmagnet.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/bitmagnet.png" },
        { "name": "SearXNG", "desc": "Privacy-respecting search engine.", "href": "https://searxng.my-blue-car.work", "icon": "https://raw.githubusercontent.com/searxng/searxng/refs/heads/master/searx/static/themes/simple/img/favicon.png" },
        { "name": "Calibre-Web Automated", "desc": "Self-hosted ebook library and reader.", "href": "https://calibre.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/calibre-web.png" },
        { "name": "Shelfmark", "desc": "Modern reading UI for Calibre-Web.", "href": "https://shelfmark.my-blue-car.work", "icon": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/shelfmark.png" },
        { "name": "Syncio", "desc": "Stremio library and progress sync.", "href": "https://syncio.my-blue-car.work", "icon": "https://raw.githubusercontent.com/iamneur0/syncio/main/client/public/logo-white.png" },
        { "name": "Verbal Score", "desc": "Jamboree/Kaksha faculty student-performance dashboard.", "href": "https://avs-1245567de3019b59765cd681c2.my-blue-car.work", "icon": "https://emojiapi.dev/api/v1/bar-chart/256.png" }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: honey, namespace: apps, labels: { app: honey } }
spec:
  replicas: 1
  selector: { matchLabels: { app: honey } }
  template:
    metadata: { labels: { app: honey } }
    spec:
      enableServiceLinks: false
      securityContext: { runAsNonRoot: true, runAsUser: 1001, runAsGroup: 1001 }
      containers:
        - name: honey
          image: ghcr.io/dani3l0/honey:latest@sha256:fe6ce43acf93a211ab63cf247e4ce573cb63a41608092f0bffb1b3bf72527ac5
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          ports: [{ containerPort: 4173, name: http }]
          resources: { requests: { memory: 32Mi, cpu: 10m }, limits: { memory: 192Mi, cpu: 250m } }
          volumeMounts:
            - { name: config, mountPath: /app/dist/config/config.json, subPath: config.json, readOnly: true }
            - { name: img, mountPath: /app/dist/img/custom }
          readinessProbe: { httpGet: { path: /, port: 4173 }, initialDelaySeconds: 10, periodSeconds: 20 }
          livenessProbe: { httpGet: { path: /, port: 4173 }, initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 8, failureThreshold: 3 }
      volumes:
        - name: config
          configMap: { name: honey-config }
        - name: img
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: { name: honey, namespace: apps }
spec: { selector: { app: honey }, ports: [{ name: http, port: 4173, targetPort: 4173 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: honey, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`my-blue-car.work`)
      kind: Rule
      middlewares: [{ name: authelia }]
      services: [{ name: honey, port: 4173 }]
  tls: {}
