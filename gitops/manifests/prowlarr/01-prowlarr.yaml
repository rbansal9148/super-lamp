# prowlarr — indexer manager. hostPath-REUSE of the existing Docker dirs (config + PG
# data, both PG18.4-compatible): preserves config.xml's ApiKey (consumers depend on it)
# with zero copy. Egresses via the gluetun proxy (queries trackers). Both DBs
# (prowlarr + prowlarr_log) live in the reused PGDATA. Consumed in-namespace as
# http://prowlarr:9696. NOTE: data stays at /opt/docker/data/prowlarr (node-pinned
# hostPath) — one-way (no Docker rollback once cut over).
apiVersion: apps/v1
kind: Deployment
metadata: {name: prowlarr-postgres, namespace: apps, labels: {app: prowlarr-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: prowlarr-postgres}}
  template:
    metadata: {labels: {app: prowlarr-postgres}}
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:18.4@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
          # baseline hardening: drop ALL caps, re-add only the postgres entrypoint's needs
          # (CHOWN/DAC_OVERRIDE/FOWNER for PGDATA setup; SETUID/SETGID for gosu drop).
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID] }, seccompProfile: { type: RuntimeDefault } }
          args: ["postgres", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=8MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=8MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: prowlarr}
            - {name: POSTGRES_DB, value: prowlarr}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: prowlarr-db, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 128Mi, cpu: 25m}, limits: {memory: 512Mi, cpu: 500m}}   # rightsized: peak <100Mi (was 1Gi)
          volumeMounts:
            - {name: pgdata, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "prowlarr", "-d", "prowlarr"]}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 3}
      volumes:
        - name: pgdata
          hostPath: {path: /opt/docker/data/prowlarr/db, type: Directory}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 256Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: prowlarr-postgres, namespace: apps}
spec:
  selector: {app: prowlarr-postgres}
  ports: [{name: postgres, port: 5432, targetPort: 5432}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: prowlarr, namespace: apps, labels: {app: prowlarr}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: prowlarr}}
  template:
    metadata: {labels: {app: prowlarr}}
    spec:
      enableServiceLinks: false
      initContainers:
        # prowlarr's FluentMigrator runs at boot and crashes if postgres isn't up yet
        # ("Failed to connect to ...:5432"). Gate start on the DB being reachable.
        - name: wait-for-postgres
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command: ['sh', '-c', 'until nc -z prowlarr-postgres 5432; do echo "waiting for postgres"; sleep 2; done']
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}, runAsNonRoot: true, runAsUser: 65534, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: prowlarr
          image: ghcr.io/hotio/prowlarr:nightly@sha256:6c577ca850158976403f6c9d017ec372958897528a828774bc30112968f4d5fb
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, FSETID, KILL, SETGID, SETUID, SETPCAP] }, seccompProfile: { type: RuntimeDefault } }
          env:
            - {name: PUID, value: "1001"}
            - {name: PGID, value: "1001"}
            - {name: UMASK, value: "002"}
            - {name: TZ, value: "Asia/Kolkata"}
            - {name: PROWLARR__POSTGRES__HOST, value: "prowlarr-postgres"}
            - {name: PROWLARR__POSTGRES__USER, value: "prowlarr"}
            - {name: PROWLARR__POSTGRES__MAINDB, value: "prowlarr"}
            - {name: PROWLARR__POSTGRES__LOGDB, value: "prowlarr_log"}
            - name: PROWLARR__POSTGRES__PASSWORD
              valueFrom: {secretKeyRef: {name: prowlarr-db, key: POSTGRES_PASSWORD}}
            - {name: HTTP_PROXY, value: "http://gluetun.apps.svc.cluster.local:8888"}
            - {name: HTTPS_PROXY, value: "http://gluetun.apps.svc.cluster.local:8888"}
            # bitmagnet is an INTERNAL torznab indexer — must bypass the gluetun VPN proxy like
            # the other internal services. .NET's HttpClient only honours EXACT names here (it
            # ignores the .svc/.cluster.local suffix entries), so list bitmagnet explicitly or
            # its indexer fetch is sent through the proxy and times out (Servarr ExecuteProxied).
            - {name: NO_PROXY, value: "localhost,127.0.0.1,prowlarr-postgres,flaresolverr,bitmagnet,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16"}
          ports: [{containerPort: 9696, name: http}]
          resources: {requests: {memory: 128Mi, cpu: 25m}, limits: {memory: 1Gi, cpu: "2"}}   # rightsized: 8d peak <0.5Gi (was 6Gi)
          volumeMounts: [{name: config, mountPath: /config}]
          readinessProbe: {httpGet: {path: /ping, port: 9696}, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8}
          # prowlarr's DB-init is NON-recoverable: if it loses the startup race against its
          # postgres (Recreate), it logs "EPIC FAIL, waiting for user intervention" and the
          # process stays alive (never binds :9696) -> Running-but-dead forever, no restart.
          # startupProbe restarts it until :9696 comes up (postgres stabilises, it retries +
          # wins); livenessProbe then catches any post-start hang. ~150s start grace (healthy
          # start ~40s) so neither kills a legit slow migration boot.
          startupProbe: {httpGet: {path: /ping, port: 9696}, periodSeconds: 5, timeoutSeconds: 5, failureThreshold: 30}
          livenessProbe: {httpGet: {path: /ping, port: 9696}, periodSeconds: 30, timeoutSeconds: 8, failureThreshold: 3}
      volumes:
        - name: config
          hostPath: {path: /opt/docker/data/prowlarr, type: Directory}
---
apiVersion: v1
kind: Service
metadata: {name: prowlarr, namespace: apps}
spec:
  selector: {app: prowlarr}
  ports: [{name: http, port: 9696, targetPort: 9696}]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: {name: prowlarr, namespace: apps}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`prowlarr.my-blue-car.work`)
      kind: Rule
      middlewares: [{name: authelia}]
      services: [{name: prowlarr, port: 9696}]
  tls: {}
---
# prowlarr_history_prune sidecar -> CronJob (prune History >7d, Logs >3d)
apiVersion: batch/v1
kind: CronJob
metadata: {name: prowlarr-prune, namespace: apps}
spec:
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: prune
              image: postgres:18.4@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
              securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
              env:
                - name: PGPASSWORD
                  valueFrom: {secretKeyRef: {name: prowlarr-db, key: POSTGRES_PASSWORD}}
              command: ["/bin/sh", "-c", "psql -h prowlarr-postgres -U prowlarr -d prowlarr -c \"DELETE FROM \\\"History\\\" WHERE \\\"Date\\\" < NOW() - INTERVAL '7 days'; VACUUM \\\"History\\\";\" || true; psql -h prowlarr-postgres -U prowlarr -d prowlarr_log -c \"DELETE FROM \\\"Logs\\\" WHERE \\\"Time\\\" < NOW() - INTERVAL '3 days'; VACUUM \\\"Logs\\\";\" || true"]
              resources: {requests: {memory: 32Mi, cpu: 25m}, limits: {memory: 128Mi, cpu: 250m}}
