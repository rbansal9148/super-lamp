# immich app tier — server + machine-learning. Pinned to v2.7.5 (the version the
# on-disk DB was last migrated by: backups are v2.7.5-pg14.19). immich runs FORWARD-ONLY
# schema migrations on boot; deploying a newer 'release' against a v2.7.5 cluster would
# trigger an unsupervised migration — so we match-then-upgrade-deliberately. Library
# hostPath is mounted at /usr/src/app/upload exactly as the working Docker compose did.
apiVersion: apps/v1
kind: Deployment
metadata: { name: immich, namespace: apps, labels: { app: immich } }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWX-less hostPath library + single writer
  selector: { matchLabels: { app: immich } }
  template:
    metadata: { labels: { app: immich } }
    spec:
      enableServiceLinks: false
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000 }   # non-root (node uid 1000); upload library hostPath chowned 1000:1000 on-host (see RESTORE.md)
      containers:
        - name: immich
          image: ghcr.io/immich-app/immich-server:v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5  # arm64
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom:
            - configMapRef: { name: immich-config }
            - secretRef: { name: immich-secrets }
          ports: [{ containerPort: 2283, name: http }]
          resources: { requests: { memory: 640Mi, cpu: 50m }, limits: { memory: 1536Mi, cpu: "2" } }   # req rightsized: 7d peak ~845Mi (was 256Mi)
          volumeMounts:
            - { name: library, mountPath: /usr/src/app/upload }
          readinessProbe: { httpGet: { path: /api/server/ping, port: 2283 }, initialDelaySeconds: 30, periodSeconds: 20, timeoutSeconds: 8 }
          livenessProbe: { httpGet: { path: /api/server/ping, port: 2283 }, initialDelaySeconds: 120, periodSeconds: 60, timeoutSeconds: 10 }
      volumes:
        - name: library
          hostPath: { path: /opt/docker/data/immich/library, type: Directory }
---
apiVersion: v1
kind: Service
metadata: { name: immich, namespace: apps }
spec: { selector: { app: immich }, ports: [{ name: http, port: 2283, targetPort: 2283 }] }
---
# Machine-learning sidecar service (CLIP / facial recognition). Stateless except the
# model cache (regenerable -> ephemeral emptyDir; the Docker model-cache dir is small
# and re-downloads on demand). The server reaches it at immich-ml:3003 via IMMICH_MACHINE_LEARNING_URL.
apiVersion: apps/v1
kind: Deployment
metadata: { name: immich-ml, namespace: apps, labels: { app: immich-ml } }
spec:
  replicas: 1
  selector: { matchLabels: { app: immich-ml } }
  template:
    metadata: { labels: { app: immich-ml } }
    spec:
      enableServiceLinks: false
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000 }   # non-root; /cache is emptyDir (fsGroup-writable), models re-download
      containers:
        - name: immich-ml
          image: ghcr.io/immich-app/immich-machine-learning:v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3  # arm64
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom:
            - configMapRef: { name: immich-config }
          env: [{ name: HOME, value: /cache }]
          ports: [{ containerPort: 3003, name: http }]
          resources: { requests: { memory: 512Mi, cpu: 100m }, limits: { memory: 1536Mi, cpu: "2" } }   # rightsized: 8d peak ~507Mi w/ model-load headroom (was 3Gi)
          volumeMounts: [{ name: model-cache, mountPath: /cache }]
          readinessProbe: { httpGet: { path: /ping, port: 3003 }, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 10 }
      volumes:
        - name: model-cache
          emptyDir: { sizeLimit: 2Gi }
---
apiVersion: v1
kind: Service
metadata: { name: immich-ml, namespace: apps }
spec: { selector: { app: immich-ml }, ports: [{ name: http, port: 3003, targetPort: 3003 }] }
---
# Public route. immich has its OWN auth + a mobile API that cannot pass through Authelia
# forward-auth (same reason the stremio addons skip it) — so NO authelia middleware here.
# tls: {} serves the wildcard *.my-blue-car.work via the default TLSStore (post cert-cleanup standard).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`immich.my-blue-car.work`)
      kind: Rule
      services: [{ name: immich, port: 2283 }]
  tls: {}
