# immich off-node backup — restic → Backblaze B2 (EU-Central). The FIRST of the five
# RESTORE.md §1 rows to gain an automated off-box backup (the gap: none existed at all).
#
# Shape — a nightly Job with two stages:
#   initContainer pg-dump : immich's documented logical dump (pg_dump --clean --if-exists)
#     → /dump/immich.sql (raw, shared emptyDir — restic compresses+dedups it). NB the *restore* needs a search_path
#     sed-rewrite for the pgvecto.rs/vectorchord extension — see RESTORE.md §2.
#   container restic      : restic backup of /dump + ONLY the originals subdir of the immich
#     library hostPath (/library/upload, read-only) into the B2 repo, then forget+prune per
#     the retention policy, then a structural `restic check`. Regenerable/redundant library
#     subdirs (thumbs, encoded-video, immich's own backups/) are excluded — see the path scope below.
#
# Secrets (repo URL, restic password, B2 key) come from SealedSecret
# `immich-backup-secrets` — NOT in git; produced by gitops/scripts/seal-immich-backup-secret.sh
# so plaintext never enters git or chat. Until that secret exists the Job errors on the
# restic step (expected); the deterministic punch list and the alarms are unaffected.
#
# Object Lock note (honest tradeoff): this v1 runs forget+prune with a full-access B2 key —
# the standard, battle-tested restic pattern that WORKS today. Enabling B2 Object Lock (WORM)
# changes it: prune cannot delete locked objects, so that hardening must move forget/prune to
# a separate privileged job and keep this nightly one append-only (backup-only). Ship the
# working backup first; layer immutability as a deliberate second step (see RESTORE.md design).
apiVersion: batch/v1
kind: CronJob
metadata: { name: immich-backup, namespace: apps }
spec:
  # SUSPENDED 2026-06-22: B2 storage cap exceeded — the ~10.4 GiB repo crossed the
  # Backblaze cap, so every restic write (even the lock) is rejected with
  # "storage cap exceeded", failing the nightly Job and tripping Degraded/NotReady
  # alerts. Paused deliberately to stop the nightly failures. RE-ENABLE: raise the
  # B2 storage cap on the Caps & Alerts page (repo ~10.4 GiB → set 25–50 GB headroom),
  # then set suspend:false. Verified end-to-end before the cap (snapshot 681cf6a1,
  # 10.4 GiB → B2 EU-Central, restic check clean, 2026-06-21).
  suspend: true
  schedule: "0 22 * * *"   # 22:00 UTC = 03:30 IST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200   # 2h ceiling; first run uploads the full ~20G, later runs are incremental
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          # uid 1000 matches the immich pod: the library hostPath is chowned 1000:1000 on-host,
          # so restic can read it; fsGroup 1000 makes the emptyDirs group-writable.
          securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
          initContainers:
            - name: pg-dump
              image: postgres:18.4@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500   # pg_dump 18 dumps the PG14 server fine
              securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
              env:
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: immich-secrets, key: DB_PASSWORD } }
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  # RAW SQL (deliberately NOT pre-gzipped): a gzip stream is incompressible to
                  # restic AND re-stores in full every night; raw SQL lets restic both compress
                  # (zstd) and DEDUP it across nightly snapshots. See --compression max below.
                  pg_dump --clean --if-exists -h immich-postgres -U postgres -d immich > /dump/immich.sql
                  echo "pg_dump ok: $(stat -c%s /dump/immich.sql) bytes raw SQL (restic compresses + dedups)"
              volumeMounts:
                - { name: dump, mountPath: /dump }
              resources: { requests: { memory: 128Mi, cpu: 50m }, limits: { memory: 512Mi, cpu: 500m } }
          containers:
            - name: restic
              image: restic/restic:0.19.1@sha256:136600b6ff6843d61d355f7f71f460a166429f35de6fd11b568fece3c9a4d510
              securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
              env:
                - { name: RESTIC_CACHE_DIR, value: /cache }   # writable emptyDir; uid 1000 has no $HOME for the default cache
              envFrom:
                - secretRef: { name: immich-backup-secrets }   # RESTIC_REPOSITORY, RESTIC_PASSWORD, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  # Init ONLY when the repo is genuinely absent. restic `cat config` returns
                  # exit 10 = "repository does not exist" (restic >=0.17, scripting docs); any
                  # OTHER non-zero (transient network, B2 5xx, linkerd egress cold-start) is a
                  # real error we must surface, NOT escalate to `init`. The old
                  # `snapshots || init` masked transients as a fatal "already initialized" and
                  # broke every nightly run once the repo was populated.
                  cfg=$(restic cat config 2>&1) && rc=0 || rc=$?
                  [ "$rc" = 10 ] && restic init
                  [ "$rc" != 0 ] && [ "$rc" != 10 ] && { echo "repo check failed rc=$rc: $cfg"; exit "$rc"; }
                  # Back up ONLY the originals (/library/upload = the photos/videos) + the DB dump.
                  # Excludes the rest of the library by scoping the path: thumbs/ (immich regenerates),
                  # backups/ (immich's own *.sql.gz — redundant with our pg_dump, and gzipped so it
                  # never dedups), profile/, encoded-video/ (regenerated transcodes). The DB dump
                  # stays — without it the originals restore as orphaned UUID files (no albums/metadata).
                  # --compression max helps the raw SQL; JPEG/H.264 originals are incompressible (1.00x)
                  # so restic stores them as-is (CPU-only cost at 03:30).
                  restic backup --host immich --tag immich --compression max /dump/immich.sql /library/upload
                  restic forget --host immich --tag immich \
                    --keep-daily 7 --keep-weekly 8 --keep-monthly 12 --keep-yearly 3 --prune
                  restic check                                               # structural integrity (no data download → no egress)
              volumeMounts:
                - { name: dump, mountPath: /dump, readOnly: true }
                - { name: library, mountPath: /library, readOnly: true }
                - { name: cache, mountPath: /cache }
              resources: { requests: { memory: 256Mi, cpu: 100m }, limits: { memory: 1Gi, cpu: "1" } }
          volumes:
            - { name: dump, emptyDir: {} }
            - { name: cache, emptyDir: {} }
            - { name: library, hostPath: { path: /opt/docker/data/immich/library, type: Directory } }
