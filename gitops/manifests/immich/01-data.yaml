# immich data tier — hostPath-REUSE of the live Docker dirs (zero copy, mirrors the
# bitmagnet/prowlarr pattern). Postgres is immich's SPECIAL pgvector build
# (vectorchord0.4.3-pgvectors0.2.0) — the on-disk PG14 cluster was created by this
# exact image; any other postgres image cannot read it. PGDATA is the volume root
# (/var/lib/postgresql/data) — the Docker compose mapped the dir there directly, so
# PG_VERSION/base/global live at the root; do NOT set a /pgdata subpath or PG won't
# find the cluster. redis (ephemeral cache) replaces immich_redis.
apiVersion: apps/v1
kind: Deployment
metadata: { name: immich-postgres, namespace: apps, labels: { app: immich-postgres } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: immich-postgres } }
  template:
    metadata: { labels: { app: immich-postgres } }
    spec:
      enableServiceLinks: false
      securityContext: { fsGroup: 999 }   # postgres uid in the immich pg image owns the dir (999:0)
      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23  # arm64
          # baseline hardening: drop ALL caps, re-add only the postgres entrypoint's needs
          # (CHOWN/DAC_OVERRIDE/FOWNER for PGDATA setup; SETUID/SETGID for gosu drop).
          # force uid 999: PGDATA at /opt/docker/data/immich/db is already 999:0 (verified: no
          # root-owned residue) and PG_VERSION present, so the entrypoint's init/chown/gosu
          # branches are skipped under a direct-999 start. The added caps go dead but are kept
          # harmless for a hypothetical re-init. fsGroup:999 stays at pod level.
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID] }, seccompProfile: { type: RuntimeDefault } }
          env:
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_DB, value: immich }
            - { name: POSTGRES_INITDB_ARGS, value: "--data-checksums" }  # only used on first-init; no-op on reuse
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: immich-secrets, key: DB_PASSWORD } }
          ports: [{ containerPort: 5432, name: postgres }]
          resources: { requests: { memory: 256Mi, cpu: 25m }, limits: { memory: 768Mi, cpu: "1" } }   # rightsized: peak ~102Mi (was 1Gi)
          volumeMounts:
            - { name: pgdata, mountPath: /var/lib/postgresql/data }
            - { name: dshm, mountPath: /dev/shm }
          readinessProbe: { exec: { command: ["pg_isready", "-U", "postgres", "-d", "immich"] }, initialDelaySeconds: 15, periodSeconds: 10, timeoutSeconds: 3 }
      volumes:
        - name: pgdata
          hostPath: { path: /opt/docker/data/immich/db, type: Directory }
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 256Mi }
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: { name: immich-postgres, namespace: apps }
spec: { selector: { app: immich-postgres }, ports: [{ name: postgres, port: 5432, targetPort: 5432 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: immich-redis, namespace: apps, labels: { app: immich-redis } }
spec:
  replicas: 1
  selector: { matchLabels: { app: immich-redis } }
  template:
    metadata: { labels: { app: immich-redis } }
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:8.8.0@sha256:0a972391db0b24ec336e35d1bc98b237237e26f82bf5120cf2f6b1688d1df973
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          args: ["redis-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ containerPort: 6379 }]
          resources: { requests: { memory: 32Mi, cpu: 10m }, limits: { memory: 320Mi, cpu: 300m } }
          readinessProbe: { exec: { command: ["redis-cli", "ping"] }, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3 }
---
apiVersion: v1
kind: Service
metadata: { name: immich-redis, namespace: apps }
spec: { selector: { app: immich-redis }, ports: [{ name: redis, port: 6379, targetPort: 6379 }] }
