# Self-contained Authelia for the k8s realm. Cookie domain + portal live on the parent
# my-blue-car.work (auth.my-blue-car.work). The Docker realm that this once had to avoid
# colliding with is decommissioned, so the parent domain is now unambiguous.
# Storage: local SQLite on local-path-retain PVC. Sessions: in-memory (single replica,
# redis omitted). Secrets (session/storage-encryption/jwt + users.yml) come from the
# SealedSecret 'authelia-secrets' (sealedsecret.yaml), mounted at /secrets.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: apps
data:
  configuration.yml: |
    theme: 'dark'
    server:
      address: 'tcp://:9091'
      endpoints:
        authz:
          forward-auth:
            implementation: 'ForwardAuth'
            # Authenticate via the session cookie ONLY. The default strategy list puts
            # HeaderAuthorization(Basic) first, so Authelia would grab ANY inbound
            # `Authorization: Basic` header, try to validate it as an Authelia user, fail,
            # and 401 — before checking the cookie. aiostreams sends `Authorization: Basic
            # <uuid>:<config-password>` for its own config auth; dropping HeaderAuthorization
            # lets that header pass through to the app. No gated service logs into Authelia
            # via Basic/Bearer (all are browser/cookie), so this only removes a 2FA-bypass.
            authn_strategies:
              - name: 'CookieSession'
    log:
      level: 'info'
      format: 'text'
    telemetry:
      metrics:
        enabled: true
        address: 'tcp://:9959/metrics'   # scraped by the OTel TA via the ServiceMonitor below
    totp:
      issuer: 'my-blue-car.work'
    authentication_backend:
      # Secret-mounted (read-only): password reset won't persist — disable it to avoid errors.
      password_reset:
        disable: true
      file:
        path: '/secrets/users.yml'
    access_control:
      default_policy: 'deny'
      rules:
        # comet is the one bypassed host with a real admin surface (a Dashboard login at
        # /admin). Require 2FA there — defense-in-depth over comet's own dashboard
        # password — while its addon paths stay bypassed via the rule below. This MUST
        # precede the bypass rule (first match wins). The comet IngressRoute routes
        # /admin through the authelia forward-auth middleware so this rule is consulted.
        - domain: 'comet.my-blue-car.work'
          resources:
            - '^/admin'
          policy: 'two_factor'
        # Stremio addons: API/manifest URLs fetched by clients that can't 2FA -> bypass
        # (matches the Docker realm's TEMPLATE_STREMIO_ADDON_HOSTNAMES bypass list). Their
        # IngressRoutes also omit the forward-auth Middleware; this is belt-and-suspenders.
        # zilean is NOT here: its public host serves only the dashboard UI (in-cluster
        # consumers hit zilean:8181), so it falls through to the two_factor catch-all below.
        # aiostreams is NOT here either: its IngressRoute path-scopes the forward-auth
        # middleware to the UI/config paths (/, /login, /configure, /api/v1 non-proxy),
        # leaving Stremio manifest/stream/proxy open. So its UI hits the two_factor
        # catch-all below while Stremio clients (which never traverse the middleware) work.
        - domain:
            - 'comet.my-blue-car.work'
            - 'stremthru.my-blue-car.work'
            - 'aiometadata.my-blue-car.work'
          policy: 'bypass'
        # Management UIs require 2FA. rbansal is enrolled (TOTP via the authelia CLI);
        # the avali user was removed from users.yml. A user without a TOTP device is
        # walked through enrollment on next login (identity code → /data/notification.txt).
        - domain: '*.my-blue-car.work'
          policy: 'two_factor'
        - domain: 'my-blue-car.work'
          policy: 'two_factor'
    session:
      # Strict session lifetimes: cookie dies after 1h absolute or 5m idle, and
      # remember_me is disabled so there is no long-lived bypass of re-auth.
      # NOTE: the disable sentinel is '0' — Authelia 4.39's duration parser rejects '-1'
      # (it can't decode a bare negative as a time.Duration), and '0' disables the feature.
      expiration: '1 hour'
      inactivity: '5 minutes'
      remember_me: '0'
      cookies:
        - name: 'authelia_session'
          domain: 'my-blue-car.work'
          authelia_url: 'https://auth.my-blue-car.work'
          default_redirection_url: 'https://my-blue-car.work/'
          same_site: 'lax'
    storage:
      local:
        path: '/data/db.sqlite3'
    notifier:
      filesystem:
        filename: '/data/notification.txt'
    regulation:
      max_retries: 3
      find_time: '2 minutes'
      ban_time: '5 minutes'
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-data
  namespace: apps
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain # durable: survives PVC deletion (ADR guardrail 4)
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: apps
  labels: {app: authelia}
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO PVC + SQLite + in-memory sessions => single instance only
  selector:
    matchLabels: {app: authelia}
  template:
    metadata:
      labels: {app: authelia}
    spec:
      # k8s injects <SVC>_SERVICE_* / <SVC>_PORT_* env vars; Authelia reads any AUTHELIA_*
      # env as config, so the injected 'port' collides with server.address -> fatal. Off.
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: Always   # for files authelia creates as 1000; the pre-existing root-owned
                                      # /data was chowned 1000:1000 once on-host (fsGroup does NOT remediate
                                      # existing files on local-path) — see RESTORE.md non-root ownership note
      containers:
        - name: authelia
          image: authelia/authelia:4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
          # Direct non-root start: /app/entrypoint.sh execs authelia directly when uid!=0 (skips
          # the root chown+su-exec branch), so no caps are needed. Verified out-of-band
          # (authelia-sctest 2026-06-19): uid 1000 created+wrote /data/db.sqlite3, /api/health ok.
          # Auth backend is file-based (/secrets/users.yml), so /data only holds the sqlite+notifier.
          securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          # No args: the image's default entrypoint reads /config/configuration.yml.
          ports:
            - containerPort: 9091
              name: http
            - containerPort: 9959
              name: metrics
          env:
            - name: AUTHELIA_SESSION_SECRET_FILE
              value: /secrets/SESSION_SECRET
            - name: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE
              value: /secrets/STORAGE_ENCRYPTION_KEY
            - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
              value: /secrets/JWT_SECRET
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests: {memory: 64Mi, cpu: 25m}
            limits: {memory: 256Mi, cpu: 500m}
          readinessProbe:
            httpGet: {path: /api/health, port: 9091}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/health, port: 9091}
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: authelia-config
        - name: secrets
          secret:
            secretName: authelia-secrets
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: apps
  labels: {app: authelia} # ServiceMonitor selector matches Service LABELS, not the pod selector
spec:
  selector: {app: authelia}
  ports:
    - name: http
      port: 9091
      targetPort: 9091
    - name: metrics
      port: 9959
      targetPort: 9959
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`auth.my-blue-car.work`)
      kind: Rule
      services:
        - name: authelia
          port: 9091
  tls: {} # serve the wildcard *.my-blue-car.work default cert (TLSStore default)
---
# The forward-auth Middleware — attach to any app's IngressRoute via
#   middlewares: [{ name: authelia, namespace: apps }]
# Mirrors the Docker authelia@docker middleware (same endpoint + response headers).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: apps
spec:
  forwardAuth:
    address: 'http://authelia.apps.svc.cluster.local:9091/api/authz/forward-auth'
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Email
      - Remote-Name
---
# Auth metrics (login success/fail, request duration) scraped by the OTel Target
# Allocator (serviceMonitorSelector: {} → all namespaces) → pushed to VictoriaMetrics.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: authelia
  namespace: apps
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  selector:
    matchLabels:
      app: authelia
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
