# Narrow exception to the DB isolation in 00-apps-namespace-isolation.yaml: the data tier
# (Postgres/Redis) stays unreachable cross-ns on its DATA ports (5432/6379), but the
# observability namespace may scrape the exporter sidecars on their METRICS ports ONLY
# (9187 postgres_exporter, 9121 redis_exporter). Companion to
# observability/servicemonitors/db-exporters.yaml.
#
# MAINTENANCE: this pod list must stay in sync with the DB exclusion list in
# 00-apps-namespace-isolation.yaml — a new *-postgres/*-redis added there must be added here
# too, or its exporter scrape fails closed (target DOWN in VictoriaMetrics).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apps-allow-db-metrics-from-observability
  namespace: apps
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - aiometadata-postgres
          - aiometadata-redis
          - aiostreams-postgres
          - aiostreams-redis
          - bitmagnet-postgres
          - comet-postgres
          - immich-postgres
          - immich-redis
          - prowlarr-postgres
          - searxng-redis
          - stremthru-postgres
          - stremthru-redis
          - syncio-postgres
          - syncio-redis
          - zilean-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - { protocol: TCP, port: 9187 }
        - { protocol: TCP, port: 9121 }
