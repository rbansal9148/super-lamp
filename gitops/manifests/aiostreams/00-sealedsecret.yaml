---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: aiostreams-secrets
  namespace: apps
spec:
  encryptedData:
    # ADDON_PASSWORD + AIOSTREAMS_AUTH intentionally removed: native aiostreams auth is
    # retired in favour of path-scoped Authelia SSO on the IngressRoute (02-aiostreams.yaml).
    # The vars must be ABSENT (empty string fails the app's username:password validation),
    # so the keys are dropped from the SealedSecret; the controller reconciles them out of
    # the managed Secret. Re-add via `kubeseal` to restore the native login backstop.
    ADDON_PROXY: 
    ADDON_PROXY_CONFIG: 
    BUILTIN_PROWLARR_API_KEY: 
    DATABASE_URI: 
    DEFAULT_SERVICE_CREDENTIALS: 
    FORCED_SERVICE_CREDENTIALS: 
    MEDIAFUSION_API_PASSWORD: 
    SECRET_KEY: 
    TMDB_ACCESS_TOKEN: 
    TMDB_API_KEY: 
    TRAKT_CLIENT_SECRET: 
  template:
    metadata:
      name: aiostreams-secrets
      namespace: apps
    type: Opaque
