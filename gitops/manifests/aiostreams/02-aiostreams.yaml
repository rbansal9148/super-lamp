# aiostreams app — the mesh orchestrator. Config+secrets sealed (envFrom). Mesh peers
# (comet/prowlarr/zilean/mediafusion/stremthru) resolved same-namespace; egress via
# gluetun:8888. NOTE: STREAM_URL_MAPPINGS still points playback at public *.my-blue-car.work
# (Docker Traefik) — those resolve only after the public :443 cutover.
apiVersion: apps/v1
kind: Deployment
metadata: { name: aiostreams, namespace: apps, labels: { app: aiostreams } }
spec:
  replicas: 1
  selector: { matchLabels: { app: aiostreams } }
  template:
    metadata: { labels: { app: aiostreams } }
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # app never calls the k8s API; drop the token mount
      # non-root: distroless image (default uid 0) forced to 65532; only writable path is the
      # /app/data emptyDir (anime-db/seadex caches), made writable by fsGroup. Verified
      # out-of-band (aiostreams-sctest 2026-06-17): Ready, server up, caches written, 0 restarts.
      securityContext: { runAsNonRoot: true, runAsUser: 65532, runAsGroup: 65532, fsGroup: 65532 }
      containers:
        - name: aiostreams
          # tag kept for readability; digest pins the bits (mutable tag → reproducible pull)
          image: ghcr.io/viren070/aiostreams:v2.30.3@sha256:12f31fc5b3c828323a7f9a98241b23c5531f083f4ac0cc675e492884514fd7db
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom: [{ configMapRef: { name: aiostreams-config } }, { secretRef: { name: aiostreams-secrets } }]
          # FORCE_PROXY_CREDENTIALS is a locked override (secret). Wire it straight to
          # StremThru's own proxy auth (same `apps` namespace) so the credential lives in
          # ONE place (stremthru-secrets) rather than being duplicated/re-sealed here.
          env:
            - name: FORCE_PROXY_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: stremthru-secrets
                  key: STREMTHRU_PROXY_AUTH
          ports: [{ containerPort: 3000, name: http }]
          resources: { requests: { memory: 448Mi, cpu: 25m }, limits: { memory: 1Gi, cpu: "1" } }   # req rightsized: 7d peak ~538Mi (was 128Mi)
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /, port: 3000 }, initialDelaySeconds: 15, periodSeconds: 20, timeoutSeconds: 8 }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: aiostreams, namespace: apps }
spec: { selector: { app: aiostreams }, ports: [{ name: http, port: 3000, targetPort: 3000 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: aiostreams, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    # Human-facing UI + config-mutation API -> Authelia SSO. Stremio clients never hit
    # these paths. Excludes the self-token-authed proxy/playback + health endpoints so
    # addon installation and video playback keep working without an interactive login.
    - match: Host(`aiostreams.my-blue-car.work`) && (Path(`/`) || PathPrefix(`/login`) || Path(`/configure`) || Path(`/stremio/configure`) || Path(`/u/configure`) || (PathPrefix(`/api/v1`) && !PathPrefix(`/api/v1/proxy`) && !PathPrefix(`/api/v1/debrid`) && !Path(`/api/v1/health`) && !Path(`/api/v1/status`)))
      kind: Rule
      priority: 100
      middlewares: [{ name: authelia }]
      services: [{ name: aiostreams, port: 3000 }]
    # Public: Stremio manifest/stream (/stremio/<uuid>/...), built-in proxy playback
    # (/proxy, /stremio/proxy, /api/v1/proxy), static assets, health. Self-authed by
    # the per-user UUID / signed proxy token in the URL.
    - match: Host(`aiostreams.my-blue-car.work`)
      kind: Rule
      priority: 1
      services: [{ name: aiostreams, port: 3000 }]
  tls: {}
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: aiostreams-vacuum, namespace: apps }
spec:
  schedule: "50 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
              securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
              env: [{ name: PGPASSWORD, valueFrom: { secretKeyRef: { name: aiostreams-db, key: POSTGRES_PASSWORD } } }]
              # in-pod retry: ride out transient connection-refused blips instead of failing.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  sleep 15
                  for i in $(seq 1 20); do
                    psql -h aiostreams-postgres -U aiostreams -d aiostreams -c "VACUUM (ANALYZE);" && exit 0
                    echo "attempt $i: db unreachable, retry in 6s"; sleep 6
                  done
                  echo "aiostreams vacuum failed after 20 attempts"; exit 1
              resources: { requests: { memory: 32Mi, cpu: 25m }, limits: { memory: 128Mi, cpu: 250m } }
