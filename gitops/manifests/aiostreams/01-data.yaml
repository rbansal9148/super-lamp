# aiostreams data tier: PG18 + redis. App caches (anime-database/seadex) regenerate,
# so /app/data is ephemeral; only the Postgres DB is migrated.
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: aiostreams-db-data, namespace: apps}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain
  resources: {requests: {storage: 2Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: aiostreams-postgres, namespace: apps, labels: {app: aiostreams-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: aiostreams-postgres}}
  template:
    metadata: {labels: {app: aiostreams-postgres}}
    spec:
      enableServiceLinks: false
      securityContext: {fsGroup: 999}
      containers:
        - name: postgres
          image: postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
          # baseline hardening: drop ALL caps, re-add only the postgres entrypoint's needs
          # (CHOWN/DAC_OVERRIDE/FOWNER for PGDATA setup; SETUID/SETGID for gosu drop).
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID] }, seccompProfile: { type: RuntimeDefault } }
          args: ["postgres", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=8MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=8MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: aiostreams}
            - {name: POSTGRES_DB, value: aiostreams}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: aiostreams-db, key: POSTGRES_PASSWORD}}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 128Mi, cpu: 25m}, limits: {memory: 512Mi, cpu: 500m}}   # rightsized: peak ~44Mi (was 1Gi)
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "aiostreams", "-d", "aiostreams"]}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 3}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: aiostreams-db-data}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 256Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: aiostreams-postgres, namespace: apps}
spec: {selector: {app: aiostreams-postgres}, ports: [{name: postgres, port: 5432, targetPort: 5432}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: aiostreams-redis, namespace: apps, labels: {app: aiostreams-redis}}
spec:
  replicas: 1
  selector: {matchLabels: {app: aiostreams-redis}}
  template:
    metadata: {labels: {app: aiostreams-redis}}
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:8.8.0@sha256:2838d5524559494f6f1cd66e97e76b200d64a633a8614200620755ed395daf32
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          args: ["redis-server", "--save", "", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{containerPort: 6379}]
          resources: {requests: {memory: 16Mi, cpu: 10m}, limits: {memory: 160Mi, cpu: 200m}}
          readinessProbe: {exec: {command: ["redis-cli", "ping"]}, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3}
---
apiVersion: v1
kind: Service
metadata: {name: aiostreams-redis, namespace: apps}
spec: {selector: {app: aiostreams-redis}, ports: [{name: redis, port: 6379, targetPort: 6379}]}
