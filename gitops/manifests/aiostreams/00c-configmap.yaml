---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiostreams-config
  namespace: apps
  labels:
    app: aiostreams
data:
  ADDON_CATALOG_CACHE_TTL: '3600'
  ADDON_ID: aiostreams.viren070.com
  ADDON_NAME: AIOStreams
  # Authelia SSO (path-scoped on the IngressRoute) is the sole gate for the config UI.
  # Make the app-layer config page public so users get ONE login (Authelia), not two.
  # This env OVERRIDES the DB-persisted setting (which was toggled true via the dashboard);
  # api.authRequired defaults false but the DB had it true. Stremio manifest/stream/proxy
  # are unaffected (already public). Source: config/schema/api.ts -> AIOSTREAMS_AUTH_REQUIRED.
  AIOSTREAMS_AUTH_REQUIRED: 'false'
  AIOSTREAMS_TAG: v2.30.3
  ALTERNATE_DESIGN: 'false'
  ANIME_DB_EXTENDED_ANITRAKT_MOVIES_REFRESH_INTERVAL: '86400'
  ANIME_DB_EXTENDED_ANITRAKT_TV_REFRESH_INTERVAL: '86400'
  ANIME_DB_FRIBB_MAPPINGS_REFRESH_INTERVAL: '86400'
  ANIME_DB_KITSU_IMDB_MAPPING_REFRESH_INTERVAL: '86400'
  ANIME_DB_LEVEL_OF_DETAIL: required
  ANIME_DB_MANAMI_DB_REFRESH_INTERVAL: '604800'
  BACKGROUND_RESOURCE_REQUEST_TIMEOUT: '15000'
  BASE_URL: https://aiostreams.my-blue-car.work
  BUILTIN_ANIMETOSHO_URL: https://feed.animetosho.org
  BUILTIN_BITMAGNET_URL: http://bitmagnet:3333
  BUILTIN_DEBRID_ERROR_CACHE_TTL: '3600'
  BUILTIN_DEBRID_INSTANT_AVAILABILITY_CACHE_TTL: '3600'
  BUILTIN_DEBRID_LIBRARY_CACHE_TTL: '604800'
  BUILTIN_DEBRID_LIBRARY_STALE_THRESHOLD: '600'
  BUILTIN_DEBRID_PLAYBACK_LINK_CACHE_TTL: '1800'
  BUILTIN_DEBRID_USE_TORRENT_DOWNLOAD_URL: 'true'
  BUILTIN_DEFAULT_KNABEN_TIMEOUT: '8000'
  BUILTIN_DEFAULT_PROWLARR_TIMEOUT: '8000'
  BUILTIN_DEFAULT_TORRENT_GALAXY_TIMEOUT: '2000'
  BUILTIN_DEFAULT_ZILEAN_TIMEOUT: '8000'
  BUILTIN_GDRIVE_PAGE_SIZE_LIMIT: '1000'
  BUILTIN_GET_TORRENT_CONCURRENCY: '8'
  BUILTIN_GET_TORRENT_LAZILY: 'true'
  BUILTIN_GET_TORRENT_TIMEOUT: '10000'
  BUILTIN_KNABEN_SEARCH_TIMEOUT: '10000'
  BUILTIN_MINIMUM_BACKGROUND_REFRESH_INTERVAL: '86400'
  BUILTIN_NAB_CAPABILITIES_CACHE_TTL: '1209600'
  BUILTIN_NAB_MAX_PAGES: '5'
  BUILTIN_NAB_SEARCH_CACHE_TTL: '604800'
  BUILTIN_NAB_SEARCH_TIMEOUT: '10000'
  BUILTIN_NEKOBT_URL: https://nekobt.to/api/torznab
  BUILTIN_PROWLARR_INDEXERS_CACHE_TTL: '1209600'
  BUILTIN_PROWLARR_SEARCH_CACHE_TTL: '604800'
  BUILTIN_PROWLARR_SEARCH_TIMEOUT: '10000'
  BUILTIN_PROWLARR_URL: http://prowlarr:9696
  BUILTIN_SCRAPE_WITH_ALL_TITLES: 'false'
  BUILTIN_SEADEX_URL: https://releases.moe
  BUILTIN_STREMTHRU_URL: http://stremthru:8080
  BUILTIN_TORBOX_SEARCH_CACHE_PER_USER_SEARCH_ENGINE: 'false'
  BUILTIN_TORBOX_SEARCH_SEARCH_API_TIMEOUT: '8000'
  BUILTIN_TORRENT_GALAXY_SEARCH_TIMEOUT: '2000'
  BUILTIN_ZILEAN_URL: http://zilean:8181
  CATALOG_API_RATE_LIMIT_MAX_REQUESTS: '5'
  CATALOG_API_RATE_LIMIT_WINDOW: '5'
  CATALOG_CACHE_TTL: '1800'
  COMET_URL: http://comet:2020
  CUSTOM_HTML: ''
  DEFAULT_COMET_TIMEOUT: '20000'   # was 12000 — give comet room on heavy titles (capped by MAX_TIMEOUT below)
  DEFAULT_JACKETTIO_STREMTHRU_URL: http://stremthru:8080
  DEFAULT_MAX_CACHE_SIZE: '100000'
  DEFAULT_TIMEOUT: '8000'
  DEFAULT_TORRENTIO_TIMEOUT: '3000'
  DISABLE_RATE_LIMITS: 'false'
  DISABLE_SELF_SCRAPING: 'true'
  ENCRYPT_MEDIAFLOW_URLS: 'false'
  ENCRYPT_STREMTHRU_URLS: 'false'
  FETCH_TRAKT_ALIASES: 'true'
  FORCE_PROXY_DISABLE_PROXIED_ADDONS: 'false'
  # Force the StremThru proxy for ALL users — these FORCE_PROXY_* keys are locked overrides
  # (aiostreams disables UI editing of any setting whose env var is set), so nobody has to
  # configure the proxy in the per-user UI. FORCE_PROXY_URL is the in-cluster address the
  # aiostreams SERVER calls; FORCE_PROXY_PUBLIC_URL is what the Stremio CLIENT receives for
  # playback. FORCE_PROXY_CREDENTIALS is injected as an env var in 02-aiostreams.yaml
  # (secretKeyRef → stremthru-secrets) so the credential isn't duplicated here.
  FORCE_PROXY_ENABLED: 'true'
  FORCE_PROXY_ID: stremthru
  FORCE_PROXY_URL: http://stremthru:8080
  FORCE_PROXY_PUBLIC_URL: https://stremthru.my-blue-car.work
  # aiostreams validates a forced proxy by resolving its public IP; for StremThru it asks
  # StremThru, which determines egress via STREMTHRU_IP_CHECKER (aws/akamai/ipify) and was
  # returning null → "Failed to get Proxy public IP after 3 attempts" → whole user config
  # marked invalid (streams broke). Provide the IP directly so aiostreams skips that probe.
  # TorBox is fetched UNtunneled (stremthru STREMTHRU_STORE_TUNNEL=torbox:false), so
  # StremThru's TorBox egress == the node's public IP. UPDATE THIS if the node's public IP
  # changes (residential/dynamic IP → proxied playback would break until re-set).
  FORCE_PROXY_PUBLIC_IP: 161.118.165.53
  FORMAT_API_RATE_LIMIT_MAX_REQUESTS: '30'
  FORMAT_API_RATE_LIMIT_WINDOW: '5'
  LOG_FORMAT: json
  LOG_LEVEL: info
  LOG_SENSITIVE_INFO: 'false'
  MANIFEST_CACHE_TTL: '3600'
  MAX_ADDONS: '150'
  MAX_BACKGROUND_PINGS: '1'
  MAX_FORMATTER_TEMPLATE_LENGTH: '50000'
  MAX_GROUPS: '200'
  MAX_KEYWORD_FILTERS: '300'
  MAX_NZB_FAILOVER_COUNT: '5'
  MAX_SEL_LENGTH: '30000'
  MAX_STREAM_EXPRESSIONS: '300'
  MAX_STREAM_EXPRESSIONS_TOTAL_CHARACTERS: '300000'
  MAX_TIMEOUT: '20000'   # was 15000 — raised so DEFAULT_COMET_TIMEOUT=20000 isn't capped (this 15000 cap is what comet fetches were hitting)
  META_CACHE_TTL: '3600'
  MIN_TIMEOUT: '1000'
  ORION_STREMIO_ADDON_URL: https://5a0d1888fa64-orion.baby-beamup.club/
  PORT: '3000'
  PRECACHE_NEXT_EPISODE_MIN_INTERVAL: '3600'
  PRELOAD_MIN_INTERVAL: '300'
  # Capped low: preloading episode ranges fires one search PER episode to EVERY addon
  # at once. At 10 this bursts TorBox Search past its (tight, undocumented) search-API
  # rate limit -> TorBox returns a cooldown that surfaces as "Rate limit exceeded: 0 per
  # 1 minute", wiping the whole TorBox result set (torrents + NZB) for that window.
  # Confirmed 2026-06-14: 21 searches in 16s (S2E10-E17 preload) -> 27x 0/min, 0 results.
  # 2 keeps the preload fan-out under TorBox's search limit. (was 10)
  PRELOAD_STREAMS_CONCURRENCY: '2'
  PROXY_IP_CACHE_TTL: '900'
  PRUNE_INTERVAL: '86400'
  PRUNE_MAX_DAYS: '-1'
  REDIS_URI: redis://aiostreams-redis:6379
  REGEX_FILTER_ACCESS: all
  SEL_SYNC_ACCESS: all
  SOOTIO_URL: https://68d69db7dc40-debrid-search.baby-beamup.club/
  STATIC_RATE_LIMIT_MAX_REQUESTS: '75'
  STATIC_RATE_LIMIT_WINDOW: '5'
  STREAM_API_RATE_LIMIT_MAX_REQUESTS: '10'
  STREAM_API_RATE_LIMIT_WINDOW: '5'
  STREAM_CACHE_TTL: '3600'
  STREAM_URL_MAPPINGS: '{"http://stremthru:8080":"https://stremthru.my-blue-car.work","http://comet:2020":"https://comet.my-blue-car.work"}'
  STREMIO_CATALOG_RATE_LIMIT_MAX_REQUESTS: '30'
  STREMIO_CATALOG_RATE_LIMIT_WINDOW: '5'
  STREMIO_MANIFEST_RATE_LIMIT_MAX_REQUESTS: '5'
  STREMIO_MANIFEST_RATE_LIMIT_WINDOW: '5'
  STREMIO_META_RATE_LIMIT_MAX_REQUESTS: '15'
  STREMIO_META_RATE_LIMIT_WINDOW: '5'
  STREMIO_STREAM_RATE_LIMIT_MAX_REQUESTS: '10'
  STREMIO_STREAM_RATE_LIMIT_WINDOW: '15'
  STREMIO_SUBTITLE_RATE_LIMIT_MAX_REQUESTS: '10'
  STREMIO_SUBTITLE_RATE_LIMIT_WINDOW: '5'
  STREMTHRU_STORE_URL: http://stremthru:8080/stremio/store
  STREMTHRU_TORZ_URL: http://stremthru:8080/stremio/torz
  SUBTITLE_CACHE_TTL: '3600'
  TORRENTIO_URL: https://torrentio.strem.fun/
  TORRENTS_DB_URL: https://torrentsdb.com
  TRAKT_CLIENT_ID: 23264f47214ad5f254585912ffd0a5773431f511520ff4e67165da3b7a53c406
  USER_API_RATE_LIMIT_MAX_REQUESTS: '5'
  USER_API_RATE_LIMIT_WINDOW: '5'
