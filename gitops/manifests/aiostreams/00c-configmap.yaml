---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiostreams-config
  namespace: apps
  labels:
    app: aiostreams
data:
  ADDON_CATALOG_CACHE_TTL: '86400'   # was 3600 — addon listings change rarely (SAFE-LONG)
  ADDON_ID: aiostreams.viren070.com
  ADDON_NAME: AIOStreams
  # Outbound VPN tunnel for aiostreams' own HTTP egress (undici dispatcher in
  # utils/http.ts → shouldProxy). ADDON_PROXY is gluetun's in-cluster HTTP proxy.
  # ADDON_PROXY_CONFIG routes per-hostname: `*:0` tunnels ALL external hosts through
  # proxy index 0 (gluetun) — including the BUILT-IN proxy's playback fetch AND its
  # checkip.amazonaws.com IP probe (server/routes/api/proxy.ts + proxy/builtin.ts both
  # go through shouldProxy), so the built-in proxy egresses via the VPN and reports the
  # VPN exit IP consistently. In-cluster scrapers are excluded (`:false`) so they resolve
  # same-namespace and don't get sent down the tunnel. NOTE: with `*:0`, a gluetun outage
  # blocks ALL external addon traffic (metadata + scraping), not just playback.
  # Non-secret (schema secret:false) — moved out of the sealed secret per commit 92cb61b.
  ADDON_PROXY: http://gluetun:8888
  # TorBox API hosts go DIRECT (not via gluetun): TorBox's WAF rejects the shared VPN exit IP with a
  # plaintext "http response to https client", breaking debrid resolution. Exact hosts only, so the
  # built-in playback proxy + other torbox.app media/CDN hosts still tunnel via *:0 (playback keeps
  # reporting the VPN IP). Trade: TorBox sees the node IP on API calls; search cooldown is per-key so
  # this doesn't change it, but it stops the IP-reputation protocol rejects.
  ADDON_PROXY_CONFIG: '*:0,api.torbox.app:false,search-api.torbox.app:false,stremthru:false,prowlarr:false,zilean:false,comet:false,bitmagnet:false'
  # Authelia SSO (path-scoped on the IngressRoute) is the sole gate for the config UI.
  # Make the app-layer config page public so users get ONE login (Authelia), not two.
  # This env OVERRIDES the DB-persisted setting (which was toggled true via the dashboard);
  # api.authRequired defaults false but the DB had it true. Stremio manifest/stream/proxy
  # are unaffected (already public). Source: config/schema/api.ts -> AIOSTREAMS_AUTH_REQUIRED.
  AIOSTREAMS_AUTH_REQUIRED: 'false'
  AIOSTREAMS_TAG: v2.30.5
  ALTERNATE_DESIGN: 'false'
  ANIME_DB_EXTENDED_ANITRAKT_MOVIES_REFRESH_INTERVAL: '86400'
  ANIME_DB_EXTENDED_ANITRAKT_TV_REFRESH_INTERVAL: '86400'
  ANIME_DB_FRIBB_MAPPINGS_REFRESH_INTERVAL: '86400'
  ANIME_DB_KITSU_IMDB_MAPPING_REFRESH_INTERVAL: '86400'
  ANIME_DB_LEVEL_OF_DETAIL: required
  ANIME_DB_MANAMI_DB_REFRESH_INTERVAL: '604800'
  BACKGROUND_RESOURCE_REQUEST_TIMEOUT: '120000'
  BASE_URL: https://aiostreams.my-blue-car.work
  BUILTIN_ANIMETOSHO_URL: https://feed.animetosho.org
  BUILTIN_BITMAGNET_URL: http://bitmagnet:3333
  BUILTIN_DEBRID_ERROR_CACHE_TTL: '3600'
  BUILTIN_DEBRID_INSTANT_AVAILABILITY_CACHE_TTL: '3600'
  BUILTIN_DEBRID_LIBRARY_CACHE_TTL: '604800'
  BUILTIN_DEBRID_LIBRARY_STALE_THRESHOLD: '600'
  BUILTIN_DEBRID_PLAYBACK_LINK_CACHE_TTL: '1800'
  BUILTIN_DEBRID_USE_TORRENT_DOWNLOAD_URL: 'true'
  BUILTIN_DEFAULT_KNABEN_TIMEOUT: '8000'
  BUILTIN_DEFAULT_PROWLARR_TIMEOUT: '8000'
  BUILTIN_DEFAULT_TORRENT_GALAXY_TIMEOUT: '2000'
  BUILTIN_DEFAULT_ZILEAN_TIMEOUT: '8000'
  BUILTIN_GDRIVE_PAGE_SIZE_LIMIT: '1000'
  BUILTIN_GET_TORRENT_CONCURRENCY: '8'
  BUILTIN_GET_TORRENT_LAZILY: 'true'
  BUILTIN_GET_TORRENT_TIMEOUT: '10000'
  BUILTIN_KNABEN_SEARCH_TIMEOUT: '10000'
  BUILTIN_MINIMUM_BACKGROUND_REFRESH_INTERVAL: '86400'
  BUILTIN_NAB_CAPABILITIES_CACHE_TTL: '2592000'   # was 1209600 — indexer capability schema, not content (SAFE-LONG)
  BUILTIN_NAB_MAX_PAGES: '5'
  BUILTIN_NAB_SEARCH_CACHE_TTL: '1209600'   # was 604800 (1wk->2wk) — STALE-RISK: hides newly-added torrents until expiry
  BUILTIN_NAB_SEARCH_TIMEOUT: '10000'
  BUILTIN_NEKOBT_URL: https://nekobt.to/api/torznab
  BUILTIN_PROWLARR_INDEXERS_CACHE_TTL: '2592000'   # was 1209600 — indexer config list, not content (SAFE-LONG)
  BUILTIN_PROWLARR_SEARCH_CACHE_TTL: '1209600'   # was 604800 (1wk->2wk) — STALE-RISK
  BUILTIN_PROWLARR_SEARCH_TIMEOUT: '10000'
  BUILTIN_PROWLARR_URL: http://prowlarr:9696
  BUILTIN_SCRAPE_WITH_ALL_TITLES: 'false'
  BUILTIN_SEADEX_URL: https://releases.moe
  BUILTIN_STREMTHRU_URL: http://stremthru:8080
  BUILTIN_TORBOX_SEARCH_CACHE_PER_USER_SEARCH_ENGINE: 'false'
  # TorBox Search result cache. A cache HIT skips the upstream /search call (addon.ts:76-86),
  # so a longer TTL = fewer TorBox search-API calls for re-opened titles (does NOT help the
  # cooldown itself — distinct-title searches always miss). Default was 7d; raised to 14d.
  BUILTIN_TORBOX_SEARCH_METADATA_CACHE_TTL: '2592000'   # 30d (default 14d) — TorBox Search metadata, near-static
  BUILTIN_TORBOX_SEARCH_SEARCH_API_CACHE_TTL: '1209600'   # 14d (default 7d) — TorBox /search result list
  BUILTIN_TORBOX_SEARCH_SEARCH_API_TIMEOUT: '8000'
  BUILTIN_TORRENT_GALAXY_SEARCH_TIMEOUT: '2000'
  BUILTIN_TORRENT_METADATA_CACHE_TTL: '2592000'   # 30d (default 7d) — a torrent's own metadata is immutable once published (SAFE-LONG)
  BUILTIN_ZILEAN_URL: http://zilean:8181
  CATALOG_API_RATE_LIMIT_MAX_REQUESTS: '5'
  CATALOG_API_RATE_LIMIT_WINDOW: '5'
  CATALOG_CACHE_TTL: '21600'   # was 1800 (30m->6h) — STALE-RISK: new catalog items appear slower
  COMET_URL: http://comet:2020
  CUSTOM_HTML: ''
  DEFAULT_COMET_TIMEOUT: '18000'   # was 12000 — give comet room on heavy titles (capped by MAX_TIMEOUT below)
  DEFAULT_JACKETTIO_STREMTHRU_URL: http://stremthru:8080
  DEFAULT_MAX_CACHE_SIZE: '100000'
  DEFAULT_TIMEOUT: '15000'
  DEFAULT_TORRENTIO_TIMEOUT: '3000'
  DISABLE_RATE_LIMITS: 'false'
  DISABLE_SELF_SCRAPING: 'true'
  ENCRYPT_MEDIAFLOW_URLS: 'false'
  ENCRYPT_STREMTHRU_URLS: 'false'
  FETCH_TRAKT_ALIASES: 'true'
  FORCE_PROXY_DISABLE_PROXIED_ADDONS: 'false'
  # DISABLED 2026-07-02: proxy streaming turned off — playback is no longer forced through the
  # built-in proxy; clients receive direct debrid URLs (TorBox = Cloudflare CDN, not P2P, so no
  # VPN/proxy hop needed for playback). Re-enable by flipping FORCE_PROXY_ENABLED back to 'true'.
  # The wiring notes below remain valid for that case.
  # Force the BUILT-IN aiostreams proxy for ALL users — these FORCE_PROXY_* keys are locked
  # overrides (aiostreams disables UI editing of any setting whose env var is set), so nobody
  # has to configure the proxy in the per-user UI. The built-in proxy routes playback through
  # aiostreams itself, so two fields are derived automatically and MUST NOT be set here:
  #   - proxy URL  → forced to bootstrap.baseUrl (BASE_URL) when id=builtin (utils/config.ts).
  #   - public IP  → builtin.ts resolves its OWN egress via checkip.amazonaws.com (the k8s
  #                  node's public IP — NOT the gluetun VPN; debrid is no longer VPN-tunnelled).
  # FORCE_PROXY_CREDENTIALS is injected in 02-aiostreams.yaml (secretKeyRef →
  # aiostreams-secrets/AIOSTREAMS_AUTH). The built-in proxy validates credentials against the
  # instance bootstrap auth users (AIOSTREAMS_AUTH), so the SAME user:pass is both the auth
  # entry and the forced proxy credential — single source, guaranteed to match.
  FORCE_PROXY_ENABLED: 'false'
  FORCE_PROXY_ID: builtin
  FORMAT_API_RATE_LIMIT_MAX_REQUESTS: '30'
  FORMAT_API_RATE_LIMIT_WINDOW: '5'
  LOG_FORMAT: json
  LOG_LEVEL: info
  LOG_SENSITIVE_INFO: 'false'
  MANIFEST_CACHE_TTL: '86400'   # was 3600 — manifests change only on addon redeploy (SAFE-LONG)
  MAX_ADDONS: '150'
  MAX_BACKGROUND_PINGS: '1'
  MAX_FORMATTER_TEMPLATE_LENGTH: '50000'
  MAX_GROUPS: '200'
  MAX_KEYWORD_FILTERS: '300'
  MAX_NZB_FAILOVER_COUNT: '5'
  MAX_SEL_LENGTH: '30000'
  MAX_STREAM_EXPRESSIONS: '300'
  MAX_STREAM_EXPRESSIONS_TOTAL_CHARACTERS: '300000'
  MAX_TIMEOUT: '20000'   # caps ALL addon timeouts; must stay >= DEFAULT_COMET_TIMEOUT(18000) & DEFAULT_TIMEOUT(15000).
  # Was accidentally '3000', which silently clamped every addon to 3s and defeated all per-addon timeout tuning.
  META_CACHE_TTL: '86400'   # was 3600 — title metadata near-static (STALE-RISK, low)
  MIN_TIMEOUT: '1000'
  ORION_STREMIO_ADDON_URL: https://5a0d1888fa64-orion.baby-beamup.club/
  PORT: '3000'
  PRECACHE_NEXT_EPISODE_MIN_INTERVAL: '3600'
  PRELOAD_MIN_INTERVAL: '300'
  # Capped low: preloading episode ranges fires one search PER episode to EVERY addon
  # at once. At 10 this bursts TorBox Search past its (tight, undocumented) search-API
  # rate limit -> TorBox returns a cooldown that surfaces as "Rate limit exceeded: 0 per
  # 1 minute", wiping the whole TorBox result set (torrents + NZB) for that window.
  # Confirmed 2026-06-14: 21 searches in 16s (S2E10-E17 preload) -> 27x 0/min, 0 results.
  # 2 keeps the preload fan-out under TorBox's search limit. (was 10)
  PRELOAD_STREAMS_CONCURRENCY: '2'
  PROXY_IP_CACHE_TTL: '900'
  PRUNE_INTERVAL: '86400'
  PRUNE_MAX_DAYS: '-1'
  REDIS_URI: redis://aiostreams-redis:6379
  REGEX_FILTER_ACCESS: all
  SEL_SYNC_ACCESS: all
  SOOTIO_URL: https://68d69db7dc40-debrid-search.baby-beamup.club/
  STATIC_RATE_LIMIT_MAX_REQUESTS: '75'
  STATIC_RATE_LIMIT_WINDOW: '5'
  STREAM_API_RATE_LIMIT_MAX_REQUESTS: '10'
  STREAM_API_RATE_LIMIT_WINDOW: '5'
  STREAM_CACHE_TTL: '21600'   # was 3600 (1h->6h) — a cache HIT returns the assembled stream list and skips the
  # ENTIRE addon fan-out incl the TorBox search call (biggest TorBox call-saver). Caveat: this response can embed
  # a resolved, time-limited debrid link from a wrapped external addon, so a stale hit could hand the player a dead
  # link; capped at 6h to bound that (builtin-debrid links resolve fresh via BUILTIN_DEBRID_PLAYBACK_LINK_CACHE_TTL).
  STREAM_URL_MAPPINGS: '{"http://stremthru:8080":"https://stremthru.my-blue-car.work","http://comet:2020":"https://comet.my-blue-car.work"}'
  STREMIO_CATALOG_RATE_LIMIT_MAX_REQUESTS: '30'
  STREMIO_CATALOG_RATE_LIMIT_WINDOW: '5'
  STREMIO_MANIFEST_RATE_LIMIT_MAX_REQUESTS: '5'
  STREMIO_MANIFEST_RATE_LIMIT_WINDOW: '5'
  STREMIO_META_RATE_LIMIT_MAX_REQUESTS: '15'
  STREMIO_META_RATE_LIMIT_WINDOW: '5'
  STREMIO_STREAM_RATE_LIMIT_MAX_REQUESTS: '10'
  STREMIO_STREAM_RATE_LIMIT_WINDOW: '15'
  STREMIO_SUBTITLE_RATE_LIMIT_MAX_REQUESTS: '10'
  STREMIO_SUBTITLE_RATE_LIMIT_WINDOW: '5'
  STREMTHRU_STORE_URL: http://stremthru:8080/stremio/store
  STREMTHRU_TORZ_URL: http://stremthru:8080/stremio/torz
  SUBTITLE_CACHE_TTL: '86400'   # was 3600 — subtitles stable per release (STALE-RISK, low)
  TORRENTIO_URL: https://torrentio.strem.fun/
  TORRENTS_DB_URL: https://torrentsdb.com
  TRAKT_CLIENT_ID: 23264f47214ad5f254585912ffd0a5773431f511520ff4e67165da3b7a53c406
  USER_API_RATE_LIMIT_MAX_REQUESTS: '5'
  USER_API_RATE_LIMIT_WINDOW: '5'
