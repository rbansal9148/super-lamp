---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stremthru-config
  namespace: apps
  labels:
    app: stremthru
data:
  STREMTHRU_BASE_URL: https://stremthru.my-blue-car.work
  STREMTHRU_CONTENT_PROXY_CONNECTION_LIMIT: '*:0'
  STREMTHRU_INTEGRATION_BITMAGNET_BASE_URL: http://bitmagnet:3333
  STREMTHRU_LOG_FORMAT: json
  STREMTHRU_LOG_LEVEL: INFO
  STREMTHRU_REDIS_URI: redis://stremthru-redis:6379
  STREMTHRU_STORE_CONTENT_PROXY: '*:true,easydebrid:false,premiumize:false'
  # torbox now tunnelled too (was torbox:false): TorBox store fetches egress via gluetun
  # VPN (146.70.199.159), hiding the node's residential IP from TorBox. NB: TorBox now sees
  # a Singapore VPN IP — watch for throttling/blocks of the VPN range (the earlier 429s were
  # API-key rate limits, not IP, so unrelated). aiostreams FORCE_PROXY_PUBLIC_IP must track
  # this egress (set to the VPN IP).
  STREMTHRU_STORE_TUNNEL: torbox:true,*:true
  STREMTHRU_STREMIO_TORZ_LAZY_PULL: 'true'
  # v3-cinemeta.strem.io direct (no VPN proxy): public Stremio metadata, no privacy need;
  # tunneling it caused intermittent store 500s ("http response to https client") + 15s timeouts.
  STREMTHRU_TUNNEL: bitmagnet:false,bitmagnet-postgres:false,stremthru-postgres:false,stremthru-redis:false,v3-cinemeta.strem.io:false,*:true
