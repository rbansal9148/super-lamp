# stremthru — debrid/torrent middleware. hostPath-REUSE: PG (10GB) + app /app/data
# (hashlists 3.2G, imdb 2.1G) reused in place (zero copy). PG18.4. Egress via gluetun:8888.
# Connects to its own DB + bitmagnet's DB (bitmagnet-postgres, resolves once bitmagnet
# migrates). Consumed in-namespace as stremthru:8080. One-way (hostPath, no Docker rollback).
apiVersion: apps/v1
kind: Deployment
metadata: {name: stremthru-postgres, namespace: apps, labels: {app: stremthru-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: stremthru-postgres}}
  template:
    metadata: {labels: {app: stremthru-postgres}}
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # no k8s API use; drop the token mount
      containers:
        - name: postgres
          image: postgres:18.4@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
          # baseline hardening: drop ALL caps, re-add only the postgres entrypoint's needs
          # (CHOWN/DAC_OVERRIDE/FOWNER for PGDATA setup; SETUID/SETGID for gosu drop).
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID] }, seccompProfile: { type: RuntimeDefault } }
          args: ["postgres", "-c", "shared_buffers=512MB", "-c", "effective_cache_size=1536MB", "-c", "maintenance_work_mem=256MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=16MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=16MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000", "-c", "idle_in_transaction_session_timeout=300000", "-c", "idle_session_timeout=900000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: stremthru}
            - {name: POSTGRES_DB, value: stremthru}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: stremthru-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 1280Mi, cpu: 50m}, limits: {memory: 1536Mi, cpu: "1"}}   # req→1280Mi: 30d peak grew to 1.2Gi (was 981Mi); limit 1536Mi burst headroom
          volumeMounts:
            - {name: pgdata, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "stremthru", "-d", "stremthru"]}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 3}
          livenessProbe: {exec: {command: ["pg_isready", "-U", "stremthru", "-d", "stremthru"]}, initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 5}   # restart a wedged postmaster (readiness only de-endpoints)
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1@sha256:ac5ec343104fae0e2d84a27bb8d69b38430a11910c5382cad85d478d2bab713e
          securityContext: { runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, readOnlyRootFilesystem: true, seccompProfile: { type: RuntimeDefault } }
          env:
            - {name: DATA_SOURCE_URI, value: "localhost:5432/stremthru?sslmode=disable"}
            - {name: DATA_SOURCE_USER, value: stremthru}
            - name: DATA_SOURCE_PASS
              valueFrom: {secretKeyRef: {name: stremthru-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 9187, name: metrics}]
          resources: {requests: {memory: 24Mi, cpu: 5m}, limits: {memory: 64Mi, cpu: 100m}}
      volumes:
        - name: pgdata
          hostPath: {path: /opt/docker/data/stremthru/db, type: Directory}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 512Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: stremthru-postgres, namespace: apps, labels: {exporter: postgres}}
spec: {selector: {app: stremthru-postgres}, ports: [{name: postgres, port: 5432, targetPort: 5432}, {name: metrics, port: 9187, targetPort: 9187}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: stremthru-redis, namespace: apps, labels: {app: stremthru-redis}}
spec:
  replicas: 1
  selector: {matchLabels: {app: stremthru-redis}}
  template:
    metadata: {labels: {app: stremthru-redis}}
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # no k8s API use; drop the token mount
      containers:
        - name: redis
          image: redis:8.8.0@sha256:234c902a2db49461a129e2d4aeff85b28cf20187ed274a67f6e50995fa713c7b
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          args: ["redis-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{containerPort: 6379}]
          resources: {requests: {memory: 256Mi, cpu: 10m}, limits: {memory: 512Mi, cpu: 300m}}  # req=maxmemory 256mb, limit 2x (OOM-safe ratio; the 1.25x ceiling OOMKilled aiometadata-redis)
          readinessProbe: {exec: {command: ["redis-cli", "ping"]}, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3}
        - name: redis-exporter
          image: quay.io/oliver006/redis_exporter:v1.87.0@sha256:9ca6f929a8abc518d78158757922444f1cf807661a2238f44b28c3cd08a1b652
          securityContext: { runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, readOnlyRootFilesystem: true, seccompProfile: { type: RuntimeDefault } }
          env:
            - {name: REDIS_ADDR, value: "redis://localhost:6379"}
          ports: [{containerPort: 9121, name: metrics}]
          resources: {requests: {memory: 16Mi, cpu: 5m}, limits: {memory: 48Mi, cpu: 100m}}
---
apiVersion: v1
kind: Service
metadata: {name: stremthru-redis, namespace: apps, labels: {exporter: redis}}
spec: {selector: {app: stremthru-redis}, ports: [{name: redis, port: 6379, targetPort: 6379}, {name: metrics, port: 9121, targetPort: 9121}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: stremthru, namespace: apps, labels: {app: stremthru}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: stremthru}}
  template:
    metadata: {labels: {app: stremthru}}
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # no k8s API use; drop the token mount
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000 }   # non-root; /app/data hostPath chowned 1000:1000 on-host (see RESTORE.md)
      initContainers:
        # stremthru tunnels all egress via gluetun (STREMTHRU_TUNNEL=*:true) and PANICS
        # at boot if the proxy isn't up ("Failed to resolve Tunnel IP Map"). Gate start
        # on the gluetun proxy being reachable to avoid CrashLoopBackOff after rolls.
        - name: wait-for-gluetun
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command: ['sh', '-c', 'until nc -z gluetun 8888; do echo "waiting for gluetun proxy"; sleep 2; done']
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}, runAsNonRoot: true, runAsUser: 65534, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: stremthru
          image: muniftanjim/stremthru@sha256:4cf7829557148931fcb386d16cf2ae1fe97b38a2d46d4079089748d4eff1c692
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}, seccompProfile: {type: RuntimeDefault}}
          envFrom: [{configMapRef: {name: stremthru-config}}, {secretRef: {name: stremthru-secrets}}]
          ports: [{containerPort: 8080, name: http}]
          resources: {requests: {memory: 640Mi, cpu: 50m}, limits: {memory: 1Gi, cpu: "2"}}   # req→640Mi: 30d peak 750Mi (was 128Mi, badly under-counted)
          volumeMounts: [{name: data, mountPath: /app/data}]
          readinessProbe: {httpGet: {path: /v0/health, port: 8080}, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8}
          livenessProbe: {httpGet: {path: /v0/health, port: 8080}, initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 8, failureThreshold: 3}
      volumes:
        - name: data
          hostPath: {path: /opt/docker/data/stremthru, type: Directory}
---
apiVersion: v1
kind: Service
metadata: {name: stremthru, namespace: apps}
spec: {selector: {app: stremthru}, ports: [{name: http, port: 8080, targetPort: 8080}]}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: {name: stremthru, namespace: apps}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`stremthru.my-blue-car.work`)
      kind: Rule
      middlewares: [{name: ratelimit-default}]   # anonymous addon/store endpoint
      services: [{name: stremthru, port: 8080}]
  tls: {}
---
apiVersion: batch/v1
kind: CronJob
metadata: {name: stremthru-vacuum, namespace: apps}
spec:
  suspend: false   # re-enabled 2026-07-18: the 2026-06-26 scale-to-0 test was reverted same week; stremthru-postgres is 1/1
  schedule: "5 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
              securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
              env:
                - name: PGPASSWORD
                  valueFrom: {secretKeyRef: {name: stremthru-secrets, key: POSTGRES_PASSWORD}}
              # in-pod retry: ride out transient connection-refused blips instead of failing.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  sleep 15
                  for i in $(seq 1 20); do
                    psql -h stremthru-postgres -U stremthru -d stremthru -c "VACUUM (ANALYZE);" && exit 0
                    echo "attempt $i: db unreachable, retry in 6s"; sleep 6
                  done
                  echo "stremthru vacuum failed after 20 attempts"; exit 1
              resources: {requests: {memory: 32Mi, cpu: 25m}, limits: {memory: 256Mi, cpu: 250m}}
