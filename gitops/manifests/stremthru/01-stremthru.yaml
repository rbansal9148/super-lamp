# stremthru — debrid/torrent middleware. hostPath-REUSE: PG (10GB) + app /app/data
# (hashlists 3.2G, imdb 2.1G) reused in place (zero copy). PG18.4. Egress via gluetun:8888.
# Connects to its own DB + bitmagnet's DB (bitmagnet-postgres, resolves once bitmagnet
# migrates). Consumed in-namespace as stremthru:8080. One-way (hostPath, no Docker rollback).
apiVersion: apps/v1
kind: Deployment
metadata: {name: stremthru-postgres, namespace: apps, labels: {app: stremthru-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: stremthru-postgres}}
  template:
    metadata: {labels: {app: stremthru-postgres}}
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # no k8s API use; drop the token mount
      containers:
        - name: postgres
          image: postgres:18.4
          args: ["postgres", "-c", "shared_buffers=512MB", "-c", "effective_cache_size=1536MB", "-c", "maintenance_work_mem=256MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=16MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=16MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: stremthru}
            - {name: POSTGRES_DB, value: stremthru}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: stremthru-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 512Mi, cpu: 50m}, limits: {memory: 1536Mi, cpu: "1"}}   # rightsized: 8d peak ~844Mi (was 2Gi)
          volumeMounts:
            - {name: pgdata, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "stremthru", "-d", "stremthru"]}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 3}
      volumes:
        - name: pgdata
          hostPath: {path: /opt/docker/data/stremthru/db, type: Directory}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 512Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: stremthru-postgres, namespace: apps}
spec: {selector: {app: stremthru-postgres}, ports: [{name: postgres, port: 5432, targetPort: 5432}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: stremthru-redis, namespace: apps, labels: {app: stremthru-redis}}
spec:
  replicas: 1
  selector: {matchLabels: {app: stremthru-redis}}
  template:
    metadata: {labels: {app: stremthru-redis}}
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # no k8s API use; drop the token mount
      containers:
        - name: redis
          image: redis:8.6.3
          args: ["redis-server", "--save", "", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{containerPort: 6379}]
          resources: {requests: {memory: 32Mi, cpu: 10m}, limits: {memory: 320Mi, cpu: 300m}}
          readinessProbe: {exec: {command: ["redis-cli", "ping"]}, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3}
---
apiVersion: v1
kind: Service
metadata: {name: stremthru-redis, namespace: apps}
spec: {selector: {app: stremthru-redis}, ports: [{name: redis, port: 6379, targetPort: 6379}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: stremthru, namespace: apps, labels: {app: stremthru}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: stremthru}}
  template:
    metadata: {labels: {app: stremthru}}
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # no k8s API use; drop the token mount
      containers:
        - name: stremthru
          image: muniftanjim/stremthru@sha256:83d9bdc8e43acd8f29da117b760239797214622e0dc8f37cf2c23c7f2df38b02
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}, seccompProfile: {type: RuntimeDefault}}
          envFrom: [{configMapRef: {name: stremthru-config}}, {secretRef: {name: stremthru-secrets}}]
          ports: [{containerPort: 8080, name: http}]
          resources: {requests: {memory: 128Mi, cpu: 50m}, limits: {memory: 1Gi, cpu: "2"}}   # rightsized: peak <300Mi (was 2Gi)
          volumeMounts: [{name: data, mountPath: /app/data}]
          readinessProbe: {httpGet: {path: /v0/health, port: 8080}, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8}
      volumes:
        - name: data
          hostPath: {path: /opt/docker/data/stremthru, type: Directory}
---
apiVersion: v1
kind: Service
metadata: {name: stremthru, namespace: apps}
spec: {selector: {app: stremthru}, ports: [{name: http, port: 8080, targetPort: 8080}]}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: {name: stremthru, namespace: apps, annotations: {external-dns.alpha.kubernetes.io/target: "161.118.165.53"}}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`stremthru.my-blue-car.work`)
      kind: Rule
      services: [{name: stremthru, port: 8080}]
  tls: {}
---
apiVersion: batch/v1
kind: CronJob
metadata: {name: stremthru-vacuum, namespace: apps}
spec:
  schedule: "5 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4
              env:
                - name: PGPASSWORD
                  valueFrom: {secretKeyRef: {name: stremthru-secrets, key: POSTGRES_PASSWORD}}
              # in-pod retry: ride out transient connection-refused blips instead of failing.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  sleep 15
                  for i in $(seq 1 20); do
                    psql -h stremthru-postgres -U stremthru -d stremthru -c "VACUUM (ANALYZE);" && exit 0
                    echo "attempt $i: db unreachable, retry in 6s"; sleep 6
                  done
                  echo "stremthru vacuum failed after 20 attempts"; exit 1
              resources: {requests: {memory: 32Mi, cpu: 25m}, limits: {memory: 256Mi, cpu: 250m}}
