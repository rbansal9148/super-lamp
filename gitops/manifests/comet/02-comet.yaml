# comet app — stremio debrid addon / scraper. Config+secrets from sealed comet-secrets.
# Mesh peers resolved same-namespace; egress via gluetun:8888. comet.k8s.* behind Authelia.
apiVersion: apps/v1
kind: Deployment
metadata: { name: comet, namespace: apps, labels: { app: comet } }
spec:
  replicas: 1
  selector: { matchLabels: { app: comet } }
  template:
    metadata: { labels: { app: comet } }
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # app never calls the k8s API; drop the token mount
      containers:
        - name: comet
          image: g0ldyy/comet:dev@sha256:2725968b372b8efcfdcd13c6a9277b334a84152a312429975d7057768024de62
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom: [{ configMapRef: { name: comet-config } }, { secretRef: { name: comet-secrets } }]
          ports: [{ containerPort: 2020, name: http }]
          resources: { requests: { memory: 768Mi, cpu: 25m }, limits: { memory: 1536Mi, cpu: "2" } }   # req→768Mi: 30d workload-peak 962Mi (was 512Mi); limit 1536Mi for burst headroom
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /health, port: 2020 }, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8 }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: comet, namespace: apps }
spec: { selector: { app: comet }, ports: [{ name: http, port: 2020, targetPort: 2020 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: comet, namespace: apps, annotations: { external-dns.alpha.kubernetes.io/target: "161.118.165.53" } }
spec:
  entryPoints: [websecure]
  routes:
    # /admin dashboard: force through Authelia (defense-in-depth over comet's own
    # dashboard password). Higher priority than the catch-all so the Stremio addon
    # paths (everything else) stay bypassed for clients that can't auth.
    - match: Host(`comet.my-blue-car.work`) && PathPrefix(`/admin`)
      kind: Rule
      priority: 100
      middlewares:
        - name: authelia
          namespace: apps
      services: [{ name: comet, port: 2020 }]
    - match: Host(`comet.my-blue-car.work`)
      kind: Rule
      services: [{ name: comet, port: 2020 }]
  tls: {}
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: comet-vacuum, namespace: apps }
spec:
  schedule: "45 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
              env:
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: comet-secrets, key: POSTGRES_PASSWORD } }
              # in-pod retry: ride out transient connection-refused blips (kube-proxy
              # REJECT during a brief endpoint gap) instead of failing the whole job.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  sleep 15
                  for i in $(seq 1 20); do
                    psql -h comet-postgres -U comet -d comet -c "VACUUM (ANALYZE);" && exit 0
                    echo "attempt $i: db unreachable, retry in 6s"; sleep 6
                  done
                  echo "comet vacuum failed after 20 attempts"; exit 1
              resources: { requests: { memory: 32Mi, cpu: 25m }, limits: { memory: 128Mi, cpu: 250m } }
