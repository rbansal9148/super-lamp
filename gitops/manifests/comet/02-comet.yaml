# comet app — stremio debrid addon / scraper. Config+secrets from sealed comet-secrets.
# Mesh peers resolved same-namespace; egress via gluetun:8888. comet.k8s.* behind Authelia.
apiVersion: apps/v1
kind: Deployment
metadata: { name: comet, namespace: apps, labels: { app: comet } }
spec:
  replicas: 1
  selector: { matchLabels: { app: comet } }
  template:
    metadata: { labels: { app: comet } }
    spec:
      enableServiceLinks: false
      containers:
        - name: comet
          image: g0ldyy/comet@sha256:7ab050b1ab0f9a6e01981f14ba13f8bf1fd508914d2aa0bb83909b0ba2e55138
          envFrom: [{ secretRef: { name: comet-secrets } }]
          ports: [{ containerPort: 2020, name: http }]
          resources: { requests: { memory: 128Mi, cpu: 50m }, limits: { memory: 2Gi, cpu: "2" } }
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /health, port: 2020 }, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8 }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: comet, namespace: apps }
spec: { selector: { app: comet }, ports: [{ name: http, port: 2020, targetPort: 2020 }] }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: { name: comet-tls, namespace: apps }
spec:
  secretName: comet-tls
  issuerRef: { name: selfsigned, kind: ClusterIssuer }
  dnsNames: [comet.my-blue-car.work]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: comet, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`comet.my-blue-car.work`)
      kind: Rule
      services: [{ name: comet, port: 2020 }]
  tls: {}
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: comet-vacuum, namespace: apps }
spec:
  schedule: "45 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4
              env: [{ name: PGPASSWORD, value: comet }]
              command: ["psql","-h","comet-postgres","-U","comet","-d","comet","-c","VACUUM (ANALYZE);"]
              resources: { requests: { memory: 32Mi, cpu: 25m }, limits: { memory: 128Mi, cpu: 250m } }
