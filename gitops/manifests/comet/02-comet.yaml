# comet — SPLIT into two Deployments sharing comet-postgres (2026-06-17):
#   • comet (live): on-demand serving. NO proxy env -> scrapes egress on the home IP.
#     Owns the Service + IngressRoute (Authelia /admin). Linkerd name "comet" (dashboards
#     /alerts key on this). BACKGROUND_SCRAPER off (configmap baseline).
#   • comet-bg: background scraper only. Sets the gluetun proxy URLs inline -> scrapes
#     egress via VPN. No Service, no ingress. Flips SCRAPE_* to background/False.
# Both envFrom comet-config + comet-secrets; both write the same torrent cache in
# comet-postgres, so live serves bg's pre-cached results. SCRAPE_LOCK_TTL dedupes overlap.
apiVersion: apps/v1
kind: Deployment
metadata: { name: comet, namespace: apps, labels: { app: comet } }
spec:
  replicas: 1
  selector: { matchLabels: { app: comet } }
  template:
    metadata: { labels: { app: comet } }
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # app never calls the k8s API; drop the token mount
      containers:
        - name: comet
          image: g0ldyy/comet:dev@sha256:2725968b372b8efcfdcd13c6a9277b334a84152a312429975d7057768024de62
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom: [{ configMapRef: { name: comet-config } }, { secretRef: { name: comet-secrets } }]
          ports: [{ containerPort: 2020, name: http }]
          resources: { requests: { memory: 768Mi, cpu: 25m }, limits: { memory: 1536Mi, cpu: "2" } }   # req→768Mi: 30d workload-peak 962Mi (was 512Mi); limit 1536Mi for burst headroom
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /health, port: 2020 }, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8 }
      volumes: [{ name: data, emptyDir: {} }]
---
# comet-bg — background-scraper-only instance. Egress via the shared gluetun VPN proxy
# (proxy URLs set inline here, NOT in comet-secrets, so they apply ONLY to this pod).
# No Service / IngressRoute: nothing routes user traffic here. Shares comet-postgres with
# the live pod, which serves whatever this pod caches. Linkerd deployment="comet-bg" so its
# outbound 429s stay off the live "comet" inbound dashboards/alerts.
apiVersion: apps/v1
kind: Deployment
metadata: { name: comet-bg, namespace: apps, labels: { app: comet-bg } }
spec:
  replicas: 1
  selector: { matchLabels: { app: comet-bg } }
  template:
    metadata: { labels: { app: comet-bg } }
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      containers:
        - name: comet
          image: g0ldyy/comet:dev@sha256:2725968b372b8efcfdcd13c6a9277b334a84152a312429975d7057768024de62
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom: [{ configMapRef: { name: comet-config } }, { secretRef: { name: comet-secrets } }]
          # Per-mode overrides on top of comet-config (the live baseline):
          env:
            # background scraper ON; serving sources flipped to background (the ones that
            # were "both" pre-split). Live-only sources have no bg component -> False.
            - { name: BACKGROUND_SCRAPER_ENABLED, value: "True" }
            - { name: SCRAPE_COMET,        value: background }
            - { name: SCRAPE_NYAA,         value: background }
            - { name: SCRAPE_TORRENTIO,    value: background }
            - { name: SCRAPE_TORRENTSDB,   value: background }
            - { name: SCRAPE_MEDIAFUSION,  value: background }
            - { name: SCRAPE_STREMTHRU,    value: "False" }
            - { name: SCRAPE_ZILEAN,       value: "False" }
            - { name: SCRAPE_TORBOX,       value: "False" }
            # single worker: with gunicorn preload a multi-worker pod would start the bg
            # scraper per worker (DB SCRAPE_LOCK dedupes, but 1 worker avoids the churn).
            - { name: FASTAPI_WORKERS, value: "1" }
            # egress via VPN: these apply ONLY to this Deployment (live has no proxy).
            - { name: COMET_PROXY_URL,      value: "http://gluetun:8888" }
            - { name: NYAA_PROXY_URL,       value: "http://gluetun:8888" }
            - { name: TMDB_PROXY_URL,       value: "http://gluetun:8888" }
            - { name: TORRENTIO_PROXY_URL,  value: "http://gluetun:8888" }
            - { name: TORRENTSDB_PROXY_URL, value: "http://gluetun:8888" }
          ports: [{ containerPort: 2020, name: http }]
          resources: { requests: { memory: 512Mi, cpu: 25m }, limits: { memory: 1536Mi, cpu: "2" } }
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /health, port: 2020 }, initialDelaySeconds: 20, periodSeconds: 20, timeoutSeconds: 8 }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: comet, namespace: apps }
spec: { selector: { app: comet }, ports: [{ name: http, port: 2020, targetPort: 2020 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: comet, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    # /admin dashboard: force through Authelia (defense-in-depth over comet's own
    # dashboard password). Higher priority than the catch-all so the Stremio addon
    # paths (everything else) stay bypassed for clients that can't auth.
    - match: Host(`comet.my-blue-car.work`) && PathPrefix(`/admin`)
      kind: Rule
      priority: 100
      middlewares:
        - name: authelia
          namespace: apps
      services: [{ name: comet, port: 2020 }]
    - match: Host(`comet.my-blue-car.work`)
      kind: Rule
      services: [{ name: comet, port: 2020 }]
  tls: {}
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: comet-vacuum, namespace: apps }
spec:
  schedule: "45 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
              env:
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: comet-secrets, key: POSTGRES_PASSWORD } }
              # in-pod retry: ride out transient connection-refused blips (kube-proxy
              # REJECT during a brief endpoint gap) instead of failing the whole job.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  sleep 15
                  for i in $(seq 1 20); do
                    psql -h comet-postgres -U comet -d comet -c "VACUUM (ANALYZE);" && exit 0
                    echo "attempt $i: db unreachable, retry in 6s"; sleep 6
                  done
                  echo "comet vacuum failed after 20 attempts"; exit 1
              resources: { requests: { memory: 32Mi, cpu: 25m }, limits: { memory: 128Mi, cpu: 250m } }
