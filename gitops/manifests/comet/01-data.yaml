# comet Postgres (PG18). DATABASE_TYPE=postgresql (the /app/data SQLite is vestigial).
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: comet-db-data, namespace: apps}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain
  resources: {requests: {storage: 2Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: comet-postgres, namespace: apps, labels: {app: comet-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: comet-postgres}}
  template:
    metadata: {labels: {app: comet-postgres}}
    spec:
      enableServiceLinks: false
      securityContext: {fsGroup: 999}
      containers:
        - name: postgres
          image: postgres:18.4@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
          # baseline hardening: drop ALL caps, re-add only what the postgres entrypoint needs
          # (CHOWN/DAC_OVERRIDE/FOWNER to set up PGDATA; SETUID/SETGID for gosu drop to uid 999).
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID] }, seccompProfile: { type: RuntimeDefault } }
          args: ["postgres", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=8MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=8MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000", "-c", "idle_in_transaction_session_timeout=300000", "-c", "idle_session_timeout=900000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: comet}
            - {name: POSTGRES_DB, value: comet}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: comet-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 384Mi, cpu: 25m}, limits: {memory: 512Mi, cpu: 750m}}   # req covers 30d VM peak 317Mi (index/vacuum burst; instantaneous top read ~65Mi and under-set the request); cpu limit 500m→750m: 30d-peak 502m hit the old 500m cap (CFS-throttled), 750m leaves peak at ~67%
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "comet", "-d", "comet"]}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 3}
          livenessProbe: {exec: {command: ["pg_isready", "-U", "comet", "-d", "comet"]}, initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 5}   # restart a wedged postmaster (readiness only de-endpoints)
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1@sha256:ac5ec343104fae0e2d84a27bb8d69b38430a11910c5382cad85d478d2bab713e
          securityContext: { runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, readOnlyRootFilesystem: true, seccompProfile: { type: RuntimeDefault } }
          env:
            - {name: DATA_SOURCE_URI, value: "localhost:5432/comet?sslmode=disable"}
            - {name: DATA_SOURCE_USER, value: comet}
            - name: DATA_SOURCE_PASS
              valueFrom: {secretKeyRef: {name: comet-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 9187, name: metrics}]
          resources: {requests: {memory: 24Mi, cpu: 5m}, limits: {memory: 64Mi, cpu: 100m}}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: comet-db-data}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 256Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: comet-postgres, namespace: apps, labels: {exporter: postgres}}
spec:
  selector: {app: comet-postgres}
  ports:
    - {name: postgres, port: 5432, targetPort: 5432}
    - {name: metrics, port: 9187, targetPort: 9187}
