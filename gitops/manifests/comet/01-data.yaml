# comet Postgres (PG18). DATABASE_TYPE=postgresql (the /app/data SQLite is vestigial).
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: comet-db-data, namespace: apps}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain
  resources: {requests: {storage: 2Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: comet-postgres, namespace: apps, labels: {app: comet-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: comet-postgres}}
  template:
    metadata: {labels: {app: comet-postgres}}
    spec:
      enableServiceLinks: false
      securityContext: {fsGroup: 70}   # alpine postgres uid/gid (was 999 debian)
      initContainers:
        # In-place debian(uid999)->alpine(uid70) switch: chown the existing PGDATA
        # so the alpine postgres user (70) owns it, else FATAL "data directory has
        # wrong ownership". Idempotent; safe to leave after migration.
        - name: fix-perms
          image: postgres:18-alpine
          command: ["sh", "-c", "chown -R 70:70 /var/lib/postgresql/data"]
          securityContext: {runAsUser: 0}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
      containers:
        - name: postgres
          image: postgres:18-alpine
          args: ["postgres", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=8MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=8MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000", "-c", "idle_in_transaction_session_timeout=300000", "-c", "idle_session_timeout=900000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: comet}
            - {name: POSTGRES_DB, value: comet}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: comet-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 128Mi, cpu: 25m}, limits: {memory: 512Mi, cpu: 500m}}   # rightsized: peak ~65Mi (was 1Gi)
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "comet", "-d", "comet"]}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 3}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: comet-db-data}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 256Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: comet-postgres, namespace: apps}
spec: {selector: {app: comet-postgres}, ports: [{name: postgres, port: 5432, targetPort: 5432}]}
