---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comet-config
  namespace: apps
  labels:
    app: comet
data:
  ADDON_ID: stremio.comet.fast
  ADDON_NAME: Comet
  ANIME_MAPPING_ENABLED: 'True'
  ANIME_MAPPING_REFRESH_INTERVAL: '432000'
  ANIME_MAPPING_SOURCE: database
  BACKGROUND_SCRAPER_CONCURRENT_WORKERS: '2'
  BACKGROUND_SCRAPER_ENABLED: 'True'
  BACKGROUND_SCRAPER_INTERVAL: '1800'
  BACKGROUND_SCRAPER_MAX_MOVIES_PER_RUN: '50'
  BACKGROUND_SCRAPER_MAX_SERIES_PER_RUN: '50'
  BITMAGNET_MAX_CONCURRENT_PAGES: '5'
  BITMAGNET_MAX_OFFSET: '15000'
  BITMAGNET_URL: '["http://bitmagnet:3333:both"]'
  CATALOG_TIMEOUT: '30'
  COMET_URL: '["https://cometfortheweebs.midnightignite.me"]'
  CUSTOM_HEADER_HTML: None
  DATABASE_BATCH_SIZE: '20000'
  DATABASE_STARTUP_CLEANUP_INTERVAL: '3600'
  DATABASE_TYPE: postgresql
  DEBRIDIO_PROVIDER: realdebrid
  DEBRID_CACHE_CHECK_RATIO: '0'
  DEBRID_CACHE_TTL: '86400'
  DIGITAL_RELEASE_FILTER: 'False'
  DISABLE_TORRENT_STREAMS: 'False'
  DOWNLOAD_TORRENT_FILES: 'False'
  FASTAPI_HOST: 0.0.0.0
  FASTAPI_PORT: '2020'
  FASTAPI_WORKERS: '2'
  GET_TORRENT_TIMEOUT: '3'
  GUNICORN_PRELOAD_APP: 'True'
  HTTP_CACHE_ENABLED: 'True'
  HTTP_CACHE_PRIVATE_STREAMS_TTL: '60'
  HTTP_CACHE_PUBLIC_STREAMS_TTL: '300'
  HTTP_CACHE_STALE_WHILE_REVALIDATE: '60'
  HTTP_CACHE_STREAMS_TTL: '1800'
  HTTP_CLIENT_TIMEOUT_TOTAL: '8'
  INDEXER_MANAGER_TIMEOUT: '10'
  INDEXER_MANAGER_UPDATE_INTERVAL: '10'
  INDEXER_MANAGER_WAIT_TIMEOUT: '0'
  LIVE_TORRENT_CACHE_TTL: '604800'
  MAGNET_RESOLVE_TIMEOUT: '30'
  MEDIAFUSION_URL: '["https://mediafusion.elfhosted.com"]'   # public ElfHosted instance (local mediafusion removed from stack)
  METADATA_CACHE_TTL: '2592000'
  METRICS_CACHE_TTL: '60'
  NYAA_ANIME_ONLY: 'False'
  NYAA_MAX_CONCURRENT_PAGES: '5'
  PEERFLIX_URL: 'https://addon.peerflix.mov '
  PROWLARR_INDEXERS: '[]'
  PROWLARR_URL: http://prowlarr:9696
  PROXY_DEBRID_STREAM: 'False'
  PROXY_DEBRID_STREAM_DEBRID_DEFAULT_SERVICE: realdebrid
  PROXY_DEBRID_STREAM_INACTIVITY_THRESHOLD: '300'
  PROXY_DEBRID_STREAM_MAX_CONNECTIONS: '-1'
  PROXY_ETHOS: on_failure
  PUBLIC_BASE_URL: https://comet.my-blue-car.work
  PUBLIC_METRICS_API: 'True'
  RATELIMIT_MAX_RETRIES: '2'
  RATELIMIT_RETRY_BASE_DELAY: '10.0'
  REMOVE_ADULT_CONTENT: 'False'
  RTN_FILTER_DEBUG: 'False'
  SCRAPE_AIOSTREAMS: 'False'
  SCRAPE_BITMAGNET: 'False'
  SCRAPE_COMET: both
  SCRAPE_DEBRIDIO: 'False'
  SCRAPE_JACKETT: 'false'
  SCRAPE_JACKETTIO: 'False'
  SCRAPE_LOCK_TTL: '300'
  SCRAPE_MEDIAFUSION: both
  SCRAPE_NYAA: both
  SCRAPE_PEERFLIX: 'False'
  SCRAPE_PROWLARR: 'False'
  SCRAPE_STREMTHRU: live
  SCRAPE_TORBOX: live   # live-only (no background): TorBox search API is tightly rate-limited and the key is shared with aiostreams
  SCRAPE_TORRENTIO: both
  SCRAPE_TORRENTSDB: both
  SCRAPE_WAIT_TIMEOUT: '30'
  SCRAPE_ZILEAN: live
  STREMTHRU_SCRAPE_URL: https://stremthru.elfhosted.com   # public ElfHosted instance (local stremthru queried via aiostreams)
  STREMTHRU_URL: https://stremthru.elfhosted.com
  TORRENTIO_URL: https://torrentio.strem.fun
  TORRENT_CACHE_TTL: '2592000'
  TORRENT_DISABLED_STREAM_DESCRIPTION: Direct torrent playback is disabled on this server. Please configure a debrid provider.
  TORRENT_DISABLED_STREAM_NAME: '[INFO] Comet'
  TORRENT_DISABLED_STREAM_URL: https://comet.fast
  USE_GUNICORN: 'True'
  ZILEAN_URL: '["https://zilean.elfhosted.com"]'   # public ElfHosted DMM instance (local zilean queried via aiostreams)
