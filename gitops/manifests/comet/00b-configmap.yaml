---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comet-config
  namespace: apps
  labels:
    app: comet
data:
  # SPLIT DEPLOYMENT (2026-06-17): this ConfigMap is the LIVE baseline, consumed verbatim
  # by the `comet` (live) Deployment — on-demand serving, egress on the home IP (no proxy,
  # proxy URLs removed from comet-secrets). The `comet-bg` Deployment envFroms this same
  # ConfigMap and OVERRIDES the per-mode keys inline (SCRAPE_* -> background/False,
  # BACKGROUND_SCRAPER_ENABLED=True, FASTAPI_WORKERS=1) + sets the gluetun proxy URLs so
  # background scraping egresses via VPN. Both share comet-postgres, so live serves bg's
  # cached torrents. Keep per-mode keys defined HERE at their live values; change bg's view
  # in 02-comet.yaml, not here.
  ADDON_ID: stremio.comet.fast
  ADDON_NAME: Comet
  ANIME_MAPPING_ENABLED: 'True'
  ANIME_MAPPING_REFRESH_INTERVAL: '432000'
  ANIME_MAPPING_SOURCE: database
  BACKGROUND_SCRAPER_CONCURRENT_WORKERS: '4'   # bg-only (live has bg off). 2->4: more parallel title scrapes per cycle. Safe post-split — bg has its own VPN IP, doesn't affect live serving.
  BACKGROUND_SCRAPER_ENABLED: 'False'   # live baseline = OFF; comet-bg overrides to True
  BACKGROUND_SCRAPER_INTERVAL: '3600'
  BACKGROUND_SCRAPER_MAX_MOVIES_PER_RUN: '100'
  BACKGROUND_SCRAPER_MAX_SERIES_PER_RUN: '100'
  BACKGROUND_SCRAPER_RUN_TIME_BUDGET: '2700'   # was default 1800; cycle was hitting the budget at 73/100. 2700 < INTERVAL 3600 keeps a 900s gap (no runaway-loop overlap).
  BITMAGNET_MAX_CONCURRENT_PAGES: '5'
  BITMAGNET_MAX_OFFSET: '15000'
  BITMAGNET_URL: '["http://bitmagnet:3333:both"]'
  CATALOG_TIMEOUT: '30'
  COMET_URL: '["https://cometfortheweebs.midnightignite.me"]'
  CUSTOM_HEADER_HTML: None
  DATABASE_BATCH_SIZE: '20000'
  DATABASE_STARTUP_CLEANUP_INTERVAL: '3600'
  DATABASE_TYPE: postgresql
  DEBRIDIO_PROVIDER: torbox
  DEBRID_CACHE_CHECK_RATIO: '0'
  DEBRID_CACHE_TTL: '86400'
  DIGITAL_RELEASE_FILTER: 'False'
  DISABLE_TORRENT_STREAMS: 'False'
  DOWNLOAD_TORRENT_FILES: 'False'
  FASTAPI_HOST: 0.0.0.0
  FASTAPI_PORT: '2020'
  FASTAPI_WORKERS: '2'
  GET_TORRENT_TIMEOUT: '3'
  GUNICORN_PRELOAD_APP: 'True'
  HTTP_CACHE_ENABLED: 'True'
  HTTP_CACHE_PRIVATE_STREAMS_TTL: '60'
  HTTP_CACHE_PUBLIC_STREAMS_TTL: '300'
  HTTP_CACHE_STALE_WHILE_REVALIDATE: '60'
  HTTP_CACHE_STREAMS_TTL: '1800'
  HTTP_CLIENT_TIMEOUT_TOTAL: '8'
  INDEXER_MANAGER_TIMEOUT: '10'
  INDEXER_MANAGER_UPDATE_INTERVAL: '10'
  INDEXER_MANAGER_WAIT_TIMEOUT: '0'
  LIVE_TORRENT_CACHE_TTL: '604800'
  MAGNET_RESOLVE_TIMEOUT: '30'
  MEDIAFUSION_URL: '["https://mediafusion.elfhosted.com"]'   # public ElfHosted instance (local mediafusion removed from stack)
  METADATA_CACHE_TTL: '2592000'
  METRICS_CACHE_TTL: '60'
  NYAA_ANIME_ONLY: 'False'
  NYAA_MAX_CONCURRENT_PAGES: '5'
  PEERFLIX_URL: 'https://addon.peerflix.mov '
  PROWLARR_INDEXERS: '[]'
  PROWLARR_URL: http://prowlarr:9696
  PROXY_DEBRID_STREAM: 'False'
  PROXY_DEBRID_STREAM_DEBRID_DEFAULT_SERVICE: torbox
  PROXY_DEBRID_STREAM_INACTIVITY_THRESHOLD: '300'
  PROXY_DEBRID_STREAM_MAX_CONNECTIONS: '-1'
  PROXY_ETHOS: on_failure
  PUBLIC_BASE_URL: https://comet.my-blue-car.work
  PUBLIC_METRICS_API: 'True'
  RATELIMIT_MAX_RETRIES: '1'
  RATELIMIT_RETRY_BASE_DELAY: '2.0'
  REMOVE_ADULT_CONTENT: 'False'
  RTN_FILTER_DEBUG: 'False'
  SCRAPE_AIOSTREAMS: 'False'
  SCRAPE_BITMAGNET: 'False'
  SCRAPE_COMET: live
  SCRAPE_DEBRIDIO: 'False'
  SCRAPE_JACKETT: 'false'
  SCRAPE_JACKETTIO: 'False'
  SCRAPE_LOCK_TTL: '300'
  SCRAPE_MEDIAFUSION: live
  SCRAPE_NYAA: live
  SCRAPE_PEERFLIX: 'False'
  SCRAPE_PROWLARR: 'False'
  SCRAPE_STREMTHRU: live
  SCRAPE_TORBOX: 'False'   # TEMP (2026-06-17 TorBox API outage): disabled so comet doesn't block 13-30s on the dead TorBox search API per request. REVERT to 'live' when TorBox recovers. (comet-bg overrides to False regardless.)
  SCRAPE_TORRENTIO: live
  SCRAPE_TORRENTSDB: live
  SCRAPE_WAIT_TIMEOUT: '8'
  SCRAPE_ZILEAN: live
  STREMTHRU_SCRAPE_URL: https://stremthru.elfhosted.com   # torrent SEARCH source (SCRAPE_STREMTHRU) — public elfhosted is fine for read-only search
  STREMTHRU_URL: http://stremthru:8080   # debrid STORE backend for debrid-account-scrape (list_magnets). MUST be local: public elfhosted 403s store/account ops (decode-mimetype 403 on /v0/store/magnets).
  TORRENTIO_URL: https://torrentio.strem.fun
  TORRENT_CACHE_TTL: '2592000'
  TORRENT_DISABLED_STREAM_DESCRIPTION: Direct torrent playback is disabled on this server. Please configure a debrid provider.
  TORRENT_DISABLED_STREAM_NAME: '[INFO] Comet'
  TORRENT_DISABLED_STREAM_URL: https://comet.fast
  USE_GUNICORN: 'True'
  ZILEAN_URL: '["https://zilean.elfhosted.com"]'   # public ElfHosted DMM instance (local zilean queried via aiostreams)
