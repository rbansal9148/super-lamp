# external-dns — k8s-native replacement for the Docker favonia/cloudflare-ddns.
# Watches Traefik IngressRoutes and syncs Cloudflare A records (proxied) for every
# Host() under my-blue-car.work, pointing at the static origin IP via --default-targets.
# Reuses the SAME Cloudflare token as cert-manager (re-sealed into this namespace).
#
# SAFETY: --policy=upsert-only means external-dns can CREATE/UPDATE but NEVER DELETE a
# record — so it cannot wipe the ~90 legacy/non-k8s records still in the zone. A TXT
# ownership registry (--registry=txt, edns- prefix) scopes what it manages to its own.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: external-dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps", "ingressrouteudps"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
  labels: { app: external-dns }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: external-dns }
  template:
    metadata:
      labels: { app: external-dns }
    spec:
      serviceAccountName: external-dns
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0@sha256:f53faaf71cb270d1ca9dce6ea0c94bfebf1a18696263487f0fbc74b9bf2bd7ff
          args:
            - --source=traefik-proxy            # traefik.io IngressRoutes (legacy containo.us support removed upstream)
            - --domain-filter=my-blue-car.work
            - --provider=cloudflare
            - --cloudflare-proxied               # records proxied through CF (matches the favonia setup)
            - --policy=upsert-only               # NEVER delete — cannot black-hole the zone
            - --registry=txt
            - --txt-owner-id=k3s-mbc
            - --txt-prefix=edns-                 # avoid A/TXT name collisions on proxied records
            - --default-targets=161.118.165.53   # static Oracle VM origin IP (CF connects back here)
            - --interval=1m
            - --log-format=json
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef: { name: cloudflare-api-token, key: CF_API_TOKEN }
          resources:
            requests: { memory: 64Mi, cpu: 25m }
            limits: { memory: 256Mi, cpu: 200m }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
