# aiometadata data tier: PG18 + redis cache.
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: aiometadata-db-data, namespace: apps}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain
  resources: {requests: {storage: 2Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: aiometadata-postgres, namespace: apps, labels: {app: aiometadata-postgres}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: aiometadata-postgres}}
  template:
    metadata: {labels: {app: aiometadata-postgres}}
    spec:
      enableServiceLinks: false
      securityContext: {fsGroup: 999}
      containers:
        - name: postgres
          image: postgres:18.4
          args: ["postgres", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=8MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=8MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: aiometadata}
            - {name: POSTGRES_DB, value: aiometadata}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: aiometadata-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources: {requests: {memory: 128Mi, cpu: 50m}, limits: {memory: 1Gi, cpu: 500m}}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe: {exec: {command: ["pg_isready", "-U", "aiometadata", "-d", "aiometadata"]}, initialDelaySeconds: 10, periodSeconds: 10}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: aiometadata-db-data}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 256Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: aiometadata-postgres, namespace: apps}
spec: {selector: {app: aiometadata-postgres}, ports: [{name: postgres, port: 5432, targetPort: 5432}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: aiometadata-redis, namespace: apps, labels: {app: aiometadata-redis}}
spec:
  replicas: 1
  selector: {matchLabels: {app: aiometadata-redis}}
  template:
    metadata: {labels: {app: aiometadata-redis}}
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:8.6.3
          args: ["redis-server", "--save", "", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{containerPort: 6379}]
          resources: {requests: {memory: 16Mi, cpu: 10m}, limits: {memory: 160Mi, cpu: 200m}}
          readinessProbe: {exec: {command: ["redis-cli", "ping"]}, initialDelaySeconds: 5, periodSeconds: 10}
---
apiVersion: v1
kind: Service
metadata: {name: aiometadata-redis, namespace: apps}
spec: {selector: {app: aiometadata-redis}, ports: [{name: redis, port: 6379, targetPort: 6379}]}
