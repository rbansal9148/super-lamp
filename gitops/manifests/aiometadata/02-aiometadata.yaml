# aiometadata app — metadata addon. Config+secrets sealed (envFrom). /app/addon/data is
# regenerable metadata/poster cache -> ephemeral. aiometadata.k8s.* behind Authelia.
apiVersion: apps/v1
kind: Deployment
metadata: { name: aiometadata, namespace: apps, labels: { app: aiometadata } }
spec:
  replicas: 1
  selector: { matchLabels: { app: aiometadata } }
  template:
    metadata: { labels: { app: aiometadata } }
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false   # app never calls the k8s API; drop the token mount
      securityContext: { runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000 }   # node:24-alpine node user 1000; direct `node` entrypoint, no chown; /app/addon/data is emptyDir
      containers:
        - name: aiometadata
          image: ghcr.io/cedya77/aiometadata:latest@sha256:1c0a0f10a609533b33ee350e04ac517f63d83ae21002658778b1b8f5263c1beb
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          envFrom: [{ configMapRef: { name: aiometadata-config } }, { secretRef: { name: aiometadata-secrets } }]
          ports: [{ containerPort: 1337, name: http }]
          resources: { requests: { memory: 384Mi, cpu: 25m }, limits: { memory: 1Gi, cpu: 1500m } }   # req rightsized: 7d peak ~466Mi (was 128Mi); cpu limit 1→1500m: 30d-peak 1.02 cores hit the old 1.0 cap (CFS-throttled), 1500m leaves peak at ~68%
          volumeMounts: [{ name: data, mountPath: /app/addon/data }]
          readinessProbe: { httpGet: { path: /, port: 1337 }, initialDelaySeconds: 15, periodSeconds: 20, timeoutSeconds: 8 }
          livenessProbe: { httpGet: { path: /, port: 1337 }, initialDelaySeconds: 30, periodSeconds: 30, timeoutSeconds: 8, failureThreshold: 3 }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: aiometadata, namespace: apps }
spec: { selector: { app: aiometadata }, ports: [{ name: http, port: 1337, targetPort: 1337 }] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: aiometadata, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`aiometadata.my-blue-car.work`)
      kind: Rule
      services: [{ name: aiometadata, port: 1337 }]
  tls: {}
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: aiometadata-vacuum, namespace: apps }
spec:
  schedule: "55 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
              securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
              env:
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: aiometadata-secrets, key: POSTGRES_PASSWORD } }
              # in-pod retry: ride out transient connection-refused blips instead of failing.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  sleep 15
                  for i in $(seq 1 20); do
                    psql -h aiometadata-postgres -U aiometadata -d aiometadata -c "VACUUM (ANALYZE);" && exit 0
                    echo "attempt $i: db unreachable, retry in 6s"; sleep 6
                  done
                  echo "aiometadata vacuum failed after 20 attempts"; exit 1
              resources: { requests: { memory: 32Mi, cpu: 25m }, limits: { memory: 128Mi, cpu: 250m } }
