# aiometadata app — metadata addon. Config+secrets sealed (envFrom). /app/addon/data is
# regenerable metadata/poster cache -> ephemeral. aiometadata.k8s.* behind Authelia.
apiVersion: apps/v1
kind: Deployment
metadata: { name: aiometadata, namespace: apps, labels: { app: aiometadata } }
spec:
  replicas: 1
  selector: { matchLabels: { app: aiometadata } }
  template:
    metadata: { labels: { app: aiometadata } }
    spec:
      enableServiceLinks: false
      containers:
        - name: aiometadata
          image: ghcr.io/cedya77/aiometadata:latest@sha256:4e6a01dc6d5e1e18d2fca0283e17a969fd33c10365083717488e67b785c98992
          envFrom: [{ secretRef: { name: aiometadata-secrets } }]
          ports: [{ containerPort: 1337, name: http }]
          resources: { requests: { memory: 128Mi, cpu: 50m }, limits: { memory: 1Gi, cpu: "1" } }
          volumeMounts: [{ name: data, mountPath: /app/addon/data }]
          readinessProbe: { httpGet: { path: /, port: 1337 }, initialDelaySeconds: 15, periodSeconds: 20, timeoutSeconds: 8 }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: aiometadata, namespace: apps }
spec: { selector: { app: aiometadata }, ports: [{ name: http, port: 1337, targetPort: 1337 }] }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: { name: aiometadata-tls, namespace: apps }
spec:
  secretName: aiometadata-tls
  issuerRef: { name: selfsigned, kind: ClusterIssuer }
  dnsNames: [aiometadata.k8s.my-blue-car.work]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: aiometadata, namespace: apps }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`aiometadata.k8s.my-blue-car.work`)
      kind: Rule
      middlewares: [{ name: authelia }]
      services: [{ name: aiometadata, port: 1337 }]
  tls: { secretName: aiometadata-tls }
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: aiometadata-vacuum, namespace: apps }
spec:
  schedule: "55 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: vacuum
              image: postgres:18.4
              env: [{ name: PGPASSWORD, value: aiometadata }]
              command: ["psql","-h","aiometadata-postgres","-U","aiometadata","-d","aiometadata","-c","VACUUM (ANALYZE);"]
              resources: { requests: { memory: 32Mi, cpu: 25m }, limits: { memory: 128Mi, cpu: 250m } }
