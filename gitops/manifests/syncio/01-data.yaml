# syncio data tier: Postgres (PG18) + redis cache. PG tuning mirrors compose.
# Service names use hyphens (syncio-postgres / syncio-redis); DATABASE_URL/REDIS_URL
# in the sealed secret point at these. redis is a pure LRU cache -> ephemeral emptyDir.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syncio-db-data
  namespace: apps
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-postgres
  namespace: apps
  labels: {app: syncio-postgres}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: syncio-postgres}
  template:
    metadata:
      labels: {app: syncio-postgres}
    spec:
      enableServiceLinks: false
      securityContext: {fsGroup: 999}
      containers:
        - name: postgres
          image: postgres:18.4@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
          # baseline hardening: drop ALL caps, re-add only the postgres entrypoint's needs
          # (CHOWN/DAC_OVERRIDE/FOWNER for PGDATA setup; SETUID/SETGID for gosu drop).
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL], add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID] }, seccompProfile: { type: RuntimeDefault } }
          args: ["postgres", "-c", "shared_buffers=128MB", "-c", "effective_cache_size=384MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_buffers=8MB", "-c", "random_page_cost=1.1", "-c", "effective_io_concurrency=200", "-c", "work_mem=8MB", "-c", "max_connections=100", "-c", "log_min_duration_statement=1000", "-c", "log_parameter_max_length=0", "-c", "log_parameter_max_length_on_error=0", "-c", "idle_in_transaction_session_timeout=300000", "-c", "idle_session_timeout=900000"]
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_USER, value: syncio}
            - {name: POSTGRES_DB, value: syncio}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: syncio-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 5432, name: postgres}]
          resources:
            requests: {memory: 128Mi, cpu: 25m}
            limits: {memory: 512Mi, cpu: 500m}   # rightsized: peak ~49Mi (was 1Gi)
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: dshm, mountPath: /dev/shm}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "syncio", "-d", "syncio"]}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3   # 1s default flaps the endpoint under load -> connection-refused blips
          livenessProbe:
            exec: {command: ["pg_isready", "-U", "syncio", "-d", "syncio"]}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5   # generous: a tight liveness timeout would RESTART postgres under load
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1@sha256:ac5ec343104fae0e2d84a27bb8d69b38430a11910c5382cad85d478d2bab713e
          securityContext: { runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, readOnlyRootFilesystem: true, seccompProfile: { type: RuntimeDefault } }
          env:
            - {name: DATA_SOURCE_URI, value: "localhost:5432/syncio?sslmode=disable"}
            - {name: DATA_SOURCE_USER, value: syncio}
            - name: DATA_SOURCE_PASS
              valueFrom: {secretKeyRef: {name: syncio-secrets, key: POSTGRES_PASSWORD}}
          ports: [{containerPort: 9187, name: metrics}]
          resources: {requests: {memory: 24Mi, cpu: 5m}, limits: {memory: 64Mi, cpu: 100m}}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: syncio-db-data}
        - name: dshm
          emptyDir: {medium: Memory, sizeLimit: 256Mi}
      priorityClassName: data-tier
---
apiVersion: v1
kind: Service
metadata: {name: syncio-postgres, namespace: apps, labels: {exporter: postgres}}
spec:
  selector: {app: syncio-postgres}
  ports:
    - {name: postgres, port: 5432, targetPort: 5432}
    - {name: metrics, port: 9187, targetPort: 9187}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-redis
  namespace: apps
  labels: {app: syncio-redis}
spec:
  replicas: 1
  selector:
    matchLabels: {app: syncio-redis}
  template:
    metadata:
      labels: {app: syncio-redis}
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: redis:8.8.0@sha256:234c902a2db49461a129e2d4aeff85b28cf20187ed274a67f6e50995fa713c7b
          securityContext: { runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, seccompProfile: { type: RuntimeDefault } }
          args: ["redis-server", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
          ports: [{containerPort: 6379, name: redis}]
          resources:
            requests: {memory: 16Mi, cpu: 10m}
            limits: {memory: 96Mi, cpu: 200m}
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3   # 1s default flaps the endpoint under load -> connection-refused blips
        - name: redis-exporter
          image: quay.io/oliver006/redis_exporter:v1.87.0@sha256:9ca6f929a8abc518d78158757922444f1cf807661a2238f44b28c3cd08a1b652
          securityContext: { runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, allowPrivilegeEscalation: false, capabilities: { drop: [ALL] }, readOnlyRootFilesystem: true, seccompProfile: { type: RuntimeDefault } }
          env:
            - {name: REDIS_ADDR, value: "redis://localhost:6379"}
          ports: [{containerPort: 9121, name: metrics}]
          resources: {requests: {memory: 16Mi, cpu: 5m}, limits: {memory: 48Mi, cpu: 100m}}
---
apiVersion: v1
kind: Service
metadata: {name: syncio-redis, namespace: apps, labels: {exporter: redis}}
spec:
  selector: {app: syncio-redis}
  ports:
    - {name: redis, port: 6379, targetPort: 6379}
    - {name: metrics, port: 9121, targetPort: 9121}
