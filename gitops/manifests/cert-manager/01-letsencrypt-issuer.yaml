# Let's Encrypt production ClusterIssuer using Cloudflare DNS-01 (works behind CF proxy
# and issues wildcards). Token sealed in cert-manager/cloudflare-api-token.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: rubal.bansal@lotusflare.com
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
