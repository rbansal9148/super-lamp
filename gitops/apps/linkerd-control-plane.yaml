# Wave -1: Linkerd control plane. cert-manager owns all TLS:
#  - identityTrustAnchorsPEM = the mesh root (public); identity issuer rotates off it
#    (scheme kubernetes.io/tls -> reads the cert-manager-managed linkerd-identity-issuer).
#  - the 3 admission webhooks use externalSecret + caBundle (the webhook root), so ArgoCD
#    never fights Helm-generated self-signed webhook certs (they'd re-randomise each sync).
# Meshes NOTHING by itself: injection is opt-in per-namespace/pod (Phase 2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: linkerd-control-plane, namespace: argocd, annotations: { argocd.argoproj.io/sync-wave: "-1" } }
spec:
  project: default
  source:
    repoURL: https://helm.linkerd.io/edge
    chart: linkerd-control-plane
    targetRevision: 2026.6.3           # linkerd edge channel (latest as of 2026-06-19)
    helm:
      releaseName: linkerd-control-plane
      values: |
        # Anonymous usage telemetry to versioncheck.linkerd.io (Cloudflare). The node
        # won't route to it ("no route to host"), so the daily CronJob only produces
        # Failed pods that trip the pod-not-ready alarm. No operational value here.
        disableHeartBeat: true
        identityTrustAnchorsPEM: |
          -----BEGIN CERTIFICATE-----
