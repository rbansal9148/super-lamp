# Custom k3s HelmChartConfig overrides, migrated off the host into GitOps (2026-06-14).
# Currently one object: the Traefik HelmChartConfig (manifests/k3s-overrides/). k3s's
# helm-controller consumes the HCC regardless of who creates it, so ArgoCD owning it
# applies the override exactly as the host addon did — but now it is reviewable,
# versioned, and self-healed. See manifests/k3s-overrides/README.md for the one-time
# cutover that removed k3s's ownership (host file + objectset annotations).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3s-overrides
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # foundational ingress config — before app workloads
spec:
  project: default
  source:
    repoURL: git@github.com:rbansal9148/super-lamp.git
    targetRevision: main
    path: gitops/manifests/k3s-overrides
    directory: { recurse: true }
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true        # adopt the existing k3s-created HCC object in place
      - CreateNamespace=false