# Wave 0 — OpenTelemetry Operator (manages the two collector CRs in wave 1).
# Default collector image is set to -contrib because the core image lacks the
# filelog, kubeletstats, and deltatocumulative components this stack requires
# (ADR D3 / primer §1, §3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-operator
    targetRevision: 0.114.1              # operator app 0.152.0 (latest stable as of 2026-05-31)
    helm:
      values: |
        manager:
          # bound the operator manager container (was unlimited)
          resources:
            requests: { memory: 64Mi, cpu: 25m }
            limits: { memory: 256Mi, cpu: 500m }
          collectorImage:
            # tag tracks the operator appVersion (0.152.0) — contrib publishes the same tags
            repository: otel/opentelemetry-collector-contrib
        admissionWebhooks:
          # cert-manager issues a STABLE webhook cert + injects the caBundle.
          # autoGenerateCert uses Helm genSignedCert, which is non-deterministic
          # under ArgoCD (re-rendered every sync) → caBundle/serving-cert drift →
          # x509 "unknown authority". cert-manager is the ArgoCD-safe fix.
          certManager:
            enabled: true
          autoGenerateCert:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
