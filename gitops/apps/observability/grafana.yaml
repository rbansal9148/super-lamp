# Wave 1 — Grafana: query frontend over VM + VictoriaLogs, unified alerting → ntfy
# (ADR D5, primer §6). Dashboards/datasources/alerting are provisioned from git;
# do not click-build in the UI (they live in Grafana's DB and vanish on redeploy).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.15              # Grafana app 12.3.1 (latest stable as of 2026-05-31)
    helm:
      releaseName: grafana
      values: |
        # RWO PVC + RollingUpdate deadlocks (new pod can't attach the volume the old
        # one holds -> Pending -> app Degraded). Recreate: stop old, then start new.
        deploymentStrategy:
          type: Recreate
        # fsGroup:472 already makes the PVC writable by the grafana uid; the chart's
        # init-chown-data (chown -R as a restricted user) just crash-loops on existing
        # 472-owned files (Permission denied) and blocks startup. Disable it.
        initChownData:
          enabled: false
        # bound the main grafana container (was unlimited → could OOM neighbours)
        resources:
          requests: { memory: 512Mi, cpu: 50m }   # req→512Mi: 30d workload-peak 611Mi (was 256Mi)
          limits: { memory: 1Gi, cpu: "1" }     # 30d workload-peak ~611Mi
        admin:
          existingSecret: grafana-admin   # from a SealedSecret — see secrets/README.md
          userKey: admin-user
          passwordKey: admin-password
        persistence:
          enabled: true
          storageClassName: local-path
          size: 2Gi
        # VictoriaLogs datasource is a plugin
        plugins:
          - victoriametrics-logs-datasource
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: VictoriaMetrics
                uid: victoriametrics
                type: prometheus
                access: proxy
                url: http://vmsingle-obs.observability.svc:8428
                isDefault: true
              - name: VictoriaLogs
                uid: victorialogs
                type: victoriametrics-logs-datasource
                access: proxy
                url: http://vlsingle-obs.observability.svc:9428
        # sidecar discovers dashboards from ConfigMaps labelled grafana_dashboard
        sidecar:
          # bound the 3 watcher sidecars (sc-dashboard/sc-datasources/sc-alerts; were unlimited)
          resources:
            requests: { memory: 32Mi, cpu: 10m }
            limits: { memory: 128Mi, cpu: 200m }
          dashboards:
            enabled: true
            label: grafana_dashboard
            searchNamespace: observability
          datasources:
            enabled: true
          # alert rules provisioned from ConfigMaps labelled grafana_alert
          # (see manifests/observability/alerts/). Routing → ntfy is below.
          alerts:
            enabled: true
            label: grafana_alert
            searchNamespace: observability
        # Alerting contact point + notification policy now live as a sidecar-loaded
        # ConfigMap: manifests/observability/alerts/contactpoints.yaml (label
        # grafana_alert, hot-reloaded via the provisioning API). Kept OUT of
        # .Values.alerting — that path mounts as configmap subPaths (boot-only, not
        # live-updated), so every contact-point edit needed a pod restart. Alert
        # RULES likewise live in alerts/ (need datasource UIDs filled in).
        # (No envFromSecret: the ntfy.sh contact point is a public random-topic webhook
        # with no auth token. The former grafana-ntfy SealedSecret — the self-hosted
        # ntfy bearer token — was removed when ntfy moved to hosted ntfy.sh.)
        grafana.ini:
          server:
            root_url: https://grafana.my-blue-car.work
          # SSO via Authelia: Grafana trusts the Remote-User header that the forward-auth
          # middleware injects (Authelia 2FA at the edge), so there is NO separate Grafana
          # login. auto_sign_up creates the user on first hit as a Viewer; rbansal (the
          # existing admin, userId=2) keeps Admin. A second Authelia account therefore lands
          # read-only instead of silently inheriting Grafana admin. The login form is disabled.
          #
          # SECURITY: auth.proxy blindly trusts the header, so the ONLY path to grafana:80
          # must be Traefik (which enforces Authelia). Two controls back this:
          #   • the grafana NetworkPolicy (manifests/observability/grafana-netpol.yaml) allows
          #     ingress only from kube-system (Traefik);
          #   • the direct Tailscale ingress (ts-grafana) was REMOVED — it bypassed Authelia
          #     and would have let a tailnet client inject Remote-User. Tailnet users now
          #     reach grafana.my-blue-car.work over the internet, through Authelia.
          # whitelist is the pod CIDR (only Traefik can reach grafana per the NetworkPolicy).
          auth:
            disable_login_form: true
          "auth.proxy":
            enabled: true
            header_name: Remote-User
            header_property: username
            auto_sign_up: true
            headers: "Email:Remote-Email Name:Remote-Name Groups:Remote-Groups"
            enable_login_token: false
            whitelist: 10.42.0.0/16
          users:
            auto_assign_org_role: Viewer
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
