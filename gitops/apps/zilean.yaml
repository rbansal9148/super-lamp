# zilean — reference migration for the VPN+DB (red) tier. App egresses via the
# in-cluster gluetun proxy; its PG17 DB is migrated by logical dump/restore from the
# live Docker DB (Docker data dir left pristine for rollback). Apply once:
#   kubectl apply -f gitops/apps/zilean.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zilean
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:rbansal9148/super-lamp.git
    # Tracking main (migration complete; was feat/k3s-bootstrap during bring-up).
    targetRevision: main
    path: gitops/manifests/zilean
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
