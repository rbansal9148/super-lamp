apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: bitmagnet, namespace: argocd }
spec:
  project: default
  source: { repoURL: git@github.com:rbansal9148/super-lamp.git, targetRevision: feat/k3s-bootstrap, path: gitops/manifests/bitmagnet, directory: { recurse: true } }
  destination: { server: https://kubernetes.default.svc, namespace: apps }
  syncPolicy: { automated: { prune: true, selfHeal: true }, syncOptions: [CreateNamespace=true, ApplyOutOfSyncOnly=true] }
