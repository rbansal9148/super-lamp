# external-dns — k8s-native Cloudflare record sync, replacing the Docker
# favonia/cloudflare-ddns container (the last thing on Docker). Reuses the
# cert-manager CF token (re-sealed into the external-dns namespace).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:rbansal9148/super-lamp.git
    # BRING-UP: tracking the feature branch; change to main at merge time.
    targetRevision: feat/k3s-bootstrap
    path: gitops/manifests/external-dns
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
