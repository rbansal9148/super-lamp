  browserless:
    image: ghcr.io/browserless/chromium
    container_name: browserless
    environment:
      - TIMEOUT=-1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - mediafusion
      - all

  # mediafusion_mongodb:
  #   image: mongo:latest
  #   container_name: mediafusion_mongodb
  #   restart: unless-stopped
  #   init: true
  #   volumes:
  #     - ${DOCKER_DATA_DIR}/mediafusion/db:/data/db
  #   healthcheck:
  #     test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
  #     interval: 10s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 40s
  #   profiles:
  #     - mediafusion
  #     - all

  mediafusion_redis:
    mem_limit: 512m
    image: redis:8.6.3
    container_name: mediafusion_redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ${DOCKER_DATA_DIR}/mediafusion/cache:/data
    command: redis-server --appendonly yes --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - mediafusion
      - all
