services:
  bitmagnet:
    container_name: bitmagnet
    image: ghcr.io/bitmagnet-io/bitmagnet@sha256:cf2c16fac5b51f1c18e630b4710175d35d7e44b83012cfd05a2b43712feec05e
    volumes:
      - ${DOCKER_APP_DIR}/bitmagnet/config:/root/.config/bitmagnet
    restart: unless-stopped
    env_file:
      - .env
      - config.env
    mem_limit: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    network_mode: service:bitmagnet_vpn
    depends_on:
      bitmagnet_postgres:
        condition: service_healthy
      bitmagnet_vpn:
        condition: service_healthy
    command:
      - worker
      - run
      # Run all workers:
      - --all
      # Or enable individual workers:
      # - --keys=http_server
      # - --keys=queue_server
      # - --keys=dht_crawler
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3333/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - bitmagnet
      - all

  bitmagnet_vpn:
    container_name: bitmagnet_vpn
    hostname: bitmagnet
    image: qmcgaw/gluetun
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # The bitmagnet ports must be exposed by the gluetun container:
      # - "3333:3333" # web UI
      # BitTorrent ports:
      - "3334:3334/tcp"
      - "3334:3334/udp"
    environment:
      - FIREWALL_OUTBOUND_SUBNETS=192.168.55.0/24
    env_file:
      - ${DOCKER_APP_DIR}/gluetun/.env
      - ${DOCKER_APP_DIR}/gluetun/config.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bitmagnet.rule=Host(`${BITMAGNET_HOSTNAME}`)"
      - "traefik.http.routers.bitmagnet.entrypoints=websecure"
      - "traefik.http.routers.bitmagnet.tls=true"
      - "traefik.http.routers.bitmagnet.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bitmagnet.middlewares=authelia@docker"
      - "traefik.http.services.bitmagnet.loadbalancer.server.port=3333"
    volumes:
      - ${DOCKER_DATA_DIR}/gluetun:/gluetun
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 1m
    extra_hosts:
      - "bitmagnet_postgres:192.168.55.11"
    networks:
      bitmagnet: 
        ipv4_address: 192.168.55.10
      default:
    profiles:
      - bitmagnet
      - all

  bitmagnet_prune:
    image: postgres:16-alpine
    container_name: bitmagnet_prune
    restart: unless-stopped
    depends_on:
      bitmagnet_postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=f4813594672d04c048347ef5deb02ef3e8b85db1bb0d69ca
    networks:
      bitmagnet:
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          echo "[$$(date -u +%FT%TZ)] starting prune cycle (up to 5 batches of 50k unclassified torrents, retry on deadlock)"
          for i in 1 2 3 4 5; do
            attempt=0
            while [ $$attempt -lt 5 ]; do
              attempt=$$((attempt+1))
              OUT=$$(psql -h bitmagnet_postgres -U bitmagnet -d bitmagnet -At -c "SET lock_timeout='30s'; WITH d AS (DELETE FROM torrents WHERE info_hash IN (SELECT t.info_hash FROM torrents t LEFT JOIN torrent_contents tc ON tc.info_hash=t.info_hash WHERE tc.content_type IS NULL LIMIT 50000) RETURNING 1) SELECT count(*) FROM d;" 2>&1 | tr '\n' ' ')
              if echo "$$OUT" | grep -qE "deadlock|lock timeout|canceling"; then
                echo "[$$(date -u +%FT%TZ)] batch=$$i attempt=$$attempt deadlock — retrying in $$((attempt*5))s"
                sleep $$((attempt*5))
                continue
              fi
              break
            done
            echo "[$$(date -u +%FT%TZ)] batch=$$i result=$$OUT"
            if echo "$$OUT" | grep -qE "^[[:space:]]*0[[:space:]]*$$"; then
              echo "[$$(date -u +%FT%TZ)] no rows remaining — done"
              break
            fi
            sleep 10
          done
          sleep 86400
        done
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    profiles:
      - bitmagnet
      - all

  bitmagnet_postgres:
    image: postgres:16-alpine
    container_name: bitmagnet_postgres
    volumes:
      - ${DOCKER_DATA_DIR}/bitmagnet/db:/var/lib/postgresql/data
      - ${DOCKER_APP_DIR}/bitmagnet/init:/docker-entrypoint-initdb.d
    shm_size: 1g
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 4g
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=top"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=8GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"
      - "-c"
      - "autovacuum_analyze_scale_factor=0.05"
      - "-c"
      - "autovacuum_naptime=30s"
      - "-c"
      - "autovacuum_max_workers=4"
    environment:
      - POSTGRES_PASSWORD=f4813594672d04c048347ef5deb02ef3e8b85db1bb0d69ca
      - POSTGRES_DB=bitmagnet
      - POSTGRES_USER=bitmagnet
      - PGDATA=/var/lib/postgresql/data/pgdata
    networks:
      bitmagnet:
        ipv4_address: 192.168.55.11
      default:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitmagnet -d bitmagnet"]
      interval: 10s
      start_period: 20s
    profiles:
      - bitmagnet
      - all


networks:
  bitmagnet:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.55.0/24
          gateway: 192.168.55.1