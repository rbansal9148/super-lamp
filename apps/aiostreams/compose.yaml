services:
  aiostreams:
    image: ghcr.io/viren070/aiostreams:${AIOSTREAMS_TAG:-latest}
    container_name: aiostreams
    restart: unless-stopped
    env_file:
      - .env
      - config.env
    mem_limit: 1g
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aiostreams.rule=Host(`${AIOSTREAMS_HOSTNAME?}`)"
      - "traefik.http.routers.aiostreams.entrypoints=websecure"
      - "traefik.http.routers.aiostreams.tls.certresolver=letsencrypt"
      - "traefik.http.routers.aiostreams.middlewares=authelia@docker"
      - "traefik.http.services.aiostreams.loadbalancer.server.port=3000"
    volumes:
      - ${DOCKER_DATA_DIR}/aiostreams:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      aiostreams_postgres:
        condition: service_healthy
      aiostreams_redis:
        condition: service_healthy
    profiles:
      - aiostreams
      - all

  aiostreams_postgres:
    mem_limit: 1g
    image: postgres:18.3
    container_name: aiostreams_postgres
    volumes:
      - ${DOCKER_DATA_DIR}/aiostreams/db:/var/lib/postgresql/data
    shm_size: 1g
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=8MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "log_min_duration_statement=1000"
    environment:
      - POSTGRES_PASSWORD=406c46d8eae1e9dd4cc5734995246ef249dfa67d0a1a1b67
      - POSTGRES_DB=aiostreams
      - POSTGRES_USER=aiostreams
      - PGDATA=/var/lib/postgresql/data/pgdata
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiostreams -d aiostreams"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - aiostreams
      - all

  aiostreams_redis:
    mem_limit: 256m
    image: redis:8.6.3
    container_name: aiostreams_redis
    restart: unless-stopped
    volumes:
      - ${DOCKER_DATA_DIR}/aiostreams/cache:/data
    command: redis-server --appendonly yes --save 60 1 --maxmemory 1gb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - aiostreams
      - all