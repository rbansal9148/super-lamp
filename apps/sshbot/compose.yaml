services:
  sshbot:
    image: nhyyeb/sshbot:latest
    container_name: sshbot
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
      - config.env
    environment:
      TZ: ${TZ:-UTC}
      # SSH_PRIVATE_KEY: |
      #   -----BEGIN OPENSSH PRIVATE KEY-----
      #   your_key_line_1
      #   your_key_line_2
      #   your_key_line_3
      #   -----END OPENSSH PRIVATE KEY-----
    profiles:
      - sshbot
      - all
    
