services:
  torbox-media-center:
    image: anonymoussystems/torbox-media-center:main
    container_name: torbox-media-center
    stdin_open: true
    tty: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TORBOX_API_KEY=${TORBOX_API_KEY}
      - MOUNT_METHOD=${TORBOX_MOUNT_METHOD}
      - MOUNT_PATH=/torbox
    volumes:
      - ${TORBOX_MOUNT_PATH}:/torbox
    profiles:
      - torbox-media-center
      - all
