services:
  calibre-web-automated:
    image: crocodilestick/calibre-web-automated:latest@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
    container_name: calibre-web-automated
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Asia/Kolkata
      - DOCKER_MODS=lscr.io/linuxserver/mods:universal-calibre-v9.9.0@sha256:559ca4caf90d80410b7b7cc8870c15b55469fa60ff15c2b5cc0c570d2eda111f
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SESSION_COOKIE_SECURE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    volumes:
      - ${DOCKER_DATA_DIR}/calibre-web-automated/config:/config
      - ${DOCKER_DATA_DIR}/calibre-web-automated/book-ingest:/cwa-book-ingest
      - ${DOCKER_DATA_DIR}/calibre-web-automated/calibre-library:/calibre-library
      - ${DOCKER_DATA_DIR}/calibre-web-automated/books:/books
      #- /path/to/your/gmail/credentials.json:/app/calibre-web/gmail.json #Optional
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calibre.rule=Host(`${CALIBRE_HOSTNAME?}`)"
      - "traefik.http.routers.calibre.entrypoints=websecure"
      - "traefik.http.routers.calibre.tls.certresolver=letsencrypt"
      - "traefik.http.routers.calibre.middlewares=authelia@docker"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest@sha256:e891eda444b261da48a839db652034bce4e20ac09c167f14adf939dedf96b572
    container_name: shelfmark
    env_file:
      - shelfmark.env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/api/health"]
      interval: 30s
      timeout: 30s
      start_period: 10s
      retries: 3
    depends_on:
      calibre-web-automated:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shelfmark.rule=Host(`${SHELFMARK_HOSTNAME?}`)"
      - "traefik.http.routers.shelfmark.entrypoints=websecure"
      - "traefik.http.routers.shelfmark.tls.certresolver=letsencrypt"
      - "traefik.http.routers.shelfmark.middlewares=authelia@docker"
    volumes:
      - ${DOCKER_DATA_DIR}/calibre-web-automated/book-ingest:/books
      - ${DOCKER_DATA_DIR}/calibre-web-automated/config:/config

